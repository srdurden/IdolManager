<div id="loading" class="loading"><div><div class="spark">✦</div><b>IDOL MANAGER</b></div></div>
<div id="root"></div><div id="overlay"></div><div id="toast" class="toast hidden"></div><div id="day-transition" class="day-transition" aria-live="polite" aria-atomic="true"></div>
<script>
'use strict';
const VERSION='2.5.0',SAVE_KEY='idol_manager_supersimple_save_v2',AUTO_KEY='idol_manager_supersimple_auto_v2',SETTINGS_KEY='idol_manager_pro_settings_v1';
const $=s=>document.querySelector(s), clamp=(n,a,b)=>Math.max(a,Math.min(b,n)), yen=n=>'¥ '+Math.round(n).toLocaleString('es-ES'), pct=n=>Math.round(n)+'%';
const weekdays=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const months=['Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre','Enero','Febrero'];
const names=['Aiko','Mika','Rin','Sakura','Hana','Nao','Mei','Koharu','Momo','Rei','Sora','Yuna','Emi','Akari','Chika','Noa'];
const memberColors=[['Rosa principal','#f1348d'],['Rosa brillante','#f752a1'],['Rosa suave','#f3abd2'],['Lila','#a262e7'],['Azul claro','#68a1ec'],['Turquesa','#a0ddd8'],['Verde menta','#71d4b0'],['Amarillo dorado','#f7c667'],['Naranja melocotón','#f6cf9d'],['Violeta suave','#d8c5f7']];
const songA=['Milky','Neon','Cherry','Tiny','Dream','Cosmic','Sugar','Midnight','Electric','Peach','Secret','Lucky','Velvet','Pixel'];
const songB=['Heart','Panic','Typhoon','Soda','Umbrella','Promise','Parade','Kiss','Miracle','Signal','Carousel','Galaxy','Ribbon','Memory'];
const venueTemplates=[
 {name:'Concierto callejero',capacity:30,quality:12,cost:0,ticket:0,tipRate:100,street:true,free:true,unlock:0},
 {name:'Club Momo',capacity:80,quality:42,cost:35000,ticket:900,unlock:25},
 {name:'Neon Box',capacity:180,quality:55,cost:85000,ticket:1300,unlock:180},
 {name:'Live House Polaris',capacity:500,quality:68,cost:240000,ticket:1900,unlock:600},
 {name:'Moon Hall',capacity:900,quality:76,cost:480000,ticket:2400,unlock:1600},
 {name:'Regional Wave',capacity:2000,quality:86,cost:1100000,ticket:3200,unlock:5000},
 {name:'Starlight Arena',capacity:6500,quality:96,cost:3400000,ticket:5200,unlock:20000}
];
const specialMoves=[
 {name:'Nota imposible',desc:'La Voz de la próxima canción obtiene +18.',stat:'voice'},
 {name:'Paso relámpago',desc:'El Baile de la próxima canción obtiene +18.',stat:'dance'},
 {name:'Sonrisa salvavidas',desc:'Vínculo +12 y todas recuperan 8 de energía.',stat:'charm'},
 {name:'Aprendizaje fugaz',desc:'Corrige el peor resultado de la próxima canción.',stat:'learning'},
 {name:'Encore natural',desc:'Permite repetir la última canción una vez.',stat:'charm'},
 {name:'Respirar juntas',desc:'Todas recuperan 10 de energía durante el directo.',stat:'learning'}
];
const actionInfo={
 rehearse:['Ensayar canción','Mejora una función de una canción','+ preparación · − energía','♬'],
 promote:['Promocionar','Compra atención pública temporal','− dinero · + atención','✦'],
 rest:['Descansar','Recupera energía de todo el grupo','+ energía','☾'],
 produce:['Producir canción','Añade repertorio con coste y riesgo','− dinero · + canción','♫'],
 train:['Entrenar integrante','Mejora un atributo permanentemente','+ atributo · − energía','★'],
 recruit:['Casting','Conoce tres posibles integrantes','− salario futuro','♥'],
 book:['Reservar sala','Programa un concierto y fija la entrada','− alquiler · + fecha','▣']
};
function seeded(seed){let t=seed>>>0;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^t>>>15,1|t);r^=r+Math.imul(r^r>>>7,61|r);return((r^r>>>14)>>>0)/4294967296}}
let settings=loadJSON(SETTINGS_KEY)||{textSpeed:'Rápida',confirmDay:true,contrast:false,reduceMotion:false};
let game=null,screen='menu',modal=null,selected={},chartPinned=null,chartDetails=[];
function loadJSON(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function saveJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}}
function rand(){game.rng=(game.rng*1664525+1013904223)>>>0;return game.rng/4294967296}
function rint(a,b){return Math.floor(rand()*(b-a+1))+a}
function choose(a){return a[Math.floor(rand()*a.length)]}
function todayName(g=game){return weekdays[g.day%7]}
function dateLabel(g=game){let total=g.day,mi=Math.floor(total/30)%12,md=total%30+1,year=Math.floor(total/360)+1;return `${weekdays[total%7]} ${md} · ${months[mi]} · Año ${year}`}
function shortDate(day){let mi=Math.floor(day/30)%12,md=day%30+1;return `${weekdays[day%7].slice(0,3)}. ${md} ${months[mi].slice(0,3)}.`}
function sundayBookingOptions(count=3){let untilSunday=(6-game.day%7+7)%7||7;return Array.from({length:count},(_,i)=>{let days=untilSunday+i*7;return {days,day:game.day+days}})}
function baseGame(name='MIRACLE PANIC!'){
 return {version:VERSION,seed:Date.now()>>>0,rng:(Date.now()^0x9e3779b9)>>>0,groupName:name,day:0,week:1,cash:0,attention:0,
 fans:{curious:0,sympathizers:0,loyal:0,personal:{}},members:[],songs:[],concert:null,concertHistory:[],ledger:[],debt:null,
 tutorial:1,tutorialDone:false,actionUsed:false,weeklyClosed:false,weeklyBookingRequired:false,goals:[],completedFixed:[],careerTier:'Desconocido',bestConcert:-5,records:{maxFans:0,maxStreams:0},
 inbox:[],lastAction:'',log:[],weekOpeningCash:0,weekOpeningFans:0,weekOpeningAttention:0,weekOpeningEnergy:0,weekLedgerBaseline:0,settings:{...settings},createdAt:Date.now(),lastSaveAt:null};
}
function totalFans(){return game.fans.curious+game.fans.sympathizers+game.fans.loyal+Object.values(game.fans.personal).reduce((a,b)=>a+b,0)}
function avgEnergy(){return game.members.length?game.members.reduce((a,m)=>a+m.energy,0)/game.members.length:0}
function debtRemaining(){return game.debt?Math.max(0,game.debt.totalDue-game.debt.paid):0}
function addLedger(amount,category,description){game.cash+=amount;game.ledger.unshift({day:game.day,amount,category,description});game.cash=Math.round(game.cash)}
function toast(msg){let t=$('#toast');t.textContent=msg;t.classList.remove('hidden');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.add('hidden'),2300)}
function openModal(type,data={}){modal={type,data};render()}
function closeModal(){if(modal?.type==='book'&&modal.data?.required&&!game.concert){toast('Antes de continuar debes reservar el próximo concierto.');return}modal=null;render()}
function setScreen(s){screen=s;modal=null;window.scrollTo(0,0);render()}
function saveAuto(){game.lastSaveAt=Date.now();saveJSON(AUTO_KEY,game)}
function saveSlot(){game.lastSaveAt=Date.now();if(saveJSON(SAVE_KEY,game))toast('Partida guardada')}
function loadGame(key=AUTO_KEY){let g=loadJSON(key);if(!g){toast('No hay partida guardada');return}game=normalize(g);screen='today';modal=game.tutorial&&!game.tutorialDone?{type:'tutorial'}:null;applySettings();render();toast('Partida cargada')}
function normalize(g){let b=baseGame();g={...b,...g};g.fans={...b.fans,...g.fans,personal:{...(g.fans?.personal||{})}};g.records={...b.records,...g.records};g.members=g.members||[];g.songs=g.songs||[];g.ledger=g.ledger||[];g.goals=g.goals||[];g.completedFixed=g.completedFixed||[];if(g.debt&&!g.debt.totalPayments)g.debt.totalPayments=24;if(g.concert&&!g.concert.ticketPrice)g.concert.ticketPrice=g.concert.venue?.ticket||900;if(g.activeConcert&&!g.activeConcert.phase)g.activeConcert=null;return g}
function applySettings(){document.body.classList.toggle('reduce-motion',!!settings.reduceMotion);document.body.style.setProperty('--ink',settings.contrast?'#101326':'#232744');saveJSON(SETTINGS_KEY,settings)}
function nav(){return `<aside class="sidebar"><button class="brand" onclick="setScreen('today')"><span class="spark">✦</span> IDOL MANAGER</button><div class="nav">${navItems().map(n=>navButton(n)).join('')}</div><div class="sidebar-foot">${nextConcertCard()}</div></aside>`}
function navItems(){return [['today','⌂','Hoy'],['actions','✦','Acciones'],['songs','♫','Canciones'],['group','★','Grupo'],['concerts','▣','Conciertos'],['fans','♥','Fans'],['finance','¥','Finanzas'],['goals','◎','Carrera']]}
function tutorialNavigation(){if(!game||game.tutorialDone||!game.tutorial)return {allowed:navItems().map(x=>x[0]),focus:null};let map={1:{allowed:['today','finance'],focus:'finance'},2:{allowed:['today','finance','group'],focus:'group'},3:{allowed:['today','finance','group','songs'],focus:'songs'},4:{allowed:['today','finance','group','songs','concerts','actions'],focus:'concerts'},5:{allowed:['today','finance','group','songs','concerts','actions'],focus:'actions'},6:{allowed:['today','finance','group','songs','concerts','actions'],focus:'actions'},7:{allowed:['today','finance','group','songs','concerts','actions'],focus:'concerts'}};return map[game.tutorial]||{allowed:['today'],focus:'today'}}
function navButton(n){let state=tutorialNavigation(),locked=!state.allowed.includes(n[0]),focus=state.focus===n[0];return `<button class="${screen===n[0]?'active ':''}${focus?'attention':''}" ${locked?'disabled':''} onclick="setScreen('${n[0]}')"><span class="icon">${n[1]}</span>${n[2]}</button>`}
function nextConcertCard(){if(!game.concert)return `<div class="next-show next-show-empty"><span class="next-show-icon">▣</span><b>Próximo concierto</b><strong>Pendiente</strong><small>Reserva una fecha antes de seguir gestionando la semana.</small><button onclick="setConcertTab('venues');setScreen('concerts')">Ver salas <span>→</span></button></div>`;let left=game.concert.day-game.day,prep=game.songs.length?weakestPrep().value:0;return `<div class="next-show"><span class="next-show-icon">▣</span><b>Próximo concierto</b><strong>${escapeHTML(game.concert.venue.name)}</strong><small>${shortDate(game.concert.day)} · ${left===0?'¡Hoy!':`Faltan ${left} días`}<br>Aforo: ${game.concert.venue.capacity} personas</small><span class="next-prep">Preparación: ${prep}%</span></div>`}
function bottomNav(){let items=game.tutorial===1&&!game.tutorialDone?[['today','⌂','Hoy'],['finance','¥','Finanzas'],['actions','✦','Acciones'],['group','★','Grupo'],['more','⋯','Más']]:[['today','⌂','Hoy'],['actions','✦','Acciones'],['songs','♫','Temas'],['group','★','Grupo'],['more','⋯','Más']],state=tutorialNavigation();return `<nav class="bottom-nav">${items.map(n=>{let locked=n[0]==='more'?game.tutorial&&!game.tutorialDone:!state.allowed.includes(n[0]),focus=state.focus===n[0];return `<button class="${screen===n[0]?'active ':''}${focus?'attention':''}" ${locked?'disabled':''} onclick="${n[0]==='more'?`openModal('more')`:`setScreen('${n[0]}')`}"><span>${n[1]}</span>${n[2]}</button>`}).join('')}</nav>`}
function pageHeader(title,sub=''){return `<div class="topbar"><div class="page-title"><h1>${title}</h1><p>${sub}</p></div><div class="topbar-meta"><div class="cash-chip" aria-label="Caja disponible"><small>Caja</small><b>${yen(game.cash)}</b></div><button class="date-chip" onclick="openCalendar()" aria-label="Abrir calendario mensual"><strong>${weekdays[game.day%7]} ${game.day%30+1}</strong>${months[Math.floor(game.day/30)%12]} · Año ${Math.floor(game.day/360)+1} · 🗓</button></div></div>`}
function stats(){let energy=Math.round(avgEnergy()),energyLabel=energy<40?'Conviene descansar':energy<65?'Energía justa':'Nivel saludable';return `<div class="stats"><div class="stat stat-cash"><span class="stat-icon">▣</span><div class="stat-copy"><small>Caja</small><strong>${yen(game.cash)}</strong></div></div><div class="stat stat-attention"><span class="stat-icon">★</span><div class="stat-copy"><small>Atención</small><strong>${Math.round(game.attention)}/100</strong></div></div><div class="stat stat-fans"><span class="stat-icon">●●●</span><div class="stat-copy"><small>Fans</small><strong>${totalFans().toLocaleString('es-ES')}</strong></div></div><div class="stat stat-energy"><span class="stat-icon">ϟ</span><div class="stat-copy"><small>Energía media</small><strong>${pct(energy)}</strong></div><span class="stat-status ${energy<40?'bad':energy<65?'warn':'good'}">${energyLabel}</span></div></div>`}
function shell(content){return `<div class="app screen-${screen}">${nav()}<main class="main">${content}</main>${bottomNav()}</div>`}
function escapeHTML(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function metric(name,val,color=''){return `<div class="metric"><span>${name}</span><div class="progress"><i style="width:${clamp(val,0,100)}%;${color?`background:${color}`:''}"></i></div><b>${Math.round(val)}</b></div>`}
function memberAvatar(m,big=false){return `<div class="avatar ${big?'big':''}" style="background:${m.color||'#f3abd2'}">${escapeHTML(m.stageName[0])}</div>`}
function songFit(song){if(!game.members.length)return 0;let values=['voice','dance','charm'].map((k,i)=>{let a=game.members.reduce((s,m)=>s+m[k],0)/game.members.length;return 100-Math.abs(a-[song.voiceDemand,song.danceDemand,song.stageDemand][i])});return values.reduce((a,b)=>a+b,0)/3}
function prepFor(memberId,song){song.prep=song.prep||{};song.prep[memberId]=song.prep[memberId]||{voice:10,dance:10,stage:10};return song.prep[memberId]}
function roleLoadWith(memberId,song,assignments=song.assignments){let roles=['voice','dance','stage'].filter(r=>(assignments?.[r]||[]).includes(memberId));let demands={voice:song.voiceDemand,dance:song.danceDemand,stage:song.stageDemand};let base=roles.reduce((sum,r)=>sum+demands[r]/Math.max(1,assignments[r].length)*.22,0);return base*([0,1,1.2,1.4][roles.length]||1.4)}
function roleLoad(memberId,song){return roleLoadWith(memberId,song,song.assignments)}
function roleMeta(role){return {voice:{label:'Voz',stat:'voice',statLabel:'Voz'},dance:{label:'Baile',stat:'dance',statLabel:'Baile'},stage:{label:'Apoyo escénico',stat:'charm',statLabel:'Encanto'}}[role]}
function memberRoleForecast(member,song,role,assignments=song.assignments){let meta=roleMeta(role),mastery=prepFor(member.id,song)[role],load=roleLoadWith(member.id,song,assignments),center=clamp(.45*member[meta.stat]+.35*mastery+.15*member.energy-Math.max(0,load-28)*.45,0,100),spread=member.energy<30?10:member.energy>80?6:8;return {stat:member[meta.stat],mastery,energy:member.energy,load,center,low:clamp(Math.round(center-spread),0,100),high:clamp(Math.round(center+spread),0,100)}}
function roleForecast(song,role){let ids=song.assignments[role]||[],fs=ids.map(id=>memberRoleForecast(game.members.find(m=>m.id===id),song,role)).filter(Boolean),center=fs.length?fs.reduce((a,f)=>a+f.center,0)/fs.length:0;return {center,low:clamp(Math.round(center-8),0,100),high:clamp(Math.round(center+8),0,100)}}
function loadLabel(v){return v<12?'Baja':v<22?'Media':v<34?'Alta':'Extrema'}
function render(){let root=$('#root');if(screen==='menu'||!game)root.innerHTML=renderMenu();else{let fn=renderers[screen]||renderToday;root.innerHTML=shell(fn())}$('#overlay').innerHTML=modal?renderModal(modal):'';applySettings()}
function renderMenu(){let has=!!loadJSON(AUTO_KEY);return `<div class="screen-menu"><div class="menu-box"><div class="logo"><span class="spark">✦</span> IDOL MANAGER</div><div class="muted">J-POP MANAGEMENT GAME</div><div class="hero"><span class="badge">CREA · GESTIONA · TRIUNFA</span><h2>Construye la próxima sensación idol</h2><p>Forma un grupo, produce canciones, prepara conciertos y convierte una pequeña comunidad en un fenómeno musical.</p></div><div class="menu-stack"><button class="button" onclick="openModal('newGame')">Nueva partida</button><button class="button secondary" ${has?'':'disabled'} onclick="loadGame()">Continuar</button><button class="button dark" onclick="openModal('settings')">Opciones</button></div><div class="version">MVP ${VERSION}</div></div></div>`}
function alertInfo(){
 if(game.concert){let left=game.concert.day-game.day;if(left===0)return ['¡El concierto es hoy!',`${game.concert.venue.name} · ${game.concert.expected} asistentes previstos.`,'startConcert'];if(left<=2){let risk=weakestPrep();return [`Faltan ${left} días`,`${risk.label} es el punto más débil del repertorio (${risk.value}).`,'actions']}}
 if(!game.concert)return ['Programa tu próximo concierto','Sin una fecha en el calendario, la atención y los ingresos se estancan.','book'];
 if(avgEnergy()<35)return ['El grupo está agotado',`Energía media ${pct(avgEnergy())}. Un descanso evitará errores.`,'actions'];
 return ['La semana está en tus manos','Revisa objetivos, repertorio y energía antes de gastar el día.','actions'];
}
function weakestPrep(){let best={label:'Preparación',value:100};for(let s of game.songs)for(let [r,label] of [['voice','Voz'],['dance','Baile'],['stage','Apoyo escénico']]){let ids=s.assignments?.[r]||[];if(!ids.length)continue;let v=ids.reduce((a,id)=>a+(prepFor(id,s)[r]||0),0)/ids.length;if(v<best.value)best={label:`${label} de ${s.title}`,value:Math.round(v)}}return best}
function renderToday(){return `${pageHeader('Hoy','Decide qué necesita el grupo y anticipa los próximos eventos.')}<div class="card"><div class="calendar-head"><h2>Calendario de la semana</h2><button class="button secondary small" onclick="openCalendar()">Ver mes completo</button></div>${weekCalendar()}</div>${stats()}<div class="grid"><div class="hero"><span class="badge red">ALERTAS DEL DÍA</span><h2>Lo que requiere tu atención</h2><div style="margin-top:8px">${alertsList()}</div><div class="actions"><button class="button" onclick="setScreen('actions')" ${game.tutorial===1&&!game.tutorialDone?'disabled':''}>Ver acciones</button>${game.tutorial&&!game.tutorialDone?`<button class="button secondary" onclick="openModal('tutorial')">Ver guía del tutorial</button>`:''}</div></div>${objectiveCard()}</div>`}
function tutorialStepInfo(){let map={1:{title:'Consigue capital para empezar',text:'Abre Finanzas y solicita el préstamo inicial. Pedir financiación no consume el día.',dest:'finance',button:'Ir a Finanzas'},2:{title:'Contrata a tu primera artista',text:'Entra en Grupo y pulsa Casting. Compara las tres candidatas antes de decidir.',dest:'group',button:'Ir a Grupo'},3:{title:'Produce el primer tema',text:'Entra en Canciones y elige una propuesta de producción para el grupo.',dest:'songs',button:'Ir a Canciones'},4:{title:'Reserva el debut',text:'Abre Conciertos, entra en Buscar salas y reserva Club Momo para el domingo.',dest:'concerts',button:'Ir a Conciertos'},5:{title:'Promociona el concierto',text:'Abre Acciones y elige Promocionar para atraer público al debut.',dest:'actions',button:'Ir a Acciones'},6:{title:'Ensaya una función',text:'Abre Acciones, selecciona Ensayar canción y decide qué aspecto preparar.',dest:'actions',button:'Ir a Acciones'},7:{title:'Celebra el primer directo',text:'Todo está listo. Es domingo: entra en Conciertos y empieza la actuación.',dest:'concerts',button:'Ir al concierto'}};return map[game.tutorial]||map[1]}
function goTutorialStep(){let s=tutorialStepInfo();if(game.tutorial===7&&game.concert?.day>game.day)advanceDay();if(s.dest==='concerts')selected.concertTab=game.tutorial===4?'venues':'upcoming';modal=null;setScreen(s.dest)}
function eventForDay(d){let events=[];if(d===game.day)events.push('Hoy');if(game.concert?.day===d)events.push('Concierto · '+game.concert.venue.name);let logged=game.log.filter(x=>x.day===d).map(x=>x.label);events.push(...logged);let paymentsLeft=game.debt&&debtRemaining()?Math.ceil(debtRemaining()/game.debt.weeklyPayment):0,paymentIndex=Math.floor(d/7)-Math.floor(game.day/7);if(paymentsLeft&&d>game.day&&d%7===0&&paymentIndex<=paymentsLeft)events.push('Cuota · '+yen(Math.min(game.debt.weeklyPayment,debtRemaining())));return [...new Set(events)]}
function weekCalendar(){let start=game.day-game.day%7;return `<div class="calendar">${Array.from({length:7},(_,i)=>{let d=start+i,cls=d===game.day?'today':d<game.day?'done':'';if(game.concert?.day===d)cls+=' concert';let events=eventForDay(d),label=events.filter(x=>x!=='Hoy')[0]||(d===game.day?'Hoy':'Libre');return `<button class="day ${cls}" onclick="openModal('calendarDay',{day:${d}})"><b>${weekdays[i].slice(0,3)} ${d%30+1}</b><span>${d===game.day?'HOY':label}</span>${events.length>1?`<span class="day-event">+${events.length-1} evento</span>`:''}</button>`}).join('')}</div>`}
function openCalendar(){selected.calendarMonth=Math.floor(game.day/30);setScreen('calendar')}
function shiftCalendar(n){selected.calendarMonth=(selected.calendarMonth??Math.floor(game.day/30))+n;render()}
function renderCalendar(){let abs=selected.calendarMonth??Math.floor(game.day/30),year=Math.floor(abs/12)+1,mi=((abs%12)+12)%12,start=abs*30,offset=((start%7)+7)%7,cells=[...Array(offset).fill(null),...Array.from({length:30},(_,i)=>start+i)];while(cells.length%7)cells.push(null);return `${pageHeader('Calendario',`${months[mi]} · Año ${year}. Consulta conciertos, pagos y actividad del grupo.`)}<div class="card"><div class="calendar-head"><button class="button secondary small" onclick="shiftCalendar(-1)">‹ Anterior</button><h2>${months[mi]} · Año ${year}</h2><button class="button secondary small" onclick="shiftCalendar(1)">Siguiente ›</button></div><div class="month-weekdays">${weekdays.map(x=>`<span>${x.slice(0,3)}</span>`).join('')}</div><div class="calendar">${cells.map(d=>{if(d===null)return '<span class="day blank"></span>';let ev=eventForDay(d),cls=d===game.day?'today':d<game.day?'done':'';if(game.concert?.day===d)cls+=' concert';return `<button class="day ${cls}" onclick="openModal('calendarDay',{day:${d}})"><b>${d%30+1}</b>${ev.slice(0,2).map(x=>`<span class="day-event">${escapeHTML(x)}</span>`).join('')}</button>`}).join('')}</div></div><div class="notice">El calendario sirve para consultar y planificar. El tiempo solo avanza al confirmar una acción diaria o completar un concierto.</div>`}
function alertsList(){let rows=[];if(game.tutorial===1&&!game.tutorialDone)rows.push(['Necesitas capital inicial','Ve a Finanzas','red']);if(!game.members.length)rows.push(['Plantilla vacía','Haz un casting','gold']);else if(!game.songs.length)rows.push(['Sin repertorio','Produce una canción','gold']);else if(!game.concert)rows.push(['Sin próximo concierto','Busca una sala','gold']);if(game.debt&&debtRemaining())rows.push(['Próxima cuota',yen(Math.min(game.debt.weeklyPayment,debtRemaining())),'gold']);if(game.concert)rows.push(['Asistencia prevista',`${game.concert.expected}/${game.concert.venue.capacity}`,game.concert.expected>game.concert.venue.capacity*.7?'mint':'red']);if(game.members.length)rows.push(['Energía media',pct(avgEnergy()),avgEnergy()>55?'mint':'red']);let w=weakestPrep();if(game.songs.length)rows.push(['Preparación más baja',`${w.label} · ${w.value}`,'purple']);return rows.length?rows.map(r=>`<div class="row"><span>${r[0]}</span><span class="badge ${r[2]}">${r[1]}</span></div>`).join(''):`<div class="empty"><div class="emoji">✦</div>Todo bajo control.</div>`}
function renderActions(){let allowed=tutorialAllowed();return `${pageHeader('Acciones','Elige cómo utilizar el día actual.')}${stats()}<div class="options action-grid">${Object.entries(actionInfo).map(([id,v])=>{let reason=actionBlocked(id),locked=reason||(!allowed.includes(id)&&game.tutorial&&!game.tutorialDone);return `<button class="option action-card action-${id} ${locked?'locked':''}" ${locked?'disabled':''} onclick="routeAction('${id}')"><span class="action-icon">${v[3]}</span><span class="action-copy"><h3>${v[0]}</h3><p>${v[1]}</p><span class="badge ${locked?'red':'purple'}">${locked?(reason||'Bloqueado por tutorial'):v[2]}</span></span><span class="action-arrow">→</span></button>`}).join('')}</div><div class="notice action-notice"><span>💡</span> Consultar calendario, salas, fichas o asignar funciones no consume tiempo. El día solo avanza al confirmar una acción principal.</div>`}
function tutorialAllowed(){return {1:[],2:['recruit'],3:['produce'],4:['book'],5:['promote'],6:['rehearse'],7:[]}[game.tutorial]||Object.keys(actionInfo)}
function actionBlocked(id){if(game.actionUsed)return 'Ya has gastado el día';if(id==='book'&&game.concert)return 'Ya hay un concierto';if(id==='rehearse'&&!game.songs.length)return 'No hay canciones';if((id==='train'||id==='rest')&&!game.members.length)return 'No hay integrantes';if(id==='recruit'&&game.members.length>=6)return 'Plantilla completa';if(id==='promote'&&!game.songs.length&&!game.concert)return 'Nada que promocionar';if(id==='produce'&&game.cash<28000)return 'Caja insuficiente';return ''}
function routeAction(id){if(id==='actions')return setScreen('actions');if(id==='loan')return openModal('loan');if(id==='tutorialRecruit')return openModal('recruit',{tutorial:true});if(id==='tutorialSong')return openModal('produce',{tutorial:true});if(id==='tutorialBook')return openModal('book',{tutorial:true});if(id==='startConcert')return startConcert();if(actionBlocked(id)){toast(actionBlocked(id));return}if(id==='recruit'&&game.tutorial===2&&!game.tutorialDone)return openModal('recruit',{tutorial:true});if(id==='produce'&&game.tutorial===3&&!game.tutorialDone)return openModal('produce',{tutorial:true});if(id==='book'&&game.tutorial===4&&!game.tutorialDone)return openModal('book',{tutorial:true});if(['rehearse','promote','produce','train','recruit','book'].includes(id))return openModal(id);if(id==='rest')return confirmDayAction('Descansar',()=>{game.members.forEach(m=>m.energy=clamp(m.energy+30,0,100));return 'El grupo recupera 30 de energía.'})}
function renderSongs(){return `${pageHeader('Canciones','Repertorio, popularidad, preparación y desgaste.')}<div class="actions" style="margin-bottom:14px"><button class="button" onclick="routeAction('produce')">Producir nueva canción</button></div>${game.songs.length?`<div class="card"><h2>Repertorio · ${game.songs.length}</h2>${game.songs.map(s=>`<div class="row"><div><b>${escapeHTML(s.title)}</b><div class="muted tiny">Popularidad ${Math.round(s.popularity)} · ${s.weeklyStreams.toLocaleString('es-ES')} escuchas/semana</div></div><div class="actions"><span class="badge ${s.freshness>65?'mint':s.freshness<25?'red':'purple'}">Frescura ${Math.round(s.freshness)}</span><button class="button secondary small" onclick="selected.song='${s.id}';setScreen('songDetail')">Abrir</button></div></div>`).join('')}</div>`:`<div class="card empty"><div class="emoji">♫</div><h2>Aún no hay canciones</h2><p>Produce una para poder ensayar, promocionar y actuar.</p></div>`}`}
function renderSongDetail(){let s=game.songs.find(x=>x.id===selected.song)||game.songs[0];if(!s)return renderSongs();selected.song=s.id;let roles=[['voice','Voz',s.voiceDemand],['dance','Baile',s.danceDemand],['stage','Apoyo escénico',s.stageDemand]];return `${pageHeader(escapeHTML(s.title),'Exigencias, rendimiento previsto y asignación de funciones.')}<div class="grid"><div><div class="hero"><span class="badge">POP IDOL · POTENCIAL ${s.potential}</span><h2>${escapeHTML(s.title)}</h2><p>Popularidad ${Math.round(s.popularity)} · ${s.weeklyStreams.toLocaleString('es-ES')} escuchas esta semana · Frescura ${Math.round(s.freshness)}</p></div><div class="card"><h2>Exigencias</h2>${metric('Voz',s.voiceDemand)}${metric('Baile',s.danceDemand)}${metric('Escena',s.stageDemand)}${metric('Letra',s.lyricComplexity)}</div></div><div class="card"><h2>Funciones y preparación</h2>${roles.map(([r,l,d])=>{let ids=s.assignments[r]||[];let n=ids.map(id=>game.members.find(m=>m.id===id)?.stageName).filter(Boolean).join(', ')||'Sin asignar';let prep=ids.length?ids.reduce((a,id)=>a+prepFor(id,s)[r],0)/ids.length:0;return `<div class="row"><div><b>${l}</b><div class="muted tiny">${escapeHTML(n)} · Exigencia ${d}</div></div><span class="badge ${prep>d*.7?'mint':prep<35?'red':'gold'}">Prep. ${Math.round(prep)}</span></div>`}).join('')}<div class="actions"><button class="button" onclick="setScreen('roles')">Asignar funciones</button><button class="button secondary" onclick="openModal('rehearse',{songId:'${s.id}'})">Ensayar</button></div></div></div>`}
function renderRoles(){let s=game.songs.find(x=>x.id===selected.song)||game.songs[0];if(!s)return renderSongs();let roles=['voice','dance','stage'],forecasts=roles.map(r=>[r,roleForecast(s,r)]),overall=forecasts.reduce((a,x)=>a+x[1].center,0)/forecasts.length,weak=[...forecasts].sort((a,b)=>a[1].center-b[1].center)[0];return `${pageHeader('Asignar funciones',`Compara atributos, dominio y carga antes de repartir ${escapeHTML(s.title)}.`)}<div class="grid"><div class="card"><h2>Funciones y rendimiento previsto</h2>${roles.map(r=>{let meta=roleMeta(r);return `<div class="role-block"><div class="row"><div><b>${meta.label}</b><div class="muted tiny">Importan ${meta.statLabel}, dominio de la canción y energía</div></div><span class="badge">Exigencia ${s[r+'Demand']}</span></div><div class="role-candidates">${game.members.map(m=>{let active=(s.assignments[r]||[]).includes(m.id),proposed=active?s.assignments:{...s.assignments,[r]:[...(s.assignments[r]||[]),m.id]},f=memberRoleForecast(m,s,r,proposed);return `<button class="role-candidate ${active?'selected':''}" onclick="toggleRole('${s.id}','${r}','${m.id}')" aria-pressed="${active}">${memberAvatar(m)}<div class="role-cell"><small>Integrante</small><b>${active?'✓ ':''}${escapeHTML(m.stageName)}</b></div><div class="role-cell"><small>${meta.statLabel}</small><b>${Math.round(f.stat)}</b></div><div class="role-cell"><small>Dominio</small><b>${Math.round(f.mastery)}</b></div><div class="role-cell"><small>Energía</small><b>${Math.round(f.energy)}%</b></div><div class="role-cell"><small>${active?'Previsión':'Si la asignas'}</small><b class="role-score">${f.low}–${f.high}</b></div></button>`}).join('')}</div></div>`}).join('')}<div class="actions"><button class="button" onclick="setScreen('songDetail')">Guardar asignación</button></div></div><div><div class="card"><h2>Previsión de la actuación</h2><div class="hero" style="padding:18px;text-align:center"><small>Resultado global estimado</small><div class="score" style="font-size:44px">${clamp(Math.round(overall-8),0,100)}–${clamp(Math.round(overall+8),0,100)}</div><span class="muted tiny">Intervalo orientativo: el directo conserva variación y decisiones tácticas.</span></div>${forecasts.map(([r,f])=>`<div class="role-summary"><div class="row"><b>${roleMeta(r).label}</b><span class="badge ${f.center>=65?'mint':f.center>=45?'gold':'red'}">${f.low}–${f.high}</span></div>${metric('Preparación prevista',f.center)}</div>`).join('')}<div class="notice ${weak[1].center<45?'red':'mint'}"><b>Punto más débil: ${roleMeta(weak[0]).label}</b><br>${weak[1].center<45?'Conviene reasignar o ensayar esta función antes del concierto.':'El reparto no presenta una debilidad crítica.'}</div></div><div class="card"><h2>Carga por integrante</h2>${game.members.map(m=>{let l=roleLoad(m.id,s),count=roles.filter(r=>s.assignments[r].includes(m.id)).length;return `<div class="row"><div class="row-main">${memberAvatar(m)}<div><b>${escapeHTML(m.stageName)}</b><div class="muted tiny">${count} ${count===1?'función':'funciones'}</div></div></div><span class="badge ${l<20?'mint':l<34?'gold':'red'}">${loadLabel(l)} · ${Math.round(l)}</span></div>`}).join('')}</div></div></div>`}
function toggleRole(sid,role,mid){let s=game.songs.find(x=>x.id===sid),a=s.assignments[role];if(a.includes(mid)){if(a.length===1){toast('Debe quedar al menos una integrante');return}a.splice(a.indexOf(mid),1)}else a.push(mid);saveAuto();render()}
function renderGroup(){return `${pageHeader('El grupo','Plantilla, carga, energía y contratos de un vistazo.')}<div class="actions" style="margin-bottom:14px"><button class="button" onclick="routeAction('recruit')" ${game.members.length>=6?'disabled':''}>Casting</button>${game.members.length?`<button class="button secondary" onclick="routeAction('train')">Entrenar</button>`:''}</div>${game.members.length?`<div class="grid"><div class="card"><h2>Integrantes</h2>${game.members.map(m=>`<div class="row"><div class="row-main">${memberAvatar(m)}<div><b>${escapeHTML(m.stageName)}</b><div class="muted tiny">Energía ${Math.round(m.energy)} · ${m.personalFans||0} fans personales</div></div></div><button class="button secondary small" onclick="selected.member='${m.id}';setScreen('memberDetail')">Abrir</button></div>`).join('')}</div><div class="card"><h2>Salud del grupo</h2>${metric('Voz media',avgStat('voice'))}${metric('Baile medio',avgStat('dance'))}${metric('Encanto',avgStat('charm'))}${metric('Energía',avgEnergy())}<div class="row"><span>Salarios semanales</span><b>${yen(game.members.reduce((a,m)=>a+m.salary,0))}</b></div></div></div>`:`<div class="card empty"><div class="emoji">★</div><h2>El grupo aún no tiene integrantes</h2><p>Comienza un casting para conocer a tres candidatas.</p><button class="button" onclick="routeAction('recruit')">Empezar casting</button></div>`}`}
function avgStat(k){return game.members.length?game.members.reduce((a,m)=>a+m[k],0)/game.members.length:0}
function renderMemberDetail(){let m=game.members.find(x=>x.id===selected.member)||game.members[0];if(!m)return renderGroup();return `${pageHeader(`Ficha de ${escapeHTML(m.stageName)}`,'Atributos, técnica especial, fans y contrato.')}<div class="grid"><div class="card" style="text-align:center">${memberAvatar(m,true)}<h2 style="margin-top:12px">${escapeHTML(m.stageName)} · ${m.age}</h2><span class="badge">${m.personalFans||0} fans personales</span><p class="muted">${escapeHTML(m.quote||'“Haré que el público recuerde nuestro nombre.”')}</p></div><div><div class="card"><h2>Atributos</h2>${metric('Voz',m.voice)}${metric('Baile',m.dance)}${metric('Encanto',m.charm)}${metric('Aprendizaje',m.learning)}${metric('Energía',m.energy)}</div><div class="card"><h2>Técnica y contrato</h2><div class="row"><span>${escapeHTML(m.special.name)}</span><span class="badge purple">1 uso/directo · acción gratuita</span></div><p class="muted">${escapeHTML(m.special.desc)}</p><div class="row"><span>Salario</span><b>${yen(m.salary)} / semana</b></div><div class="row"><span>Fin de contrato</span><b>Semana ${m.contractEnd}</b></div><div class="row"><span>Cláusula</span><b>${yen(m.exitClause)}</b></div></div></div></div>`}
function renderFans(){let f=game.fans,pers=Object.values(f.personal).reduce((a,b)=>a+b,0),tot=totalFans();return `${pageHeader('Comunidad de fans','La atención trae público; los directos construyen vínculos duraderos.')}<div class="stats"><div class="stat"><small>Curiosos</small><strong>${f.curious}</strong><div class="progress"><i style="width:${tot?f.curious/tot*100:0}%"></i></div></div><div class="stat"><small>Simpatizantes</small><strong>${f.sympathizers}</strong><div class="progress"><i style="width:${tot?f.sympathizers/tot*100:0}%"></i></div></div><div class="stat"><small>Fans personales</small><strong>${pers}</strong><div class="progress"><i style="width:${tot?pers/tot*100:0}%"></i></div></div><div class="stat"><small>Fieles</small><strong>${f.loyal}</strong><div class="progress"><i style="width:${tot?f.loyal/tot*100:0}%"></i></div></div></div><div class="grid"><div class="card"><h2>Embudo de comunidad</h2>${[['Público nuevo → Curioso','El concierto supera 50 de satisfacción'],['Curioso → Simpatizante','Buen directo y conexión'],['Simpatizante → Fan personal','Una integrante destaca'],['Fan personal → Fiel','Concierto excepcional']].map(x=>`<div class="row"><div><b>${x[0]}</b><div class="muted tiny">${x[1]}</div></div><span>›</span></div>`).join('')}</div><div class="card"><h2>Integrantes favoritas</h2>${game.members.map(m=>`<div class="row"><div class="row-main">${memberAvatar(m)}<b>${escapeHTML(m.stageName)}</b></div><b>${f.personal[m.id]||0}</b></div>`).join('')||'<div class="empty">Aparecerán con la primera integrante.</div>'}<div class="notice mint">Los fans fieles pertenecen al grupo y permanecen aunque una integrante se marche.</div></div></div>`}
function loanOffers(){return [{name:'Impulso local',received:50000,totalDue:60000,weeks:6,require:0},{name:'Expansión indie',received:100000,totalDue:125000,weeks:10,require:10},{name:'Salto regional',received:250000,totalDue:325000,weeks:13,require:25}]}
function reputationScore(){return Math.round(totalFans()/20+Math.max(0,game.bestConcert)*4)}
function renderFinanceLoanModal(){if(game.debt&&debtRemaining())return `<span class="badge red">FINANCIACIÓN</span><h2>Ya existe un préstamo activo</h2><p>Debes devolverlo antes de solicitar financiación adicional.</p><button class="button secondary" onclick="closeModal()">Cerrar</button>`;return `<span class="badge purple">FINANCIACIÓN</span><h2>Solicitar préstamo</h2><p>Solo puede existir un préstamo activo. La operación no consume la acción diaria.</p>${loanOffers().map((o,i)=>{let weekly=Math.ceil(o.totalDue/o.weeks/100)*100,locked=reputationScore()<o.require;return `<div class="option" style="margin-bottom:10px"><div class="row"><div><b>${o.name}</b><div class="muted tiny">Recibes ${yen(o.received)} · devuelves ${yen(o.totalDue)} · ${o.weeks} cuotas de ${yen(weekly)}</div></div>${locked?`<span class="badge red">Reputación ${o.require}</span>`:`<button class="button small" onclick="acceptFinanceLoan(${i})">Solicitar</button>`}</div></div>`}).join('')}<div class="actions"><button class="button secondary" onclick="closeModal()">Cancelar</button></div>`}
function acceptFinanceLoan(i){let o=loanOffers()[i];if(!o||reputationScore()<o.require||game.debt&&debtRemaining())return;let weekly=Math.ceil(o.totalDue/o.weeks/100)*100;game.debt={type:'business',lender:o.name,received:o.received,totalDue:o.totalDue,weeklyPayment:weekly,paid:0,payments:0,totalPayments:o.weeks,status:'active'};addLedger(o.received,'Préstamo',o.name);modal=null;saveAuto();render();toast(`Préstamo recibido: ${yen(o.received)}`)}
function earlySettlement(){if(!game.debt||!debtRemaining())return 0;return game.debt.type==='yakuza'?debtRemaining():Math.ceil(debtRemaining()*.9/1000)*1000}
function repayDebtEarly(){let amount=earlySettlement();if(!amount||game.cash<amount){toast('Caja insuficiente para amortizar');return}addLedger(-amount,'Deuda','Amortización anticipada');game.debt.paid=game.debt.totalDue;game.debt.payments=game.debt.totalPayments||game.debt.payments;game.debt.status='paid';modal=null;checkGoals();saveAuto();render();toast('Préstamo amortizado')}
function renderFinance(){let salaries=game.members.reduce((a,m)=>a+m.salary,0),reserve=salaries+(game.debt&&debtRemaining()?Math.min(game.debt.weeklyPayment,debtRemaining()):0),totalPayments=game.debt?.totalPayments||24,initial=game.tutorial===1&&!game.tutorialDone;return `${pageHeader('Finanzas','Caja, deuda, movimientos y obligaciones próximas.')}${stats()}${initial?`<div class="hero" style="margin-bottom:16px"><span class="badge red">PASO 1 DEL TUTORIAL</span><h2>Consigue el capital inicial</h2><p>Necesitas financiación para contratar artistas, producir canciones y reservar una sala. Solicitarla no consume el día.</p><button class="button danger" onclick="openModal('loan')">Solicitar préstamo inicial</button></div>`:`<div class="actions" style="margin-bottom:14px"><button class="button" onclick="openModal('financeLoan')" ${game.debt&&debtRemaining()?'disabled':''}>Solicitar préstamo</button></div>`}<div class="grid"><div class="card"><h2>Movimientos recientes</h2>${game.ledger.length?game.ledger.slice(0,12).map(e=>`<div class="row"><div><b>${escapeHTML(e.description)}</b><div class="muted tiny">${shortDate(e.day)} · ${e.category}</div></div><strong class="money ${e.amount>=0?'plus':'minus'}">${e.amount>=0?'+ ':''}${yen(e.amount)}</strong></div>`).join(''):'<div class="empty">Todavía no hay movimientos.</div>'}</div><div><div class="card"><h2>Obligaciones</h2><div class="row"><span>Salarios semanales</span><b>${yen(salaries)}</b></div><div class="row"><span>Próxima cuota</span><b>${game.debt&&debtRemaining()?yen(Math.min(game.debt.weeklyPayment,debtRemaining())):'Sin deuda'}</b></div><div class="row"><span>Reserva recomendada</span><b>${yen(reserve)}</b></div><div class="notice ${game.cash<reserve?'red':'mint'}">${game.cash<reserve?'La caja actual no cubre el cierre semanal.':'La caja cubre las obligaciones inmediatas.'}</div></div>${game.debt&&debtRemaining()?`<div class="card"><h2>${game.debt.type==='yakuza'?'Préstamo yakuza':escapeHTML(game.debt.lender||'Préstamo')}</h2><div class="row"><span>Deuda pendiente</span><b>${yen(debtRemaining())}</b></div><div class="row"><span>Pagos</span><b>${game.debt.payments}/${totalPayments}</b></div><div class="progress"><i style="width:${clamp(game.debt.paid/game.debt.totalDue*100,0,100)}%"></i></div><div class="actions"><button class="button secondary" ${game.cash<earlySettlement()?'disabled':''} onclick="repayDebtEarly()">Amortizar ${yen(earlySettlement())}</button></div></div>`:`<div class="card"><h2>Préstamos y deuda</h2><div class="notice mint">No tienes préstamos activos.</div>${initial?'':`<div class="actions"><button class="button" onclick="openModal('financeLoan')">Solicitar financiación</button></div>`}</div>`}</div></div>`}
function careerTier(){let f=totalFans();return f<180?'Desconocido':f<600?'Underground':f<1800?'Indie':f<6000?'Regional':f<20000?'Nacional':'Estrella'}
function guidedObjectives(){let debtTarget=game.debt?.type==='yakuza'?game.debt.totalDue:100000,debtDone=game.completedFixed?.includes('debt')||game.debt?.type!=='yakuza'&&game.tutorialDone;return [{id:'debt',label:'Devuelve el préstamo a la yakuza',text:`Deuda pendiente ${yen(debtDone?0:debtRemaining())}. Mantén caja para la próxima cuota o amortiza anticipadamente.`,value:debtDone?debtTarget:game.debt?.paid||0,target:debtTarget,unit:'¥',reward:0},{id:'fans100',label:'Consigue tus primeros 100 fans',text:'Los conciertos satisfactorios convierten asistentes en seguidores.',value:totalFans(),target:100,unit:'fans',reward:10000},{id:'positive',label:'Logra un concierto con valoración positiva',text:'Ensaya las canciones y lee al público durante el directo.',value:Math.max(0,game.bestConcert),target:1,unit:'valoración',reward:12000},{id:'songs2',label:'Publica una segunda canción',text:'Amplía el repertorio para disponer de más opciones durante los directos.',value:game.songs.length,target:2,unit:'canciones',reward:15000},{id:'fillMomo',label:'Llena Club Momo',text:'Alcanza al menos el 90% de su aforo mediante precio y promoción.',value:Math.max(0,...game.concertHistory.filter(x=>x.venue==='Club Momo').map(x=>x.attendance)),target:72,unit:'asistentes',reward:18000},{id:'biggerVenue',label:'Actúa en una sala de mayor categoría',text:'Desbloquea una sala y programa un concierto fuera de Club Momo.',value:game.concertHistory.some(x=>x.venue!=='Club Momo')?1:0,target:1,unit:'concierto',reward:25000}]}
function primaryObjective(){if(game.tutorial&&!game.tutorialDone)return {id:'tutorial',label:'Completa el tutorial',text:'Sigue las indicaciones diarias para aprender el bucle del juego.',value:game.tutorial-1,target:7,unit:'días'};return guidedObjectives().find(o=>o.value<o.target)||null}
function objectiveCard(){let o=primaryObjective();if(!o){ensureGoals();o=game.goals[0]?{label:game.goals[0].label,text:`Recompensa: ${yen(game.goals[0].reward)}.`,value:goalProgress(game.goals[0]),target:game.goals[0].target,unit:''}:{label:'Construye tu propia carrera',text:'El juego generará un nuevo reto al comenzar la próxima semana.',value:0,target:1,unit:''}}let ratio=clamp(o.value/o.target*100,0,100);return `<div class="card"><span class="badge purple">OBJETIVO PRINCIPAL</span><h2 style="margin-top:10px">${escapeHTML(o.label)}</h2><p class="muted">${escapeHTML(o.text)}</p><div class="progress"><i style="width:${ratio}%"></i></div><div class="row"><span>Progreso</span><b>${o.unit==='¥'?`${yen(o.value)} / ${yen(o.target)}`:`${o.value.toLocaleString('es-ES')} / ${o.target.toLocaleString('es-ES')} ${o.unit}`}</b></div><button class="button secondary small" onclick="setScreen('goals')">Ver objetivos</button></div>`}
function ensureGoals(){if(game.tutorial&&!game.tutorialDone||primaryObjective())return;game.careerTier=careerTier();game.goals=game.goals.filter(g=>!g.done);while(game.goals.length<3){let pool=[{type:'fans',label:`Alcanza ${Math.max(500,Math.ceil((totalFans()+1)/500)*500)} fans`,target:Math.max(500,Math.ceil((totalFans()+1)/500)*500),reward:25000},{type:'streams',label:'Consigue 10.000 escuchas semanales',target:Math.max(10000,Math.ceil((maxWeeklyStreams()+1)/10000)*10000),reward:30000},{type:'concert',label:'Logra un concierto de +3 o más',target:3,reward:20000},{type:'loyal',label:'Consigue 100 fans fieles',target:Math.max(100,Math.ceil((game.fans.loyal+1)/100)*100),reward:35000},{type:'songs',label:'Mantén 5 canciones activas',target:Math.max(5,game.songs.length+2),reward:20000}];let candidates=pool.filter(p=>!game.goals.some(g=>g.type===p.type));if(!candidates.length)break;let g={...choose(candidates),id:'g'+Date.now()+Math.random()};game.goals.push(g)}}
function goalProgress(g){return g.type==='fans'?totalFans():g.type==='streams'?maxWeeklyStreams():g.type==='concert'?game.bestConcert:g.type==='loyal'?game.fans.loyal:g.type==='songs'?game.songs.length:0}
function maxWeeklyStreams(){return Math.max(0,...game.songs.map(s=>s.weeklyStreams||0))}
function checkGoals(){if(game.tutorialDone){for(let o of guidedObjectives()){if(o.value>=o.target&&!game.completedFixed.includes(o.id)){game.completedFixed.push(o.id);if(o.reward)addLedger(o.reward,'Objetivo','Recompensa: '+o.label);game.inbox.push({title:'Objetivo guiado completado',text:`${o.label}${o.reward?`. Recompensa: ${yen(o.reward)}.`:'.'}`})}}}ensureGoals();for(let g of game.goals){if(goalProgress(g)>=g.target&&!g.done){g.done=true;addLedger(g.reward,'Objetivo','Recompensa: '+g.label);game.inbox.push({title:'Objetivo completado',text:`${g.label}. Recompensa: ${yen(g.reward)}.`})}}ensureGoals()}
function renderGoals(){ensureGoals();let fixed=primaryObjective(),guided=guidedObjectives();return `${pageHeader('Carrera y objetivos','Los primeros retos enseñan el juego; después se adaptan a tu carrera.')}<div class="hero"><span class="badge">${fixed?'OBJETIVO PRINCIPAL':'CARRERA INFINITA'}</span><h2>${escapeHTML(fixed?.label||`Nivel ${game.careerTier}`)}</h2><p>${escapeHTML(fixed?.text||'Los nuevos objetivos se generan según el estado actual del grupo.')}</p>${fixed?`<div class="progress"><i style="width:${clamp(fixed.value/fixed.target*100,0,100)}%"></i></div>`:''}</div>${fixed?`<div class="card" style="margin-top:16px"><h2>Ruta guiada</h2>${guided.map(o=>{let done=o.value>=o.target,ratio=clamp(o.value/o.target*100,0,100);return `<div class="row"><div><b>${done?'✓ ':''}${escapeHTML(o.label)}</b><div class="muted tiny">${o.unit==='¥'?`${yen(o.value)} / ${yen(o.target)}`:`${o.value.toLocaleString('es-ES')} / ${o.target.toLocaleString('es-ES')} ${o.unit}`}${o.reward?` · recompensa ${yen(o.reward)}`:''}</div><div class="progress" style="margin-top:6px"><i style="width:${ratio}%"></i></div></div><span class="badge ${done?'mint':o.id===fixed.id?'purple':'gold'}">${done?'Completado':o.id===fixed.id?'Actual':'Pendiente'}</span></div>`}).join('')}</div>`:''}${game.goals.length?`<div class="options" style="margin-top:16px">${game.goals.map(g=>{let p=goalProgress(g),ratio=clamp(p/g.target*100,0,100);return `<div class="option"><span class="badge purple">OBJETIVO GENERADO</span><h3 style="margin-top:10px">${escapeHTML(g.label)}</h3><p>${p.toLocaleString('es-ES')} / ${g.target.toLocaleString('es-ES')}</p><div class="progress"><i style="width:${ratio}%"></i></div><p class="muted tiny">Recompensa: ${yen(g.reward)}</p></div>`}).join('')}</div>`:''}<div class="card" style="margin-top:16px"><h2>Récords</h2><div class="row"><span>Mejor concierto</span><b>${game.bestConcert>0?'+':''}${game.bestConcert}</b></div><div class="row"><span>Máximo de fans</span><b>${game.records.maxFans}</b></div><div class="row"><span>Mayor streaming semanal</span><b>${game.records.maxStreams}</b></div><div class="row"><span>Nivel de carrera</span><span class="badge mint">${game.careerTier}</span></div></div>`}
function setConcertTab(tab){selected.concertTab=tab;render()}
function renderConcerts(){
 let tab=selected.concertTab||'upcoming',tabs=`<div class="tabs"><button class="${tab==='upcoming'?'active':''}" onclick="setConcertTab('upcoming')">Próximos conciertos</button><button class="${tab==='venues'?'active':''}" onclick="setConcertTab('venues')">Buscar salas</button><button class="${tab==='history'?'active':''}" onclick="setConcertTab('history')">Historial</button></div>`,body='';
 if(tab==='upcoming'){
  if(!game.concert)body=`<div class="card empty"><div class="emoji">▣</div><h2>No hay conciertos programados</h2><p>Compara salas, elige una fecha y fija el precio de entrada.</p><button class="button" onclick="setConcertTab('venues')">Buscar salas</button></div>`;
  else{let c=game.concert,left=c.day-game.day,gross=c.expected*c.ticketPrice,protectedBooking=c.tutorialProtected&&!game.tutorialDone;body=`<div class="grid"><div class="card"><span class="badge ${left===0?'red':'purple'}">${left===0?'HOY':`FALTAN ${left} DÍAS`}</span><h2 style="margin-top:10px">${escapeHTML(c.venue.name)}</h2><div class="row"><span>Fecha</span><b>${shortDate(c.day)}</b></div><div class="row"><span>Aforo</span><b>${c.venue.capacity}</b></div><div class="row"><span>Precio de entrada</span><b>${yen(c.ticketPrice)}</b></div><div class="row"><span>Asistencia prevista</span><b>${c.expected}/${c.venue.capacity}</b></div><div class="row"><span>Recaudación prevista</span><b>${yen(gross)}</b></div><div class="actions"><button class="button secondary" onclick="openModal('editTicket')" ${left<=3?'disabled':''}>Modificar entrada</button><button class="button ghost" onclick="openModal('cancelConcert')" ${protectedBooking?'disabled title="Esta reserva es necesaria para completar el tutorial"':''}>${protectedBooking?'🔒 Reserva protegida':'Cancelar reserva'}</button>${left===0?`<button class="button" onclick="startConcert()">Empezar concierto</button>`:''}</div>${protectedBooking?'<div class="notice gold"><b>Reserva del tutorial protegida.</b> Podrás gestionar libremente las reservas posteriores.</div>':left<=3?'<div class="notice">La venta está abierta: el precio ya no puede modificarse.</div>':''}</div><div class="card"><h2>Estado previo</h2><div class="row"><span>Público dominante</span><b>${audienceType()}</b></div><div class="row"><span>Atención</span><b>${Math.round(game.attention)}/100</b></div><div class="row"><span>Energía media</span><b>${pct(avgEnergy())}</b></div><div class="row"><span>Punto más débil</span><b>${escapeHTML(weakestPrep().label)}</b></div><div class="notice mint">Al empezar entrarás directamente al concierto. Allí elegirás canciones del repertorio o técnicas especiales para hacer subir la ovación y provocar un encore.</div></div></div>`}
 }else if(tab==='venues'){
  body=`<div class="card venue-catalog"><h2>Catálogo de salas</h2>${venueTemplates.map((v,i)=>{let locked=totalFans()<v.unlock,tutorialBooking=game.tutorial===4&&!game.tutorialDone;return `<div class="row"><div><b>${escapeHTML(v.name)} · ${v.capacity} personas</b><div class="muted tiny">Alquiler ${yen(v.cost)} · entrada recomendada ${yen(v.ticket)} · calidad ${v.quality}</div></div><div>${locked?`<span class="badge red">Requiere ${v.unlock} fans</span>`:`<button class="button small" ${game.concert?'disabled':''} onclick="openModal('book',{venueIndex:${i},tutorial:${tutorialBooking}})">Reservar</button>`}</div></div>`}).join('')}</div>${game.concert?'<div class="notice">Solo puedes mantener un concierto futuro reservado en esta versión.</div>':''}`;
 }else body=game.concertHistory.length?`<div class="card"><h2>Conciertos celebrados</h2>${[...game.concertHistory].reverse().map(x=>`<div class="row"><div><b>${escapeHTML(x.venue)}</b><div class="muted tiny">${shortDate(x.day)} · ${x.attendance} asistentes · satisfacción ${x.satisfaction}</div></div><span class="badge ${x.note>0?'mint':x.note<0?'red':'gold'}">${x.note>0?'+':''}${x.note}</span></div>`).join('')}</div>`:`<div class="card empty"><div class="emoji">♫</div>Aquí aparecerán los conciertos celebrados.</div>`;
 return `${pageHeader('Conciertos','Busca salas, gestiona reservas y consulta resultados.')}${tabs}${body}`
}
function audienceType(){let f=game.fans,p=Object.values(f.personal).reduce((a,b)=>a+b,0);let arr=[['Curiosos',f.curious],['Simpatizantes',f.sympathizers],['Fans personales',p],['Fieles',f.loyal]];return arr.sort((a,b)=>b[1]-a[1])[0][1]?'Mayormente '+arr[0][0].toLowerCase():'Público nuevo'}
function actionLabel(a){if(!a)return 'Libre';if(a.startsWith('song:'))return game.songs.find(s=>s.id===a.slice(5))?.title||'Canción';return {greet:'Saludar',talk:'Hablar con el público',clap:'Pedir palmas',cute:'Hacer una monería',special:'Técnica especial',close:'Cerrar'}[a]||a}
function concertPlanMeta(id){return {safe:{id:'safe',name:'Conservador',desc:'Menos fatiga y resultados más estables.',badge:'Riesgo bajo'},balanced:{id:'balanced',name:'Equilibrado',desc:'Sin bonificaciones ni penalizaciones importantes.',badge:'Riesgo medio'},ambitious:{id:'ambitious',name:'Ambicioso',desc:'Más rendimiento y emoción, pero también más desgaste y variación.',badge:'Riesgo alto'}}[id]||concertPlanMeta('balanced')}
function concertApproachMeta(id){return {safe:{id:'safe',name:'Interpretación segura',desc:'Reduce variación y fatiga. Genera emoción moderada.',badge:'Fiable'},connect:{id:'connect',name:'Conectar con el público',desc:'Prioriza Encanto y Vínculo. Convierte mejor a los asistentes en fans.',badge:'Más vínculo'},allout:{id:'allout',name:'Ir a por todas',desc:'Busca el máximo impacto, con más fatiga y riesgo de fallo.',badge:'Más emoción'}}[id]||concertApproachMeta('safe')}
function concertBlockName(i){return ['Apertura','Momento central','Final'][i]||(i===3?'Encore':'Directo')}
function concertCurrentSong(c=game.activeConcert){let id=c.block>=3?c.encoreSongId:c.lineup?.[c.block];return game.songs.find(s=>s.id===id)||game.songs[0]}
function concertGauges(c){return `<div class="concert-core"><div class="stat"><small>Emoción</small><strong>${Math.round(c.emotion)}</strong><div class="progress"><i style="width:${clamp(c.emotion,0,100)}%"></i></div></div><div class="stat"><small>Vínculo</small><strong>${Math.round(c.bond)}</strong><div class="progress"><i style="width:${clamp(c.bond,0,100)}%"></i></div></div></div><div class="stats"><div class="stat"><small>Público presente</small><strong>${c.audience}/${c.capacity}</strong></div><div class="stat"><small>Energía del grupo</small><strong>${pct(avgEnergy())}</strong></div><div class="stat"><small>Plan</small><strong style="font-size:17px">${escapeHTML(concertPlanMeta(c.plan).name)}</strong></div><div class="stat"><small>Bloque</small><strong style="font-size:17px">${escapeHTML(concertBlockName(c.block))}</strong></div></div>`}
function concertTimeline(c){return `<div class="timeline" style="grid-template-columns:repeat(${c.encore?4:3},1fr)">${Array.from({length:3},(_,i)=>{let p=c.performances?.find(x=>x.block===i);return `<div class="turn ${p?'done':i===c.block?'active':''}"><b>${concertBlockName(i)}</b><br>${p?escapeHTML(p.songTitle):i===c.block?'AHORA':'—'}</div>`}).join('')}${c.encore?`<div class="turn ${c.block>3?'done':c.block===3?'active':''}"><b>Encore</b><br>${c.block===3?'AHORA':'✓'}</div>`:''}</div>`}
function renderConcertSetup(c){let chosen=c.lineup||[],plans=['safe','balanced','ambitious'];return `${pageHeader('Preparar el concierto','Ordena el setlist y decide cuánto riesgo asumirá el grupo.')}${concertGauges(c)}<div class="grid"><div class="card"><h2>Setlist · tres momentos</h2><div class="setlist">${Array.from({length:3},(_,i)=>`<label class="setlist-row"><b>${i+1}. ${concertBlockName(i)}</b><select onchange="selectConcertSong(${i},this.value)">${game.songs.map(song=>{let duplicate=game.songs.length>=3&&chosen.some((id,j)=>j!==i&&id===song.id);return `<option value="${song.id}" ${chosen[i]===song.id?'selected':''} ${duplicate?'disabled':''}>${escapeHTML(song.title)} · frescura ${Math.round(song.freshness)}</option>`}).join('')}</select></label>`).join('')}</div><div class="notice" style="margin-top:14px">En el directo, cada canción y cada técnica solo pueden usarse una vez. Si el público queda encantado, podrás repetir una canción en el encore.</div></div><div class="card"><h2>Plan general</h2><div class="options" style="grid-template-columns:1fr">${plans.map(id=>{let p=concertPlanMeta(id);return `<button class="option ${c.plan===id?'selected':''}" style="text-align:left" onclick="setConcertPlan('${id}')"><span class="badge ${id==='safe'?'mint':id==='ambitious'?'red':'purple'}">${p.badge}</span><h3 style="margin-top:9px">${p.name}</h3><p class="muted">${p.desc}</p></button>`}).join('')}</div><div class="actions"><button class="button" onclick="confirmConcertSetup()">Empezar directo</button></div></div></div>`}
function renderConcertIncident(c){return `${pageHeader('Incidente durante el directo','El problema no consume un bloque, pero tu respuesta tendrá consecuencias.')}${concertGauges(c)}${concertTimeline(c)}<div class="grid"><div><div class="stage"><div class="stage-symbol">! ✦ !<div style="font-size:15px;letter-spacing:0;color:#fff;margin-top:14px">${escapeHTML(c.incident.title)}</div></div></div><div class="card"><h2>Qué ha ocurrido</h2><p>${escapeHTML(c.incident.text)}</p></div></div><div class="card"><h2>Elige una respuesta</h2><div class="action-list">${c.incident.options.map((o,i)=>`<button class="action-btn" onclick="performConcert('incident:${i}')"><span><strong>${escapeHTML(o.name)}</strong><small>${escapeHTML(o.desc)}</small></span><span>›</span></button>`).join('')}</div></div></div>`}
function renderEncoreDecision(c){return `${pageHeader('¡El público pide otra!','Has desbloqueado un encore. Puedes aprovecharlo o conservar la energía del grupo.')}${concertGauges(c)}${concertTimeline(c)}<div class="grid"><div class="hero encore-glow"><span class="badge gold">ENCORE</span><h2>La sala no quiere que termine</h2><p>Escoge una canción. Después podrás aplicar una técnica disponible y decidir si haces un encore seguro, cercano o explosivo.</p><div class="field"><label>Canción del encore</label><select onchange="setEncoreSong(this.value)">${game.songs.map(song=>`<option value="${song.id}" ${c.encoreSongId===song.id?'selected':''}>${escapeHTML(song.title)} · frescura ${Math.round(song.freshness)}</option>`).join('')}</select></div></div><div class="card"><h2>Decisión final</h2><div class="actions"><button class="button" onclick="beginEncore()">Preparar encore</button><button class="button secondary" onclick="finishConcert(false)">Terminar en lo más alto</button></div><div class="notice mint" style="margin-top:14px">El encore añade una pequeña bonificación al resultado, pero consume energía y puede empeorar una gran actuación si sale mal.</div></div></div>`}
function renderPerformanceReport(p){return `<div class="concert-report"><div class="row"><div><b>${escapeHTML(p.songTitle)}</b><div class="muted tiny">${escapeHTML(concertBlockName(p.block))} · ${escapeHTML(concertApproachMeta(p.approach).name)}</div></div><span class="badge ${p.avg>=70?'mint':p.avg>=48?'gold':'red'}">Resultado ${Math.round(p.avg)}</span></div><div class="concert-scoreline"><span>Voz <b>${Math.round(p.voice.score)}</b></span><span>Baile <b>${Math.round(p.dance.score)}</b></span><span>Escena <b>${Math.round(p.stage.score)}</b></span></div><div class="factor-list">${(p.factors||[]).slice(0,3).map(x=>`<span class="badge purple">${escapeHTML(x)}</span>`).join('')}</div></div>`}
function renderConcert(){let c=game.activeConcert;if(!c)return renderConcerts();if(c.phase==='setup')return renderConcertSetup(c);if(c.phase==='incident')return renderConcertIncident(c);if(c.phase==='encoreDecision')return renderEncoreDecision(c);let s=concertCurrentSong(c);if(!s)return renderConcerts();let plan=concertPlanMeta(c.plan),forecast=['voice','dance','stage'].map(r=>roleForecast(s,r).center).reduce((a,b)=>a+b,0)/3;return `${pageHeader(`Directo · ${concertBlockName(c.block)}`,c.block===3?'El encore puede convertir una gran noche en una actuación legendaria.':'Elige cómo interpretar la canción; la decisión consume este bloque.')}${concertGauges(c)}${concertTimeline(c)}<div class="grid"><div><div class="stage"><div class="stage-symbol">♪ ✦ ♪<div style="font-size:15px;letter-spacing:0;color:#fff;margin-top:14px">${escapeHTML(c.venueName)} · ${c.audience} personas</div></div></div><div class="card concert-log"><h2>Crónica del directo</h2>${(c.performances||[]).slice().reverse().map(renderPerformanceReport).join('')||'<div class="muted">El público espera la primera canción...</div>'}${c.log?.length?`<div style="margin-top:10px">${c.log.slice(-3).reverse().map(l=>`<div class="row"><span>${escapeHTML(l.text)}</span><span class="badge ${l.good?'mint':l.bad?'red':'purple'}">${escapeHTML(l.effect||'')}</span></div>`).join('')}</div>`:''}</div></div><div><div class="card"><span class="badge">${escapeHTML(concertBlockName(c.block).toUpperCase())}</span><h2 style="margin-top:10px">${escapeHTML(s.title)}</h2><div class="row"><span>Previsión orientativa</span><b>${clamp(Math.round(forecast-8),0,100)}–${clamp(Math.round(forecast+8),0,100)}</b></div><div class="row"><span>Frescura</span><b>${Math.round(s.freshness)}</b></div><div class="row"><span>Plan general</span><b>${escapeHTML(plan.name)}</b></div></div><div class="card"><h2>Técnica especial <span class="muted tiny">· gratuita</span></h2><div class="technique-list">${game.members.map(m=>{let used=c.specialUsed.includes(m.id),blocked=used||c.blockTechniqueUsed;return `<button class="action-btn technique-btn ${used?'used':''}" ${blocked?'disabled':''} onclick="useConcertTechnique('${m.id}')"><span><strong>${escapeHTML(m.special.name)} · ${escapeHTML(m.stageName)}</strong><small>${escapeHTML(m.special.desc)}</small></span><span>${used?'✓':'+'}</span></button>`}).join('')}</div>${c.blockTechniqueUsed?`<div class="notice mint" style="margin-top:10px"><b>Técnica preparada:</b> ${escapeHTML(c.currentTechnique||'Aplicada')}</div>`:'<div class="muted tiny" style="margin-top:9px">Puedes usar una técnica como máximo en cada bloque.</div>'}</div><div class="card"><h2>Enfoque de la canción</h2><div class="options" style="grid-template-columns:1fr">${['safe','connect','allout'].map(id=>{let a=concertApproachMeta(id);return `<button class="option approach-card" onclick="performConcert('approach:${id}')"><span class="badge ${id==='safe'?'mint':id==='allout'?'red':'purple'}">${a.badge}</span><h3 style="margin-top:9px">${a.name}</h3><p class="muted">${a.desc}</p><span class="approach-risk">${id==='safe'?'− emoción máxima · − fatiga':id==='connect'?'+ vínculo · protagonismo personal':'+ emoción máxima · + fatiga'}</span></button>`}).join('')}</div></div></div></div>`}
function selectConcertSong(index,id){let c=game.activeConcert;if(!c||c.phase!=='setup')return;if(game.songs.length>=3&&c.lineup.some((x,i)=>i!==index&&x===id)){toast('Cada bloque debe usar una canción distinta');render();return}c.lineup[index]=id;saveAuto();render()}
function setConcertPlan(id){let c=game.activeConcert;if(!c||c.phase!=='setup')return;c.plan=id;saveAuto();render()}
function confirmConcertSetup(){let c=game.activeConcert;if(!c)return;if(!c.lineup?.length||c.lineup.some(id=>!game.songs.some(s=>s.id===id))){toast('Completa el setlist');return}if(game.songs.length>=3&&new Set(c.lineup).size<3){toast('Escoge tres canciones distintas');return}c.phase='perform';c.block=0;saveAuto();render()}
function setEncoreSong(id){let c=game.activeConcert;if(!c)return;c.encoreSongId=id;saveAuto();render()}

function signed(n){return (n>0?'+':'')+Math.round(n)}

function concertSongDifficultyScore(song){return clamp(Math.round((song.voiceDemand+song.danceDemand+song.stageDemand+song.lyricComplexity)/4),20,100)}
function concertSongDifficultyStars(song){return clamp(Math.round(concertSongDifficultyScore(song)/20),1,5)}

function concertSongTile(title){let words=String(title||'♪').split(/\s+/).filter(Boolean),abbr=(words[0]?.slice(0,2)||'♪')+(words[1]?.slice(0,1)||'');abbr=abbr.slice(0,3);return `<div class="song-tile">${escapeHTML(abbr)}</div>`}
function concertTechniqueFromMember(member){let name=member?.special?.name||'';if(name==='Nota imposible')return {type:'roleBoost',role:'voice',value:18,label:'Refuerza la próxima canción',desc:'La próxima canción obtiene una gran bonificación de voz.'};if(name==='Paso relámpago')return {type:'roleBoost',role:'dance',value:18,label:'Refuerza la próxima canción',desc:'La próxima canción obtiene una gran bonificación de baile.'};if(name==='Sonrisa salvavidas')return {type:'crowdLift',label:'Sube la ovación y recupera energía',desc:'La ovación sube y el grupo recupera 8 de energía.'};if(name==='Aprendizaje fugaz')return {type:'stabilize',label:'Asegura la próxima canción',desc:'La próxima canción no podrá terminar en desastre.'};if(name==='Encore natural')return {type:'encoreThreshold',label:'Reduce el umbral del encore',desc:'El público pedirá encore a partir de 72 de ovación.'};if(name==='Respirar juntas')return {type:'breath',label:'Recupera energía',desc:'El grupo recupera 10 de energía y reduce la fatiga de la próxima canción.'};return {type:'crowdLift',label:'Apoyo al directo',desc:member?.special?.desc||'Apoya la siguiente actuación.'}}
function concertPendingLabel(p){if(!p)return '';return p.kind==='roleBoost'?'Bonificación preparada':p.kind==='stabilize'?'Seguridad preparada':p.kind==='breath'?'Descanso preparado':'Técnica preparada'}
function concertSongMastery(song){let perf=concertSongProjected(song);return Math.round(perf.avg)}
function concertSongProjected(song){let roles=[['voice','voice',song.voiceDemand],['dance','dance',song.danceDemand],['stage','charm',song.stageDemand]],out={},sum=0,weight=0;for(let item of roles){let role=item[0],stat=item[1],demand=item[2],ids=(song.assignments?.[role]||[]).slice();if(!ids.length&&game.members[0])ids=[game.members[0].id];let vals=[];for(let id of ids){let m=game.members.find(x=>x.id===id);if(!m)continue;let prep=prepFor(id,song)[role]||10;let base=.52*m[stat]+.33*prep+.15*m.energy;let score=clamp(base-Math.max(0,demand-base)*.35,0,100);vals.push(score)}let roleScore=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:18;out[role]=roleScore;sum+=roleScore*demand;weight+=demand}return {voice:out.voice||18,dance:out.dance||18,stage:out.stage||18,avg:weight?sum/weight:18}}

function renderConcertLiveKPIs(c){let remaining=c.phase==='encore'?1:c.momentsLeft;return `<div class="live-kpi-grid"><div class="live-kpi"><div class="live-kpi-top"><div class="live-kpi-icon" style="background:#ffe8f3;color:var(--pink)">★</div><div><div class="live-kpi-label">Ovación</div><div class="live-kpi-value"><span style="color:var(--pink)">${Math.round(c.ovation)}</span><span style="color:#79758c">/100</span></div><div class="live-kpi-note">Encore a partir de ${c.encoreThreshold}</div></div></div><div class="live-progress"><i style="width:${clamp(c.ovation,0,100)}%;background:linear-gradient(90deg,var(--pink),var(--purple))"></i></div></div><div class="live-kpi"><div class="live-kpi-top"><div class="live-kpi-icon" style="background:#efe6fb;color:#8f59dd">👥</div><div><div class="live-kpi-label">Público presente</div><div class="live-kpi-value">${c.audience}/${c.capacity}</div></div></div>${concertAudienceIcons(c.audience,c.capacity)}</div><div class="live-kpi"><div class="live-kpi-top"><div class="live-kpi-icon" style="background:#e4f8f1;color:#17966f">⚡</div><div><div class="live-kpi-label">Energía del grupo</div><div class="live-kpi-value" style="color:#17966f">${Math.round(avgEnergy())}%</div></div></div><div class="live-progress"><i style="width:${clamp(avgEnergy(),0,100)}%;background:#19a36b"></i></div></div><div class="live-kpi"><div class="live-kpi-top"><div class="live-kpi-icon" style="background:#ffe8f3;color:#f53f99">⏳</div><div><div class="live-kpi-label">Momentos restantes</div><div class="live-kpi-value" style="color:#f53f99">${remaining}</div></div></div><div class="live-dot-row">${Array.from({length:c.momentsTotal},(_,i)=>`<i class="live-dot ${i<remaining?'on':''}"></i>`).join('')}</div></div></div>`}
function renderConcertSongRow(c,song,encoreMode){let used=!!c.songsUsed[song.id]&&!encoreMode,badge=concertSongImpactBadge(song),mastery=concertSongMastery(song),stars=concertSongDifficultyStars(song);return `<div class="song-action ${used?'disabled':''}">${concertSongTile(song.title)}<div><div class="song-title">${escapeHTML(song.title)}</div><div class="song-meta"><span>Dificultad ${concertStarsHTML(stars)}</span><span>Dominio <span class="dominance">${mastery}</span></span></div></div><span class="impact-badge ${badge[1]}">${badge[0]}</span><button class="button" ${used?'disabled':''} onclick="performConcert('song:${song.id}${encoreMode?':encore':''}')">🎵 ${used?'Ya interpretada':'Interpretar'}</button></div>`}

function renderConcert(){let c=game.activeConcert;if(!c)return renderConcerts();if(!c.phase||c.phase==='setup')c.phase='live';let encoreMode=c.phase==='encore';let title=encoreMode?'¡Encore!':'Concierto en directo';let subtitle=encoreMode?'El público ha pedido otra. Puedes repetir una canción ya interpretada para cerrar el concierto.':'Elige canciones o técnicas especiales para hacer subir la ovación y provocar un encore.';let header=`<div class="topbar"><div class="page-title"><h1>${title} <span class="live-header-badge"><i></i>${encoreMode?'ENCORE':'EN DIRECTO'}</span></h1><p>${subtitle}</p></div><div class="topbar-meta"><div class="cash-chip" aria-label="Caja disponible"><small>Caja</small><b>${yen(game.cash)}</b></div><button class="date-chip" onclick="openCalendar()" aria-label="Abrir calendario mensual"><strong>${weekdays[game.day%7]} ${game.day%30+1}</strong>${months[Math.floor(game.day/30)%12]} · Año ${Math.floor(game.day/360)+1} · 🗓</button></div></div>`;let songList=(encoreMode?game.songs.filter(s=>c.songsUsed[s.id]):game.songs).map(s=>renderConcertSongRow(c,s,encoreMode)).join('')||'<div class="live-empty">No hay canciones disponibles.</div>';let techniqueList=encoreMode?'':game.members.map(m=>renderConcertTechniqueRow(c,m)).join('');return `${header}${renderConcertLiveKPIs(c)}<div class="live-grid"><div class="live-main-card ${encoreMode?'encore-card':''}"><div class="live-section-title"><span class="icon">${encoreMode?'⭐':'♪'}</span>${encoreMode?'Encore disponible':'Acciones disponibles'}</div>${encoreMode?`<div class="notice gold" style="margin-bottom:14px">El encore consume el momento final. Solo podrás repetir una canción que ya hayas interpretado.</div>`:`<div class="live-subtitle">🎵 Canciones del repertorio</div>`}<div class="live-action-list">${songList}</div>${encoreMode?'':`<div class="live-subtitle" style="margin-top:18px">✦ Técnicas especiales</div><div class="live-action-list">${techniqueList||'<div class="live-empty">No hay técnicas disponib function startConcert(){if(!game.concert){toast('No hay concierto programado');return}if(game.concert.day>game.day){toast(`El concierto es ${shortDate(game.concert.day)}`);return}if(!game.songs.length){toast('Necesitas al menos una canción');return}let expected=predictAttendance(game.concert.venue,game.concert.ticketPrice),moments=concertMomentCount(game.concert.venue);game.activeConcert={phase:'live',venueName:game.concert.venue.name,venueCost:game.concert.venue.cost||0,capacity:game.concert.venue.capacity,ticketPrice:game.concert.ticketPrice,street:!!game.concert.venue.street,audience:expected,startAudience:expected,peakAudience:expected,peopleReached:expected,ovation:clamp(18+game.attention*.25+Math.min(10,totalFans()*.01),0,100),momentsTotal:moments,momentsLeft:moments,encoreThreshold:80,songsUsed:{},usedTechniques:{},pendingTechnique:null,history:[],performances:[],highlights:{}};screen='concert';saveAuto();render()}

function performConcert(action){let c=game.activeConcert;if(!c)return;if(action.startsWith('tech:')){let id=action.split(':')[1],m=game.members.find(x=>x.id===id);if(!m||c.usedTechniques[id]){toast('Esa técnica ya no está disponible');return}let tech=concertTechniqueFromMember(m);c.usedTechniques[id]=true;c.momentsLeft=Math.max(0,c.momentsLeft-1);if(tech.type==='roleBoost'){c.pendingTechnique={kind:'roleBoost',role:tech.role,value:tech.value,title:tech.desc,memberId:id};concertLog(c,`${m.special.name} · ${m.stageName}`,'Preparación para la próxima canción',0)}else if(tech.type==='crowdLift'){game.members.forEach(x=>x.energy=clamp(x.energy+8,0,100));c.ovation=clamp(c.ovation+8,0,100);concertLog(c,`${m.special.name} · ${m.stageName}`,'La ovación sube y el grupo recupera energía',8)}else if(tech.type==='stabilize'){c.pendingTechnique={kind:'stabilize',title:tech.desc,memberId:id};concertLog(c,`${m.special.name} · ${m.stageName}`,'La próxima canción no podrá salir desastrosa',0)}else if(tech.type==='encoreThreshold'){c.encoreThreshold=Math.min(c.encoreThreshold,72);concertLog(c,`${m.special.name} · ${m.stageName}`,'El umbral del encore se reduce a 72',0)}else if(tech.type==='breath'){game.members.forEach(x=>x.energy=clamp(x.energy+10,0,100));c.pendingTechnique={kind:'breath',title:tech.desc,memberId:id};concertLog(c,`${m.special.name} · ${m.stageName}`,'El grupo recupera energía y reduce la fatiga',0)}else{concertLog(c,`${m.special.name} · ${m.stageName}`,'La técnica prepara al grupo para el siguiente momento',0)}toast('Técnica activada');finalizeConcertAction();return}

function resolveSimpleConcertSong(song,isEncore){let c=game.activeConcert,roles=[['voice','voice',song.voiceDemand],['dance','dance',song.danceDemand],['stage','charm',song.stageDemand]],res={},total=0,weights=0;for(let item of roles){let role=item[0],stat=item[1],demand=item[2],ids=(song.assignments?.[role]||[]).slice();if(!ids.length&&game.members[0])ids=[game.members[0].id];let scores=[];for(let id of ids){let m=game.members.find(x=>x.id===id);if(!m)continue;let prep=prepFor(id,song)[role]||10;let base=.52*m[stat]+.33*prep+.15*m.energy;if(c.pendingTechnique?.kind==='roleBoost'&&c.pendingTechnique.role===role)base+=c.pendingTechnique.value;let fatigue=(demand/17)*(role==='dance'?1.15:1)+(isEncore?7:0);if(c.pendingTechnique?.kind==='breath')fatigue*=.55;m.energy=clamp(m.energy-fatigue,0,100);let score=clamp(base-Math.max(0,demand-base)*.45+rint(-6,6),0,100);scores.push(score);c.highlights[id]=(c.highlights[id]||0)+score}let roleScore=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:18;res[role]=roleScore;total+=roleScore*demand;weights+=demand}if(c.pendingTechnique?.kind==='stabilize'){let worst=['voice','dance','stage'].sort((a,b)=>res[a]-res[b])[0];if(res[worst]<45)res[worst]=48+Math.max(0,res[worst]*.08)}let avg=weights?total/weights:18;avg=(res.voice*song.voiceDemand+res.dance*song.danceDemand+res.stage*song.stageDemand)/(song.voiceDemand+song.danceDemand+song.stageDemand);let stars=concertSongDifficultyStars(song),cap=[0,10,15,21,28,36][stars],delta=0;if(avg>=90)delta=Math.round(cap*(isEncore?.92:1));else if(avg>=80)delta=Math.round(cap*.78);else if(avg>=70)delta=Math.round(cap*.56);else if(avg>=60)delta=Math.round(cap*.34);else if(avg>=50)delta=Math.round(cap*.14);else if(avg>=40)delta=-Math.round(2+stars*1.4);else delta=-Math.round(5+stars*2.4);if(song.freshness<25&&delta>0)delta-=2;c.ovation=clamp(c.ovation+delta,0,100);applyAudienceFlow(c,delta);song.popularity=clamp(song.popularity+Math.round((avg-42)/14),0,100);song.freshness=clamp(song.freshness-(isEncore?5:8),0,100);let perf={songId:song.id,title:song.title,avg:Math.round(avg),ovationDelta:delta,voice:Math.round(res.voice),dance:Math.round(res.dance),stage:Math.round(res.stage),difficultyStars:stars,mastery:concertSongMastery(song),encore:isEncore};c.pendingTechnique=null;return perf}
function finishConcert(){let c=game.activeConcert;if(!c)return;let perfs=c.performances||[],artistic=perfs.length?perfs.reduce((a,p)=>a+p.avg,0)/perfs.length:20,audienceResponse=Math.round(c.ovation),sat=clamp(Math.round(.55*audienceResponse+.45*artistic+((c.phase==='encoreDone')?4:0)),0,100),note=sat<10?-5:sat<20?-4:sat<30?-3:sat<40?-2:sat<50?-1:sat<60?0:sat<70?1:sat<80?2:sat<88?3:sat<95?4:5;let star=Object.entries(c.highlights).sort((a,b)=>b[1]-a[1])[0]?.[0]||game.members[0]?.id;let personalTotal=Object.values(game.fans.personal).reduce((a,b)=>a+b,0),curious=0,sym=0,personal=0,loyal=0;if(c.ovation<20){curious=-Math.round(game.fans.curious*.05);sym=-Math.round(game.fans.sympathizers*.03)}else if(c.ovation<40){curious=-Math.round(game.fans.curious*.02)}else{let baseAudience=c.street?c.peopleReached:c.startAudience;curious=Math.round(baseAudience*Math.max(0,c.ovation-35)/120);sym=Math.round(game.fans.curious*Math.max(0,c.ovation-60)/450);let best=concertBestPerformance(c);personal=Math.round(game.fans.sympathizers*Math.max(0,(best?.avg||0)-60)/500);if(c.ovation>=90)loyal=Math.round(personalTotal*Math.max(0,c.ovation-88)/850)}game.fans.curious=Math.max(0,game.fans.curious+curious);game.fans.sympathizers=Math.max(0,game.fans.sympathizers+sym);if(star){game.fans.personal[star]=Math.max(0,(game.fans.personal[star]||0)+personal);let m=game.members.find(x=>x.id===star);if(m)m.personalFans=game.fans.personal[star]}game.fans.loyal=Math.max(0,game.fans.loyal+loyal);game.attention=clamp(game.attention+Math.round((note+1)*2),0,100);game.bestConcert=Math.max(game.bestConcert,note);let ticketRevenue=c.startAudience*c.ticketPrice,tipPerPerson=c.street?clamp(Math.round(c.ovation),0,100):0,tips=c.street?Math.round(c.peopleReached*tipPerPerson):0,gross=ticketRevenue+tips,net=gross-c.venueCost,economicScore=clamp(Math.round(50+net/Math.max(10000,c.venueCost||Math.max(1,gross))*35),0,100);if(ticketRevenue)addLedger(ticketRevenue,'Concierto',`Entradas de ${c.venueName}`);if(tips)addLedg
