function ssSongCard(song,{productionIndex=null,detail=false,recommendedFor=''}={}){let producing=productionIndex!==null,meta=ssFocusMeta(song.focus),f=ssSongForecast(song),leader=ssLeader(song.focus),button=producing?`<button class="button" ${game.cash<song.cost?'disabled':''} onclick="chooseSong(${productionIndex})">Elegir</button>`:`<button class="button secondary small" onclick="selected.song='${song.id}';setScreen('songDetail')">Abrir</button>`,actions=producing?`<div class="production-cost"><small class="muted">Coste</small><b>${yen(song.cost)}</b></div>${button}`:`<div><small class="muted">Popularidad</small><b style="display:block">${Math.round(song.popularity||0)}</b></div>${button}`;return `<article class="simple-song-card ${producing?'production-option ':''}${recommendedFor?'recommended ':''}${detail?'highlight':''}">${recommendedFor?`<span class="song-recommendation">✓ RECOMENDADA PARA ${escapeHTML(recommendedFor).toUpperCase()}</span>`:''}<div class="simple-song-head"><div class="simple-focus-icon">${meta.icon}</div><div class="simple-song-title"><h3>${escapeHTML(song.title)}</h3><small>${meta.label}${leader?` · Lidera ${escapeHTML(leader.stageName)}`:''}</small></div></div><div class="simple-song-levels"><div class="simple-level"><small>Dificultad</small><b>${ssStars(Math.ceil(song.difficulty/20))}</b></div><div class="simple-level"><small>Impacto máximo</small><b>${ssStars(song.impact)}</b></div></div><div class="simple-compare"><div class="simple-compare-line"><span>${meta.skill} del grupo</span><b>${Math.round(ssGroupSkill(song.focus))} <span class="muted">vs</span> ${song.difficulty}</b></div><div class="simple-forecast"><small class="muted">Previsión</small><span class="badge ${f.color}">${f.label}</span><b>${f.low}–${f.high}</b></div></div><div class="simple-card-actions">${actions}</div></article>`}

function ssTutorialRecommendedFocus(){let member=game.members[0];if(!member)return null;return [['voice',member.voice],['dance',member.dance],['stage',member.charm]].sort((a,b)=>b[1]-a[1])[0][0]}
function ssRenderProduceModal(m){let tutorial=!!m.data.tutorial,ps=songProposals(tutorial),member=game.members[0],preferred=tutorial?ssTutorialRecommendedFocus():null,skill=preferred?ssFocusMeta(preferred).skill:'';return `<span class="badge">${tutorial?dateLabel().toUpperCase():'PRODUCCIÓN'}</span><h2>Elige el próximo tema</h2><p class="modal-subtitle">${tutorial&&member?`${escapeHTML(member.stageName)} destaca en <b>${skill}</b>. Las tres propuestas cuestan lo mismo y tienen idéntica dificultad e impacto; cambia la habilidad necesaria.`:'Solo importan el tipo, la dificultad y el impacto. La previsión es la misma que verás durante el concierto.'}</p><div class="simple-song-grid production-options-list">${ps.map((s,i)=>ssSongCard(s,{productionIndex:i,recommendedFor:tutorial&&s.focus===preferred?member.stageName:''})).join('')}</div><div class="notice mint" style="margin-top:15px"><b>${tutorial?'La recomendación es orientativa.':'Riesgo frente a recompensa.'}</b><br>${tutorial?'Puedes escoger cualquier canción, pero la señalada aprovecha la mejor habilidad de tu primera artista.':'Los temas difíciles pueden generar más ovación, popularidad y fans, pero necesitan un grupo capaz de interpretarlos.'}</div><div class="actions"><button class="button secondary" onclick="closeModal()">Cancelar</button></div>`}
function ssTrainingRecommendation(){if(game.songs.length){let risky=[...game.songs].sort((a,b)=>ssSongForecast(a).center-ssSongForecast(b).center)[0];if(risky.focus==='voice')return {stat:'voice',reason:`${risky.title} depende de Voz`};if(risky.focus==='dance')return {stat:'dance',reason:`${risky.title} depende de Baile`};if(risky.focus==='stage')return {stat:'charm',reason:`${risky.title} depende de Carisma`}}let weakest=[['voice',ssGroupStat('voice')],['dance',ssGroupStat('dance')],['charm',ssGroupStat('charm')]].sort((a,b)=>a[1]-b[1])[0];return {stat:weakest[0],reason:'Es la habilidad colectiva más baja'}}
function ssTrainingPreview(stat,cost){let focus={voice:'voice',dance:'dance',charm:'stage'}[stat],songs=game.songs.filter(s=>s.focus===focus||s.focus==='balanced'),current=ssGroupStat(stat),after=clamp(current+1,0,100),risk=songs.sort((a,b)=>ssSongForecast(a).center-ssSongForecast(b).center)[0],forecast='Sin temas actuales',gain='Preparación para futuros temas';if(risk){let f=ssSongForecast(risk),delta=ssEnergyFactor()*(risk.focus==='balanced'?1/3:1),center=clamp(f.center+delta,0,100),low=clamp(Math.round(center-5),0,100),high=clamp(Math.round(center+5),0,100);forecast=`${f.low}–${f.high} → ${low}–${high}`;gain=`≈ +${delta.toFixed(1).replace('.',',')} al rendimiento con la misma energía`}return {focus,songs,current,after,risk,forecast,gain,energyAfter:clamp(Math.round(avgEnergy()-cost-game.members.length*5),0,100)}}
function ssRenderTrainModal(){let choices=[['voice','Entrenamiento vocal',15,'🎙','#e83287'],['dance','Entrenamiento de baile',20,'♬','#8e55d8'],['charm','Entrenamiento escénico',15,'★','#d78a13']],recommendation=ssTrainingRecommendation(),energy=Math.round(avgEnergy());return `<span class="badge purple">ENTRENAMIENTO DE GRUPO</span><h2>¿Qué conviene entrenar hoy?</h2><p class="modal-subtitle">Compara la habilidad actual, los temas que la utilizan y el cambio previsto. La mejora es permanente para toda la formación.</p><div class="training-overview"><div><small>Recomendación</small><b>${escapeHTML(recommendation.reason)}</b></div><div><small>Energía actual</small><b>${energy}%</b></div><div><small>Efecto fijo</small><b>+1 a todas</b></div></div><div class="training-decision-list">${choices.map(([key,label,cost,icon,color])=>{let p=ssTrainingPreview(key,cost),recommended=key===recommendation.stat,songNames=p.songs.map(s=>escapeHTML(s.title)).join(', ');return `<article class="training-analysis-card ${recommended?'recommended':''}" style="--training:${color}"><div class="training-choice-title"><span class="training-choice-icon">${icon}</span><div>${recommended?'<span class="badge mint">RECOMENDADO</span>':''}<h3>${label}</h3><div class="training-stat-jump"><span>${Math.round(p.current)}</span><span>→</span><strong>${Math.round(p.after)}</strong></div></div></div><div class="training-song-fit"><small>Temas afectados</small><b>${songNames||'Ninguno todavía'}</b></div><div class="training-forecast-impact"><small>Previsión del tema más exigente</small><b>${p.risk?`${escapeHTML(p.risk.title)} · ${p.forecast}`:p.forecast}</b><span>${p.gain}</span></div><div class="training-card-action"><div><small>Energía</small><b>${energy}% → ${p.energyAfter}%</b></div><button class="button" ${energy<cost?'disabled':''} onclick="confirmGroupTraining('${key}')">Entrenar · ϟ −${cost}</button></div></article>`}).join('')}</div><div class="notice" style="margin-top:13px"><b>Cómo leerlo:</b> la previsión compara el mismo nivel de energía antes y después, para aislar el beneficio permanente del entrenamiento. El coste energético se muestra aparte.</div><div class="actions"><button class="button secondary" onclick="closeModal()">Cancelar</button></div>`}
function ssRenderRecruitModal(m){let tutorial=!!m.data.tutorial,cs=recruitmentCandidates(tutorial);return `<div class="casting-head"><span class="badge">${tutorial?dateLabel().toUpperCase():'CASTING'}</span><h2>Escoge una candidata <span class="spark">✦</span></h2><p>Compara Voz, Baile, Carisma, técnica y salario. <b>${cs.length} candidatas</b>${tutorial?'':' según tu nivel de fama'}.</p></div><div class="options casting-grid casting-options-list">${cs.map((x,i)=>{let best=[['VOCAL','voice','Voz principal','♪'],['BAILE','dance','Bailarina estrella','✦'],['CARISMA','charm','Líder escénica','♥']].sort((a,b)=>x[b[1]]-x[a[1]])[0];return `<article class="option candidate-card" style="--candidate:${x.color}"><div class="candidate-profile"><span class="candidate-type">${best[3]} ${best[0]}</span><div class="candidate-identity"><div class="avatar">${escapeHTML(x.stageName[0])}</div><div><h3>${escapeHTML(x.stageName)}</h3><span class="candidate-role">${best[2]}</span></div></div></div><div class="candidate-stats"><span><small>Voz</small><b>${x.voice}</b></span><span><small>Baile</small><b>${x.dance}</b></span><span><small>Carisma</small><b>${x.charm}</b></span></div><div class="candidate-skill"><b>${best[3]} ${escapeHTML(x.special.name)}</b><p>${escapeHTML(x.special.desc)}</p></div><div class="candidate-footer"><strong>${yen(x.salary)}<small>/semana</small></strong><button class="button" onclick="recruitMember(${i})">✦ Elegir</button></div></article>`}).join('')}</div><div class="casting-footer"><button class="button secondary" onclick="closeModal()">‹ Volver</button><span>ⓘ A más fans, más candidatas se presentan. La mejor integrante lidera automáticamente cada tipo de canción.</span></div>`}
function ssWeeklyFixedExpenses(extraSalary=0){let salaries=game.members.reduce((sum,member)=>sum+(Number(member.salary)||0),0)+Math.max(0,Number(extraSalary)||0),debt=game.debt&&debtRemaining()?Math.min(game.debt.weeklyPayment,debtRemaining()):0;return {salaries,debt,total:salaries+debt}}
function ssCanAffordCandidate(candidate){return !!candidate&&game.cash>=ssWeeklyFixedExpenses(candidate.salary).total}
ssRenderRecruitModal=function(m){let tutorial=!!m.data.tutorial,cs=recruitmentCandidates(tutorial),fixed=ssWeeklyFixedExpenses();return `<div class="casting-head"><span class="badge">${tutorial?dateLabel().toUpperCase():'CASTING'}</span><h2>Escoge una candidata <span class="spark">✦</span></h2><p>Compara Voz, Baile, Carisma, técnica y salario. <b>${cs.length} candidatas</b>${tutorial?'':' según tu nivel de fama'}.</p></div><div class="casting-finance"><div><small>Caja disponible</small><b class="money ${game.cash>=fixed.total?'plus':'minus'}">${yen(game.cash)}</b></div><div><small>Gastos fijos actuales</small><b>${yen(fixed.total)} / semana</b></div><div><small>Margen antes de fichar</small><b>${yen(game.cash-fixed.total)}</b></div></div><div class="options casting-grid casting-options-list">${cs.map((x,i)=>{let best=[['VOCAL','voice','Voz principal','♪'],['BAILE','dance','Bailarina estrella','✦'],['CARISMA','charm','Líder escénica','♥']].sort((a,b)=>x[b[1]]-x[a[1]])[0],after=ssWeeklyFixedExpenses(x.salary),affordable=ssCanAffordCandidate(x),margin=game.cash-after.total;return `<article class="option candidate-card ${affordable?'':'unaffordable'}" style="--candidate:${x.color}"><div class="candidate-profile"><span class="candidate-type">${best[3]} ${best[0]}</span><div class="candidate-identity"><div class="avatar">${escapeHTML(x.stageName[0])}</div><div><h3>${escapeHTML(x.stageName)}</h3><span class="candidate-role">${best[2]}</span></div></div></div><div class="candidate-stats"><span><small>Voz</small><b>${x.voice}</b></span><span><small>Baile</small><b>${x.dance}</b></span><span><small>Carisma</small><b>${x.charm}</b></span></div><div class="candidate-skill"><b>${best[3]} ${escapeHTML(x.special.name)}</b><p>${escapeHTML(x.special.desc)}</p><div class="candidate-budget ${affordable?'good':'bad'}">${affordable?`Tras fichar: ${yen(after.total)} fijos · quedan ${yen(margin)}`:`No puedes cubrir ${yen(after.total)} de gastos fijos esta semana`}</div></div><div class="candidate-footer"><strong>${yen(x.salary)}<small>/semana</small></strong><button class="button" ${affordable?'':`disabled title="La caja no cubre los gastos fijos semanales"`} onclick="recruitMember(${i})">${affordable?'✦ Elegir':'Caja insuficiente'}</button></div></article>`}).join('')}</div><div class="casting-footer"><button class="button secondary" onclick="closeModal()">‹ Volver</button><span>ⓘ Para contratar, la caja debe cubrir salarios y próxima cuota al cierre de esta semana.</span></div>`}
function ssRenderCustomizeModal(m){let x=m.data.member,fixed=ssWeeklyFixedExpenses(x.salary),affordable=ssCanAffordCandidate(x);return `<span class="badge purple">PERSONALIZACIÓN</span><h2>Define su identidad</h2><div style="text-align:center">${memberAvatar(x,true)}</div><div class="field"><label>Nombre artístico</label><input id="member-name" value="${escapeHTML(m.data.draftName||x.stageName)}" maxlength="18"></div><div class="field"><label>Color representativo · ${escapeHTML(memberColors.find(c=>c[1]===x.color)?.[0]||'Personalizado')}</label><div class="swatches">${memberColors.map(c=>{let used=game.members.some(y=>y.color===c[1]);return `<button class="swatch ${x.color===c[1]?'selected':''}" style="background:${c[1]}" ${used?'disabled':''} onclick="selectMemberColor('${c[1]}')" aria-label="${c[0]}${used?' (en uso)':''}" title="${c[0]}${used?' · en uso':''}"></button>`}).join('')}</div></div><div class="row"><span>Técnica</span><b>${escapeHTML(x.special.name)}</b></div><div class="notice mint"><b>${escapeHTML(x.special.name)}</b><br>${escapeHTML(x.special.desc)}</div><div class="notice ${affordable?'mint':'red'}"><b>Previsión del cierre semanal</b><br>Caja ${yen(game.cash)} · gastos fijos tras fichar ${yen(fixed.total)} · margen ${yen(game.cash-fixed.total)}.</div><div class="actions"><button class="button" ${affordable?'':'disabled'} onclick="confirmCustomize()">${affordable?'Confirmar contratación':'Caja insuficiente'}</button><button class="button secondary" onclick="openModal('recruit',{tutorial:${!!m.data.tutorial}})">Atrás</button></div>`}
function ssModalShell(inner,type='simple'){return `<div class="modal-back" role="dialog" aria-modal="true"><div class="modal modal-${type}" style="max-width:${type==='produce'||type==='recruit'||type==='train'?'1120px':'960px'}"><button class="modal-close" onclick="closeModal()" aria-label="Cerrar">×</button>${inner}</div></div>`}
const ssRenderModalBefore=renderModal;
renderModal=function(m){if(m?.type==='produce')return ssModalShell(ssRenderProduceModal(m),'produce');if(m?.type==='train')return ssModalShell(ssRenderTrainModal(),'train');if(m?.type==='recruit')return ssModalShell(ssRenderRecruitModal(m),'recruit');if(m?.type==='customize')return ssModalShell(ssRenderCustomizeModal(m),'customize');if(m?.type==='help')return ssModalShell(renderHelpModal(),'help');if(m?.type==='rehearse')return ssModalShell('<h2>Los ensayos ya no son necesarios</h2><p>Las canciones se interpretan directamente con las habilidades actuales del grupo.</p><button class="button" onclick="closeModal()">Entendido</button>');return ssRenderModalBefore(m)}
const ssRecruitMemberBeforeBudget=recruitMember;
recruitMember=function(index){let candidate=modal?.type==='recruit'?recruitmentCandidates(!!modal.data.tutorial)[index]:null;if(!ssCanAffordCandidate(candidate)){toast('No puedes contratar: la caja no cubre todos los gastos fijos de esta semana.');return}return ssRecruitMemberBeforeBudget(index)}
const ssConfirmCustomizeBeforeBudget=confirmCustomize;
confirmCustomize=function(){let candidate=modal?.type==='customize'?modal.data.member:null;if(!ssCanAffordCandidate(candidate)){toast('Contratación bloqueada: reserva caja para salarios y próxima cuota.');render();return}return ssConfirmCustomizeBeforeBudget()}

function confirmGroupTraining(stat){let labels={voice:'Voz',dance:'Baile',charm:'Carisma'},costs={voice:15,dance:20,charm:15},cost=costs[stat]||15;if(avgEnergy()<cost){toast('El grupo no tiene suficiente energía');return}dayActionContext=dayActionContext||{type:'train',before:captureDayMetrics(),data:{}};dayActionContext.type='train';dayActionContext.data={stat};game.members.forEach(m=>m[stat]=clamp((Number(m[stat])||0)+1,0,100));game.groupEnergy=clamp(game.groupEnergy-cost,0,100);ssSyncEnergy();modal=null;if(game.tutorial===6&&!game.tutorialDone){game.tutorial=7;game.log.push({day:game.day,label:'Entreno'});advanceTutorialDay(`Todo el grupo gana +1 ${labels[stat]}. Mañana descansarás antes del debut.`)}else confirmDayAdvance(`Todo el grupo gana +1 ${labels[stat]}.`)}

delete actionInfo.rehearse;dayConsumingModals.delete('rehearse');
actionInfo.train=['Entrenar al grupo','Mejora una habilidad de todas las integrantes','+ habilidad grupal · − energía','★'];
actionInfo.rest=['Descansar','Recupera la energía común del grupo','+35 energía grupal','☾'];
actionInfo.produce=['Producir canción','Elige tipo, dificultad e impacto','− dinero · + canción','♫'];

actionBlocked=function(id){if(game.actionUsed)return 'Ya has gastado el día';if(id==='book'&&game.concert)return 'Ya hay un concierto';if((id==='train'||id==='rest')&&!game.members.length)return 'No hay integrantes';if(id==='train'&&avgEnergy()<15)return 'Energía insuficiente';if(id==='recruit'&&game.members.length>=6)return 'Plantilla completa';if(id==='promote'&&!game.songs.length&&!game.concert)return 'Nada que promocionar';if(id==='produce'&&game.cash<50000)return 'Caja insuficiente';return ''}
routeAction=function(id){if(id==='actions')return setScreen('actions');if(id==='loan')return openModal('loan');if(id==='tutorialRecruit')return openModal('recruit',{tutorial:true});if(id==='tutorialSong')return openModal('produce',{tutorial:true});if(id==='tutorialBook')return openModal('book',{tutorial:true});if(id==='startConcert')return startConcert();if(actionBlocked(id)){toast(actionBlocked(id));return}if(id==='recruit'&&game.tutorial===2&&!game.tutorialDone)return openModal('recruit',{tutorial:true});if(id==='produce'&&game.tutorial===3&&!game.tutorialDone)return openModal('produce',{tutorial:true});if(id==='book'&&game.tutorial===4&&!game.tutorialDone)return openModal('book',{tutorial:true});if(['promote','produce','train','recruit','book'].includes(id))return openModal(id);if(id==='rest')return confirmDayAction('Descansar',()=>{game.groupEnergy=clamp(game.groupEnergy+35,0,100);ssSyncEnergy();if(game.tutorial===7&&!game.tutorialDone){game.tutorial=8;game.log.push({day:game.day,label:'Descanso'});game._showTutorialAfterAdvance=true}return 'El grupo recupera 35 de energía.'})}

function ssSkillCard(focus){let meta=ssFocusMeta(focus),leader=ssLeader(focus),value=ssGroupSkill(focus);return `<div class="group-skill-card"><div class="skill-top"><b>${meta.icon} ${meta.skill}</b><span class="badge ${value>=70?'mint':value>=50?'gold':'red'}">${Math.round(value)}</span></div><strong>${Math.round(value)}<small class="muted">/100</small></strong><div class="progress"><i style="width:${value}%"></i></div><span class="leader-chip">Lidera · ${escapeHTML(leader?.stageName||'—')}</span></div>`}
renderGroup=function(){
 let header=pageHeader('El grupo','Tres habilidades, líderes automáticas y una única energía compartida.'),casting=`<div class="actions" style="margin-bottom:14px"><button class="button" onclick="routeAction('recruit')" ${game.members.length>=6?'disabled':''}>Casting</button>${game.members.length?'<button class="button secondary" onclick="routeAction(\'train\')">Entrenar al grupo</button>':''}</div>`;
 if(!game.members.length)return header+casting+`<div class="card empty"><div class="emoji">★</div><h2>El grupo aún no tiene integrantes</h2><p>Comienza un casting para formar la plantilla.</p><button class="button" onclick="routeAction('recruit')">Empezar casting</button></div>`;
 let skills=`<div class="card"><div class="calendar-head"><div><h2>Nivel colectivo</h2><span class="muted tiny">60% de la mejor integrante + 40% de la media del grupo</span></div><span class="badge mint">CÁLCULO AUTOMÁTICO</span></div><div class="group-skill-grid">${ssSkillCard('voice')}${ssSkillCard('dance')}${ssSkillCard('stage')}</div></div>`;
 let members=game.members.map(m=>`<div class="row"><div class="row-main">${memberAvatar(m)}<div><b>${escapeHTML(m.stageName)}</b><div class="member-simple-stats"><span>Voz<b>${Math.round(m.voice)}</b></span><span>Baile<b>${Math.round(m.dance)}</b></span><span>Carisma<b>${Math.round(m.charm)}</b></span></div></div></div><button class="button secondary small" onclick="selected.member='${m.id}';setScreen('memberDetail')">Abrir</button></div>`).join('');
 let roster=`<div class="grid"><div class="card"><h2>Integrantes</h2>${members}</div><div><div class="energy-hero"><small class="muted">ENERGÍA DEL GRUPO</small><h2 style="font-size:32px;margin:5px 0">${Math.round(avgEnergy())}%</h2><div class="progress"><i style="width:${avgEnergy()}%;background:#19a36b"></i></div><p class="muted tiny">Entrenar, interpretar canciones y activar técnicas utiliza esta única reserva.</p></div><div class="card" style="margin-top:16px"><h2>Regla automática</h2><p>La mejor integrante lidera cada tipo de canción. No necesitas repartir funciones ni preparar temas individualmente.</p></div></div></div>`;
 return header+casting+skills+roster;
}
renderMemberDetail=function(){let m=game.members.find(x=>x.id===selected.member)||game.members[0];if(!m)return renderGroup();let tech=concertTechniqueFromMember(m),header=pageHeader('Ficha de '+escapeHTML(m.stageName),'Tres habilidades permanentes y una técnica especial.');return `${header}<div class="grid"><div class="card" style="text-align:center">${memberAvatar(m,true)}<h2 style="margin-top:12px">${escapeHTML(m.stageName)} · ${m.age}</h2><span class="badge">${m.personalFans||0} fans personales</span><p class="muted">${escapeHTML(m.quote||'“Haré que el público recuerde nuestro nombre.”')}</p></div><div><div class="card"><h2>Habilidades</h2>${metric('Voz',m.voice)}${metric('Baile',m.dance)}${metric('Carisma',m.charm)}<div class="notice mint">Entrenar mejora esta habilidad en todas las integrantes a la vez.</div></div><div class="card"><h2>Técnica y contrato</h2><div class="row"><span>${escapeHTML(m.special.name)}</span><span class="badge purple">1 uso/directo · 1 momento</span></div><p class="muted">${escapeHTML(tech.desc)}</p><div class="row"><span>Coste de energía grupal</span><b>${tech.energyCost}</b></div><div class="row"><span>Salario</span><b>${yen(m.salary)} / semana</b></div><div class="row"><span>Fin de contrato</span><b>Semana ${m.contractEnd}</b></div></div></div></div>`}
renderSongs=function(){return `${pageHeader('Canciones','Tipo, dificultad, impacto y una previsión única.')}<div class="actions" style="margin-bottom:14px"><button class="button" onclick="routeAction('produce')">Producir nueva canción</button></div>${game.songs.length?`<div class="simple-song-grid">${game.songs.map(s=>ssSongCard(s)).join('')}</div>`:`<div class="card empty"><div class="emoji">♫</div><h2>Aún no hay canciones</h2><p>Produce una y podrás interpretarla inmediatamente: no necesita ensayos.</p></div>`}`}

tutorialStepInfo=function(){let map={1:{title:'Consigue capital para empezar',text:'Abre Finanzas y solicita el préstamo inicial. Pedir financiación no consume el día.',dest:'finance',button:'Ir a Finanzas'},2:{title:'Contrata a tu primera artista',text:'Entra en Grupo y pulsa Casting. Compara sus tres habilidades y su técnica.',dest:'group',button:'Ir a Grupo'},3:{title:'Produce el primer tema',text:'Elige una propuesta comparando tipo, dificultad, impacto y previsión.',dest:'songs',button:'Ir a Canciones'},4:{title:'Reserva el debut',text:'Reserva el concierto callejero para el domingo.',dest:'concerts',button:'Ir a Conciertos'},5:{title:'Promociona el concierto',text:'Abre Acciones y promociona el debut para atraer transeúntes.',dest:'actions',button:'Ir a Acciones'},6:{title:'Entrena a todo el grupo',text:'Escoge un entrenamiento vocal, de baile o escénico. Todas mejorarán a la vez.',dest:'actions',button:'Ir a Acciones'},7:{title:'Recupera energía',text:'Descansa para llenar la energía compartida antes del debut.',dest:'actions',button:'Ir a Acciones'},8:{title:'Celebra el primer directo',text:'Entra en Conciertos y elige canciones usando la misma previsión que ya conoces.',dest:'concerts',button:'Ir al concierto'}};return map[game.tutorial]||map[1]}

guideTutorialNext=function(){document.querySelectorAll('.tutorial-next').forEach(el=>el.classList.remove('tutorial-next'));if(!game)return;if(modal){let action={tutorial:'goTutorialStep(',loan:'acceptLoan(',recruit:'recruitMember(',customize:'confirmCustomize(',produce:'chooseSong(',book:'bookVenue(',promote:'confirmPromote(0,',train:'confirmGroupTraining(',confirmDay:'let f=modal.data.fn'}[modal.type];if(action)markTutorialButton(action);return}if(game.tutorial===8&&screen==='concert'){markTutorialButton("performConcert('song:");return}if(game.weeklyBookingRequired){if(screen!=='concerts')markTutorialButton("setScreen('concerts')");else if(!markTutorialButton("openModal('book'"))markTutorialButton("setConcertTab('venues')");return}if(game.tutorialDone||!game.tutorial)return;let target={1:'finance',2:'group',3:'songs',4:'concerts',5:'actions',6:'actions',7:'actions',8:'concerts'}[game.tutorial];if(screen!==target){markTutorialButton(`setScreen('${target}')`);return}let action={1:"openModal('loan')",2:"routeAction('recruit')",3:"routeAction('produce')",5:'openPromotion()',6:"routeAction('train')",7:"routeAction('rest')",8:'startConcert()'}[game.tutorial];if(game.tutorial===4){if(!markTutorialButton("openModal('book'"))markTutorialButton("setConcertTab('venues')");return}if(action)markTutorialButton(action)}

confirmPromote=function(i,target){let o=promotionOptions()[i],effect=promotionEffect(o,target);if(!o||game.cash<o.cost){toast('Caja insuficiente');return}addLedger(-o.cost,'Promoción',`${o.name} · ${target==='concert'?'Concierto':target?.startsWith('song:')?'Canción':'Grupo'}`);let message='';if(effect.kind==='concert'){if(!game.concert){toast('No hay concierto programado');return}game.concert.promoDemand=clamp((game.concert.promoDemand||0)+effect.demand,0,100);game.concert.promoUntil=game.day+effect.days;game.concert.expected=predictAttendance(game.concert.venue,game.concert.ticketPrice);message=`La campaña mejora la demanda del concierto durante ${effect.days} días.`}else if(effect.kind==='song'){let s=game.songs.find(x=>x.id===target.slice(5));if(!s){toast('No se encontró la canción');return}s.hype=clamp((s.hype||0)+effect.hype,0,100);s.hypeUntil=game.day+effect.days;message=`${s.title} gana ${effect.hype} de Hype temporal.`}else{game.attention=clamp(game.attention+effect.attention,0,100);if(game.concert)game.concert.expected=predictAttendance(game.concert.venue,game.concert.ticketPrice);message=`La Atención pública sube ${effect.attention} puntos.`}modal=null;if(game.tutorial===5){game.tutorial=6;game.log.push({day:game.day,label:'Promo'});advanceTutorialDay(`${message} Mañana entrenarás a todo el grupo.`)}else confirmDayAdvance(message)}

concertSongProjected=function(song){let factor=ssEnergyFactor(),voice=ssGroupStat('voice')*factor,dance=ssGroupStat('dance')*factor,stage=ssGroupStat('charm')*factor;return {voice,dance,stage,avg:ssSongOutcome(song)}}
concertSongMastery=function(song){return Math.round(ssSongOutcome(song))}

renderConcertSongRow=function(c,song,encoreMode){let used=!!c.songsUsed[song.id]&&!encoreMode,f=ssSongForecast(song),meta=ssFocusMeta(song.focus),cost=ssSongEnergyCost(song);return `<div class="song-action ${used?'disabled':''}">${concertSongTile(song.title)}<div class="simple-song-inline"><h3>${escapeHTML(song.title)}</h3><small>${meta.icon} ${meta.label} · Dificultad ${concertStarsHTML(concertSongDifficultyStars(song))} · Impacto ${'★'.repeat(song.impact)}</small><div class="simple-forecast"><span class="badge ${f.color}">${f.label}</span><b>${f.low}–${f.high}</b><span class="muted tiny">ϟ −${cost}</span></div></div><span class="impact-badge ${f.color==='mint'?'impact-safe':f.color==='gold'?'impact-mid':'impact-risk'}">Impacto ${song.impact}/5</span><button class="button" ${used?'disabled':''} onclick="performConcert('song:${song.id}${encoreMode?':encore':''}')">🎵 ${used?'Ya interpretada':'Interpretar'}</button></div>`}
concertTechniqueFromMember=function(member){let name=member?.special?.name||'';if(name==='Nota imposible')return {type:'roleBoost',role:'voice',value:15,energyCost:12,label:'Impulso vocal',desc:'La próxima canción vocal recibe +15.'};if(name==='Paso relámpago')return {type:'roleBoost',role:'dance',value:15,energyCost:12,label:'Impulso de baile',desc:'La próxima canción de baile recibe +15.'};if(name==='Sonrisa salvavidas')return {type:'crowdLift',value:10,energyCost:18,label:'Ovación inmediata',desc:'La ovación sube inmediatamente 10 puntos.'};if(name==='Segunda oportunidad'||name==='Aprendizaje fugaz')return {type:'stabilize',energyCost:15,label:'Evita un mal resultado',desc:'La próxima canción no podrá salir mal.'};if(name==='Encore natural')return {type:'encoreThreshold',energyCost:18,label:'Encore más accesible',desc:'El público pedirá encore a partir de 72.'};if(name==='Respirar juntas')return {type:'breath',value:15,energyCost:6,label:'Recupera energía',desc:'Tras el esfuerzo inicial, el grupo recupera 15 de energía.'};return {type:'crowdLift',value:8,energyCost:15,label:'Apoyo al directo',desc:'La ovación sube 8 puntos.'}}
renderConcertTechniqueRow=function(c,m){let tech=concertTechniqueFromMember(m),used=!!c.usedTechniques[m.id];if(used)return '';let insufficient=avgEnergy()<tech.energyCost,after=Math.max(0,Math.round(avgEnergy()-tech.energyCost));return `<div class="tech-action ${insufficient?'disabled':''}" data-tech-id="${escapeHTML(m.id)}">${memberAvatar(m)}<div><div class="song-title" style="font-size:16px">${escapeHTML(m.special.name)} <span style="color:var(--pink)">· ${escapeHTML(m.stageName)}</span></div><div class="muted tiny" style="font-size:13px">${escapeHTML(tech.desc)}</div><div class="tech-energy-cost ${avgEnergy()<tech.energyCost+8?'low':''}">⚡ Energía grupal ${Math.round(avgEnergy())} → ${after}${tech.type==='breath'?` → ${Math.min(100,after+tech.value)}`:''}</div></div><span class="tech-badge impact-mid">${escapeHTML(tech.label)}</span><button class="button" ${insufficient?'disabled':''} onclick="performConcert('tech:${m.id}')">${insufficient?'⚡ Sin energía':'✨ Activar'}</button></div>`}

const ssPerformSongBefore=performConcert;
function ssCommitConcertTechnique(c,id,m,tech,cost){c.techniqueAnimating=null;game.groupEnergy=clamp(game.groupEnergy-cost,0,100);c.usedTechniques[id]=true;c.momentsLeft=Math.max(0,c.momentsLeft-1);if(tech.type==='roleBoost'){c.pendingTechnique={kind:'roleBoost',role:tech.role,value:tech.value,title:tech.desc,memberId:id};concertLog(c,`${m.special.name} · ${m.stageName}`,`Energía grupal −${cost} · bonificación preparada`,0)}else if(tech.type==='crowdLift'){c.ovation=clamp(c.ovation+tech.value,0,100);concertLog(c,`${m.special.name} · ${m.stageName}`,`Energía grupal −${cost} · la ovación sube`,tech.value)}else if(tech.type==='stabilize'){c.pendingTechnique={kind:'stabilize',title:tech.desc,memberId:id};concertLog(c,`${m.special.name} · ${m.stageName}`,`Energía grupal −${cost} · seguridad preparada`,0)}else if(tech.type==='encoreThreshold'){c.encoreThreshold=Math.min(c.encoreThreshold,72);concertLog(c,`${m.special.name} · ${m.stageName}`,`Energía grupal −${cost} · umbral del encore a 72`,0)}else if(tech.type==='breath'){game.groupEnergy=clamp(game.groupEnergy+tech.value,0,100);concertLog(c,`${m.special.name} · ${m.stageName}`,`Coste ${cost} · recuperación ${tech.value}`,tech.value-cost)}ssSyncEnergy();toast(`Técnica activada · energía ${Math.round(avgEnergy())}%`);finalizeConcertAction()}
performConcert=function(action){
 let c=game.activeConcert;if(!c||!action)return;
 if(action.startsWith('song:')){let parts=action.split(':'),songId=parts[1],isEncore=parts[2]==='encore',song=game.songs.find(s=>s.id===songId);if(!song){toast('No se encontró la canción');return}if(!isEncore&&c.songsUsed[songId]){toast('Esa canción ya se ha interpretado');return}let perf=resolveSimpleConcertSong(song,isEncore);if(!isEncore){c.songsUsed[songId]=true;c.momentsLeft=Math.max(0,c.momentsLeft-1)}else c.phase='encoreDone';c.performances.push(perf);if(!c.bestSongId||perf.avg>((c.performances.find(x=>x.songId===c.bestSongId)||{}).avg||0))c.bestSongId=songId;concertLog(c,song.title,`${ssFocusMeta(song.focus).label} · Resultado ${perf.avg} · Impacto ${song.impact}/5${perf.fansEarned?` · +${perf.fansEarned} fans por la buena interpretación`:''}`,perf.ovationDelta);toast(`Ovación ${signed(perf.ovationDelta)}${perf.fansEarned?` · +${perf.fansEarned} fans`:''}`);finalizeConcertAction();return}
 if(!action.startsWith('tech:'))return ssPerformSongBefore(action);let id=action.split(':')[1],m=game.members.find(x=>x.id===id);if(!m)return;if(c.techniqueAnimating||c.usedTechniques[id]){toast('Esa técnica ya no está disponible');return}let tech=concertTechniqueFromMember(m),cost=tech.energyCost||0;if(avgEnergy()<cost){toast(`El grupo necesita ${cost} de energía para usar ${m.special.name}`);return}let row=[...document.querySelectorAll('.tech-action')].find(el=>el.dataset.techId===id);if(!ssMotionDisabled()&&row){c.techniqueAnimating=id;row.classList.add('ss-tech-leaving');row.querySelectorAll('button').forEach(button=>button.disabled=true);setTimeout(()=>{if(game.activeConcert===c)ssCommitConcertTechnique(c,id,m,tech,cost)},460);return}ssCommitConcertTechnique(c,id,m,tech,cost)
}

resolveSimpleConcertSong=function(song,isEncore){let c=game.activeConcert,bonus=0;if(c.pendingTechnique?.kind==='roleBoost'){if(c.pendingTechnique.role===song.focus)bonus=c.pendingTechnique.value;else if(song.focus==='balanced')bonus=c.pendingTechnique.value/3}let random=rint(-5,5),result=clamp(ssSongOutcome(song,bonus)+random-(isEncore?4:0),0,100);if(c.pendingTechnique?.kind==='stabilize'&&result<50)result=50;let cap=[0,8,13,18,24,30][song.impact]||8,delta;if(result>=85)delta=cap;else if(result>=70)delta=Math.round(cap*.7);else if(result>=55)delta=Math.round(cap*.4);else if(result>=45)delta=Math.max(1,Math.round(cap*.15));else if(result>=35)delta=-Math.max(2,Math.round(song.impact*.8));else delta=-Math.max(5,Math.round(song.impact*1.8));c.ovation=clamp(c.ovation+delta,0,100);applyAudienceFlow(c,delta);let energyCost=ssSongEnergyCost(song)+(isEncore?3:0);game.groupEnergy=clamp(game.groupEnergy-energyCost,0,100);ssSyncEnergy();let lead=ssLeader(song.focus);if(lead)c.highlights[lead.id]=(c.highlights[lead.id]||0)+result+song.impact*3;song.popularity=clamp(song.popularity+Math.max(0,Math.round((result-42)/15))*song.impact,0,100);song.freshness=100;let factor=ssEnergyFactor(),perf={songId:song.id,title:song.title,avg:Math.round(result),ovationDelta:delta,voice:Math.round(ssGroupStat('voice')*factor),dance:Math.round(ssGroupStat('dance')*factor),stage:Math.round(ssGroupStat('charm')*factor),difficultyStars:concertSongDifficultyStars(song),impact:song.impact,focus:song.focus,focusLabel:ssFocusMeta(song.focus).label,energyCost,encore:isEncore};c.pendingTechnique=null;return perf}
renderPerformanceReport=function(p){if(!p)return '';return `<div class="concert-report"><div class="row"><div><b>${escapeHTML(p.title)}</b><div class="muted tiny">${escapeHTML(p.focusLabel||'Canción')} · Dificultad ${p.difficultyStars}/5 · Impacto ${p.impact||1}/5${p.encore?' · Encore':''}</div></div><div style="text-align:right"><div class="badge ${p.avg>=70?'mint':p.avg<45?'red':'gold'}">Resultado ${p.avg}</div><div class="tiny" style="margin-top:5px;color:${p.ovationDelta>=0?'#f1348d':'#c63b5d'}">Ovación ${signed(p.ovationDelta)} · ϟ −${p.energyCost||0}</div></div></div></div>`}

songStreamEstimate=function(song,hype=song.hype||0){let integrated=(song.hypeStreamCarry||0)/6,effectivePopularity=clamp(song.popularity+(hype+integrated)*.32,0,100),factor=.8+game.attention/125;return Math.max(0,Math.round(effectivePopularity*effectivePopularity*factor))}

function ssFanBurst(){let anchor=document.querySelector('.history-line:first-child')||document.querySelector('.live-side-card')||document.querySelector('.topbar'),rect=anchor?.getBoundingClientRect(),burst=document.createElement('div');burst.className='ss-burst';burst.style.left=`${rect?.left+Math.min(rect?.width||0,180)||window.innerWidth/2}px`;burst.style.top=`${rect?.top+20||100}px`;for(let i=0;i<8;i++){let p=document.createElement('span'),angle=-Math.PI+(i/7)*Math.PI;p.textContent=i%3?'♥':'✦';p.style.setProperty('--x',`${Math.cos(angle)*(45+i*5)}px`);p.style.setProperty('--y',`${-45-Math.sin(angle)*55-i*3}px`);p.style.setProperty('--r',`${i%2?25:-25}deg`);p.style.animationDelay=`${i*35}ms`;burst.appendChild(p)}document.body.appendChild(burst);setTimeout(()=>burst.remove(),1300)}

objectiveCard=function(){let objective=primaryObjective();if(!objective){ensureGoals();objective=game.goals[0]?{...game.goals[0],text:'Reto adaptado al momento actual de tu carrera.',value:goalProgress(game.goals[0]),unit:''}:{label:'Construye tu propia carrera',text:'El juego generará un nuevo reto al comenzar la próxima semana.',value:0,target:1,unit:''}}let ratio=clamp(objective.value/objective.target*100,0,100);return `<div class="card"><span class="badge purple">OBJETIVO PRINCIPAL</span><h2 style="margin-top:10px">${escapeHTML(objective.label)}</h2><p class="muted">${escapeHTML(objective.text)}</p>${objective.reward?`<div class="notice mint"><b>Premio</b> · ${ssRewardLabel(objective)}</div>`:''}<div class="progress"><i style="width:${ratio}%"></i></div><div class="row"><span>Progreso</span><b>${objective.unit==='¥'?`${yen(objective.value)} / ${yen(objective.target)}`:`${Number(objective.value).toLocaleString('es-ES')} / ${Number(objective.target).toLocaleString('es-ES')} ${objective.unit||''}`}</b></div><button class="button secondary small" onclick="setScreen('goals')">Ver objetivos</button></div>`}
renderGoals=function(){ensureGoals();let fixed=primaryObjective(),guided=guidedObjectives(),heroReward=fixed?.reward?`<div class="notice mint" style="margin-top:13px"><b>Premio al completarlo:</b> ${ssRewardLabel(fixed)}</div>`:'';return `${pageHeader('Carrera y objetivos','Cada reto concede dinero o nuevos fans según su dificultad.')}<div class="hero"><span class="badge">${fixed?'OBJETIVO PRINCIPAL':'CARRERA INFINITA'}</span><h2>${escapeHTML(fixed?.label||`Nivel ${game.careerTier}`)}</h2><p>${escapeHTML(fixed?.text||'Los nuevos objetivos se generan según el estado actual del grupo.')}</p>${heroReward}${fixed?`<div class="progress"><i style="width:${clamp(fixed.value/fixed.target*100,0,100)}%"></i></div>`:''}</div>${fixed?`<div class="card" style="margin-top:16px"><h2>Ruta guiada</h2>${guided.map(objective=>{let done=objective.value>=objective.target,ratio=clamp(objective.value/objective.target*100,0,100);return `<div class="row"><div><b>${done?'✓ ':''}${escapeHTML(objective.label)}</b><div class="muted tiny">${objective.unit==='¥'?`${yen(objective.value)} / ${yen(objective.target)}`:`${Number(objective.value).toLocaleString('es-ES')} / ${Number(objective.target).toLocaleString('es-ES')} ${objective.unit}`} · premio ${ssRewardLabel(objective)}</div><div class="progress" style="margin-top:6px"><i style="width:${ratio}%"></i></div></div><span class="badge ${done?'mint':objective.id===fixed.id?'purple':'gold'}">${done?'Completado':objective.id===fixed.id?'Actual':'Pendiente'}</span></div>`}).join('')}</div>`:''}${game.goals.length?`<div class="options" style="margin-top:16px">${game.goals.map(goal=>{let progress=goalProgress(goal),ratio=clamp(progress/goal.target*100,0,100);return `<div class="option"><span class="badge purple">OBJETIVO GENERADO</span><h3 style="margin-top:10px">${escapeHTML(goal.label)}</h3><p>${progress.toLocaleString('es-ES')} / ${goal.target.toLocaleString('es-ES')}</p><div class="progress"><i style="width:${ratio}%"></i></div><div class="notice mint" style="margin-top:12px"><b>Premio:</b> ${ssRewardLabel(goal)}</div></div>`}).join('')}</div>`:''}<div class="card" style="margin-top:16px"><h2>Récords</h2><div class="row"><span>Mejor concierto</span><b>${game.bestConcert>0?'+':''}${game.bestConcert}</b></div><div class="row"><span>Máximo de fans</span><b>${game.records.maxFans}</b></div><div class="row"><span>Mayor streaming semanal</span><b>${game.records.maxStreams}</b></div><div class="row"><span>Nivel de carrera</span><span class="badge mint">${game.careerTier}</span></div></div>`}

/* Hoy y Acciones pasan a ser una única pantalla de gestión diaria. */
const ssNavItemsBeforeTodayMerge=navItems;
navItems=function(){return ssNavItemsBeforeTodayMerge().filter(item=>item[0]!=='actions')}
navButton=function(item){let state=tutorialNavigation(),locked=!state.allowed.includes(item[0]),focus=state.focus===item[0],active=screen===item[0]||(item[0]==='today'&&screen==='actions');return `<button class="${active?'active ':''}${focus?'attention':''}" ${locked?'disabled':''} onclick="setScreen('${item[0]}')"><span class="icon">${item[1]}</span>${item[2]}</button>`}
const ssTutorialNavigationBeforeTodayMerge=tutorialNavigation;
tutorialNavigation=function(){let state=ssTutorialNavigationBeforeTodayMerge();if(game&&!game.tutorial&&!state.allowed.includes('actions'))state.allowed.push('actions');if(game?.tutorialDone&&!state.allowed.includes('actions'))state.allowed.push('actions');return state}
function ssMergedDashboardStats(){let energy=Math.round(avgEnergy()),energyLabel=energy<40?'Conviene descansar':energy<65?'Energía justa':'Nivel saludable';return `<div class="stats clickable-stats"><button class="stat stat-cash" onclick="setScreen('finance')"><span class="stat-icon">▣</span><span class="stat-copy"><small>Caja</small><strong>${yen(game.cash)}</strong></span></button><button class="stat stat-attention" onclick="setScreen('concerts')"><span class="stat-icon">★</span><span class="stat-copy"><small>Atención pública</small><strong>${Math.round(game.attention)}/100</strong></span></button><button class="stat stat-fans" onclick="setScreen('fans')"><span class="stat-icon">●●●</span><span class="stat-copy"><small>Fans</small><strong>${totalFans().toLocaleString('es-ES')}</strong></span></button><button class="stat stat-energy" onclick="setScreen('group')"><span class="stat-icon">ϟ</span><span class="stat-copy"><small>Energía del grupo</small><strong>${pct(energy)}</strong></span><span class="stat-status ${energy<40?'bad':energy<65?'warn':'good'}">${energyLabel}</span></button></div>`}
function ssMergedActionGrid(){let allowed=tutorialAllowed(),guided={2:'recruit',3:'produce',4:'book',5:'promote',6:'train',7:'rest'}[game.tutorial];return `<div class="options action-grid">${Object.entries(actionInfo).map(([id,info])=>{let reason=actionBlocked(id),locked=reason||(!allowed.includes(id)&&game.tutorial&&!game.tutorialDone),isNext=!locked&&id===guided,click=id==='promote'?"openPromotion()":`routeAction('${id}')`;return `<button type="button" class="option action-card action-${id} ${locked?'locked':''} ${isNext?'tutorial-next':''}" ${locked?'disabled':''} data-action="${id}" onclick="${click}"><span class="action-icon">${info[3]}</span><span class="action-copy"><h3>${info[0]}</h3><p>${info[1]}</p><span class="badge ${locked?'red':'purple'}">${locked?(reason||'Bloqueado por tutorial'):info[2]}</span></span><span class="action-arrow">→</span></button>`}).join('')}</div>`}
renderToday=function(){return `${pageHeader('Hoy','Consulta el estado del grupo y decide cómo emplear el día.')}<div class="card"><div class="calendar-head"><h2>Calendario de la semana</h2><button class="button secondary small" onclick="openCalendar()">Ver mes completo</button></div>${weekCalendar()}</div>${ssMergedDashboardStats()}<section class="card today-actions-panel"><div class="today-actions-head"><h2>Acciones del día</h2><span class="badge purple">UNA ACCIÓN PRINCIPAL</span></div>${ssMergedActionGrid()}</section><div class="today-objective">${objectiveCard()}</div>`}
bottomNav=function(){if(ssConcertIsToday())return `<nav class="bottom-nav"><button class="active attention" onclick="setScreen('concerts')"><span>▣</span>Conciertos</button></nav>`;let items=[['today','⌂','Hoy'],['songs','♫','Temas'],['group','★','Grupo'],['concerts','▣','Conciertos'],['more','⋯','Más']],state=tutorialNavigation();return `<nav class="bottom-nav">${items.map(item=>{let locked=item[0]==='more'?game.tutorial&&!game.tutorialDone:!state.allowed.includes(item[0]),active=screen===item[0]||(item[0]==='today'&&screen==='actions');return `<button class="${active?'active ':''}" ${locked?'disabled':''} onclick="${item[0]==='more'?`openModal('more')`:`setScreen('${item[0]}')`}"><span>${item[1]}</span>${item[2]}</button>`}).join('')}</nav>`}

/* Menos texto financiero repetido en el casting; la validación sigue activa. */
const ssRenderRecruitModalBeforeCopyTrim=ssRenderRecruitModal;
ssRenderRecruitModal=function(state){return ssRenderRecruitModalBeforeCopyTrim(state).replace(/<div class="candidate-budget [^"]+">.*?<\/div>/g,'')}
const ssRenderCustomizeModalBeforeCopyTrim=ssRenderCustomizeModal;
ssRenderCustomizeModal=function(state){return ssRenderCustomizeModalBeforeCopyTrim(state).replace(/<div class="notice (?:mint|red)"><b>Previsión del cierre semanal<\/b><br>.*?<\/div>/,'')}

/* La reserva obligatoria semanal no necesita un botón parpadeante. */
const ssGuideTutorialBeforeTodayMerge=guideTutorialNext;
guideTutorialNext=function(){document.querySelectorAll('.tutorial-next').forEach(element=>element.classList.remove('tutorial-next'));if(game?.weeklyBookingRequired){if(screen!=='concerts'&&!modal)markTutorialButton("setScreen('concerts')");return}if(!modal&&['today','actions'].includes(screen)&&[5,6,7].includes(game?.tutorial)){let fragment={5:'openPromotion()',6:"routeAction('train')",7:"routeAction('rest')"}[game.tutorial];markTutorialButton(fragment);return}return ssGuideTutorialBeforeTodayMerge()}

renderers.today=renderToday;renderers.actions=renderToday;renderers.songs=renderSongs;renderers.songDetail=renderSongDetail;renderers.roles=renderSongs;renderers.group=renderGroup;renderers.memberDetail=renderMemberDetail;renderers.concerts=renderConcerts;renderers.concertResult=renderConcertResult;renderers.weekly=renderWeekly;renderers.goals=renderGoals;

$('#day-transition').addEventListener('pointerdown',accelerateDayTransition);
document.addEventListener('keydown',event=>{if(dayTransitionState.active&&['Enter',' ','Escape'].includes(event.key))accelerateDayTransition(event)},true);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modal&&!['loan','debtCrisis'].includes(modal.type))closeModal()});
window.addEventListener('beforeunload',()=>{if(game)saveAuto()});
applySettings();setTimeout(()=>{$('#loading').classList.add('hidden');render()},250);
</script>
</body>
</html>
