function nextAction(){let fc=forecast();if(!G.trainingDone)return{page:'training',label:'Entrenar al grupo',desc:'Asigna entrenamiento individual antes de preparar el concierto.',step:'training'};if(G.currentEvent&&!G.currentEvent.done)return{page:'events',label:'Resolver evento semanal',desc:'Hay una decisión narrativa pendiente que puede cambiar la semana.',step:'event'};if(!G.showDone&&G.money<fc.preCost)return{page:'loans',label:'Pedir crédito',desc:`Necesitas ${money(fc.preCost)} para preparar el concierto y solo tienes ${money(G.money)}. Elige deuda con cuidado.`,step:'loan'};if(!G.showDone)return{page:'concert',label:'Preparar concierto',desc:'Revisa setlist, precio, promoción, merchandising y riesgo antes del show.',step:'concert'};return{page:'concertLive',label:'Cierre automático',desc:'El concierto cierra la semana automáticamente.',step:'next'};}
function dashboardPage(){let a=nextAction(),f=Math.round(avg(G.idols,'fatigue')),m=Math.round(avg(G.idols,'morale')),v=VENUES[G.venue],fc=forecast();let steps=[['training','Entrenamiento',G.trainingDone?'Hecho':'Pendiente','🏋️'],['event','Evento',G.currentEvent?.done?'Hecho':'Pendiente','📰'],['loan','Crédito',G.money<forecast().preCost?'Recomendado':(G.loans?.length?'Activo':'Opcional'),'💴'],['merch','Merch','Opcional','🛍️'],['concert','Concierto',G.showDone?'Hecho':'Pendiente','🎤'],['next','Nueva semana','Auto tras show','➡️']];return title('Dashboard','La semana actual de '+esc(G.groupName))+`
  <div class="card hero"><div class="heroTop"><div><div class="eyebrow">Siguiente paso recomendado</div><h2>${esc(a.label)}</h2><p class="muted">${esc(a.desc)}</p></div><button class="btn primary" data-page="${a.page}">${a.step==='next'?'Ver cierre':'Ir ahora'} →</button></div><div class="steps">${steps.map((s,i)=>`<div class="step ${s[0]===a.step?'active':''} ${(s[2]==='Hecho')?'done':''}"><div class="stepNum">${i+1}</div><div><strong>${s[3]} ${s[1]}</strong><small>${s[2]}</small></div></div>`).join('')}</div></div>
  <div class="grid four section"><div class="card"><div class="avatar">👥</div><p class="muted">Cohesión</p><div class="metric cyan">${Math.round(G.cohesion)}%</div><div class="progress"><i style="width:${G.cohesion}%"></i></div><b>${G.cohesion>=70?'Alta':G.cohesion>=45?'Media':'Baja'}</b><p class="muted">${G.cohesion>=70?'El grupo está sólido.':G.cohesion>=45?'Hay base, pero puede mejorar.':'Conviene trabajar equipo.'}</p></div><div class="card"><div class="avatar">⚡</div><p class="muted">Fatiga media</p><div class="metric yellow">${f}%</div><div class="progress fatigue"><i style="width:${f}%"></i></div><b>${f>=75?'Alta':f>=45?'Media':'Baja'}</b><p class="muted">${f>=75?'Descanso recomendado.':f>=45?'Cuidado con el exceso.':'Buen margen de actividad.'}</p></div><div class="card"><div class="avatar">🙂</div><p class="muted">Moral media</p><div class="metric green">${m}%</div><div class="progress moral"><i style="width:${m}%"></i></div><b>${m>=75?'Alta':m>=50?'Media':'Baja'}</b><p class="muted">${m>=75?'El grupo está motivado.':m>=50?'Estado estable.':'Riesgo de mal ambiente.'}</p></div><div class="card"><h3>Próximo concierto</h3><p class="metric pink" style="font-size:24px">${v.name}</p><p>👥 ${v.cap} plazas<br>¥ ${money(G.ticket)} entrada<br>🛍️ ${activeMerchProducts().length} producto/s en venta</p><button class="btn primary block" data-page="concert">Preparar concierto →</button></div></div>
  <div class="grid two section"><div class="card"><h3>Previsión rápida</h3>${forecastMini(fc)}<button class="btn" data-page="concert">Ver simulación completa</button></div><div class="card"><h3>Objetivos de temporada</h3>${objectivesHTML()}</div></div>
  <div class="grid two section"><div class="card"><h3>Últimas noticias</h3><ul class="news">${G.news.slice(0,5).map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div><div class="card"><h3>Evento semanal</h3>${G.currentEvent&&!G.currentEvent.done?`<p><b>${esc(G.currentEvent.title)}</b></p><p class="muted">${esc(G.currentEvent.desc)}</p><button class="btn primary" data-page="events">Resolver evento</button>`:'<p class="muted">No queda ningún evento pendiente esta semana.</p>'}</div></div>
  ${G.lastReport?reportHTML(G.lastReport,true):''}`}
function forecastMini(fc){return`<div class="kpiLine"><div class="rangeBadge"><span>Asistencia</span><b>${fc.attMin}-${fc.attMax}/${fc.capacity}</b></div><div class="rangeBadge"><span>Beneficio</span><b class="${fc.profitMid>=0?'positive':'negative'}">${money(fc.profitMin)} / ${money(fc.profitMax)}</b></div><div class="rangeBadge"><span>Riesgo</span><b class="${fc.riskLevel==='Alto'?'negative':fc.riskLevel==='Medio'?'neutral':'positive'}">${fc.riskLevel}</b></div><div class="rangeBadge"><span>Problema probable</span><b>${esc(fc.issue)}</b></div></div>`}
function objectivesHTML(){return seasonObjectives(G).map(o=>{let pct=o.id==='cash'?(o.value?100:0):clamp(o.value/o.target*100);return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;gap:10px"><b>${esc(o.name)}</b><span class="pill ${pct>=100?'green':''}">${pct>=100?'Completado':Math.round(pct)+'%'}</span></div><small class="muted">${esc(o.desc)} · Recompensa: ${esc(o.reward)}</small><div class="progress"><i style="width:${pct}%"></i></div></div>`}).join('')}
function groupPage(){return title('Grupo','Roles, atributos y bienestar')+`<div class="card"><div class="tableWrap"><table><thead><tr><th>Integrante</th><th>Rol</th><th>Voz</th><th>Baile</th><th>Carisma</th><th>Resistencia</th><th>Popularidad</th><th>Potencial</th><th>Fatiga</th><th>Moral</th><th>Salario</th></tr></thead><tbody>${G.idols.map(x=>`<tr><td><b>${esc(x.name)}</b><br><small class="muted">${esc(x.age)} años · ${esc(x.trait)}</small></td><td><span class="pill pink">${ROLE_NAMES[x.role]}</span><br><small class="muted">${esc(ROLES.find(r=>r.id===x.role)?.effect)}</small></td><td>${Math.round(x.voice)}</td><td>${Math.round(x.dance)}</td><td>${Math.round(x.charisma)}</td><td>${x.stamina}</td><td>${Math.round(x.popularity)}</td><td>${x.potential}</td><td>${Math.round(x.fatigue)}<div class="progress fatigue"><i style="width:${x.fatigue}%"></i></div></td><td>${Math.round(x.morale)}<div class="progress moral"><i style="width:${x.morale}%"></i></div></td><td>${money(x.salary)}</td></tr>`).join('')}</tbody></table></div></div><div class="grid four section">${ROLES.map(r=>`<div class="card"><h3>${r.name}</h3><p class="muted">${r.effect}</p></div>`).join('')}</div>`}
function trainingPage(){return title('Entrenamiento individual','Mira los atributos antes de decidir qué mejorar')+(G.trainingDone?trainingProgressHTML():'')+`<div class="grid three">${G.idols.map((x,i)=>{let weak=trainingWeakness(x),t=TRAINING[x.training]||TRAINING.team;return`<div class="card idolCard ${G.trainingDone?'trainingLive':''}"><div class="avatar">${t.icon||'✨'}</div><div><h3>${esc(x.name)}</h3><p class="muted">${ROLE_NAMES[x.role]} · Fatiga ${Math.round(x.fatigue)} · Moral ${Math.round(x.morale)}</p><div class="attrGrid"><div class="attrBox"><small>Voz</small><b>${Math.round(x.voice)}</b></div><div class="attrBox"><small>Baile</small><b>${Math.round(x.dance)}</b></div><div class="attrBox"><small>Carisma</small><b>${Math.round(x.charisma)}</b></div><div class="attrBox"><small>Resistencia</small><b>${Math.round(x.stamina)}</b></div><div class="attrBox"><small>Popularidad</small><b>${Math.round(x.popularity)}</b></div><div class="attrBox"><small>Potencial</small><b>${Math.round(x.potential)}</b></div></div>${G.trainingDone?`<div class="notice good"><b>Ahora:</b> está entrenando ${esc(t.name.toLowerCase())}. La escena está llena de botellas Pocari, conteos en voz baja y una seriedad sospechosamente anime.</div>`:`<div class="notice ${x.fatigue>75?'bad':x.fatigue>55?'warn':'good'}"><b>Sugerencia:</b> ${esc(weak)}</div>`}<div class="field"><label>Plan semanal</label><select class="trainSel" data-i="${i}" ${G.trainingDone?'disabled':''}>${Object.entries(TRAINING).map(([k,tr])=>`<option value="${k}" ${x.training===k?'selected':''}>${tr.icon} ${tr.name} · Fatiga ${tr.fatigue>0?'+':''}${tr.fatigue}</option>`).join('')}</select></div><p class="miniText">${esc(t.desc||'')}</p></div></div>`}).join('')}</div><div class="card section"><h3>${G.trainingDone?'Entrenamiento en marcha':'Lectura del plan'}</h3><p>${trainingAdvice()}</p>${G.trainingDone?'<button class="btn primary" data-page="dashboard">← Volver al Dashboard y seguir la ruta recomendada</button>':`<button class="btn primary" id="doTraining">Realizar entrenamientos</button>`}</div>`}
function trainingProgressHTML(){let items=G.idols.map(x=>{let t=TRAINING[x.training]||TRAINING.team;return`<div class="rangeBadge"><span>${t.icon} <b>${esc(x.name)}</b><br><small>${esc(t.name)} · ${esc(t.desc)}</small></span><span class="pill green">En marcha</span></div>`}).join('');return`<div class="card trainingLive"><h3>Entrenamiento en marcha</h3><p>Las chicas están entrenando ahora mismo. No es un resumen del pasado: en algún lugar del live house alguien está contando “5, 6, 7, 8” con una toalla demasiado oficial.</p><div class="trainingLiveList">${items}</div><button class="btn primary section" data-page="dashboard">← Volver al Dashboard</button></div>`}
function trainingAdvice(){let counts={};G.idols.forEach(x=>counts[x.training]=(counts[x.training]||0)+1);let parts=Object.entries(counts).map(([k,n])=>`${n} en ${TRAINING[k].name}`);let f=avg(G.idols,'fatigue');return `Plan actual: ${parts.join(', ')}. ${f>70?'La fatiga es alta: conviene incluir descanso.':f<35?'Hay margen para empujar atributos.':'Plan equilibrado para esta semana.'}`;}
function auditionsPage(){return title('Audiciones','Fichajes con roles útiles y costes claros')+(G.idols.length>=7?'<div class="notice warn">La plantilla está completa (7/7).</div>':'')+`<div class="grid three">${G.auditions.map((x,i)=>`<div class="card"><h3>${esc(x.name)}</h3><span class="pill pink">${ROLE_NAMES[x.role]} · ${x.age} años</span><p class="muted">${esc(x.trait)}</p><div class="kpiLine"><span>Voz <b>${x.voice}</b></span><span>Baile <b>${x.dance}</b></span><span>Carisma <b>${x.charisma}</b></span><span>Pot. <b>${x.potential}</b></span></div><p>Salario semanal: <b>${money(x.salary)}</b></p><button class="btn primary hire" data-i="${i}" ${G.money<x.cost||G.idols.length>=7?'disabled':''}>Fichar · ${money(x.cost)}</button></div>`).join('')}</div>`}
function staffPage(){return title('Staff','Especialistas con niveles del 0 al 3')+`<div class="optionGrid">${Object.entries(STAFF).map(([k,x])=>{let lv=G.staff[k],cost=(lv+1)*55000;return`<div class="card"><h3>${esc(x.name)}</h3><div class="staffLevel">Nivel ${lv} / 3</div><p class="muted">${esc(x.effect)}</p><button class="btn ${lv?'':'primary'} staffUp" data-staff="${k}" ${lv>=3||G.money<cost?'disabled':''}>${lv?'Mejorar':'Contratar'} · ${money(cost)}</button></div>`}).join('')}</div><div class="notice">El staff cobra 4.000 ¥ por nivel y semana. Sus efectos se aplican en entrenamientos, eventos y conciertos.</div>`}
function songsPage(){return title('Canciones','Produce repertorio para crear setlists de tres temas')+`<div class="optionGrid">${SONGS.map((s,i)=>`<div class="card ${G.songs.includes(i)?'songOwned':'locked'}"><h3>${esc(s.title)}</h3><div class="kpiLine"><span>Ener. <b>${s.energy}</b></span><span>Voz <b>${s.vocal}</b></span><span>Baile <b>${s.dance}</b></span><span>Viral <b>${s.viral}</b></span></div><p>Calidad actual: <b>${s.quality+G.staff.producer*2+G.songBoost}</b></p>${s.note?`<p class="miniText">${esc(s.note)}</p>`:''}${G.songs.includes(i)?'<span class="pill green">En repertorio</span>':`<button class="btn primary buySong" data-song="${i}" ${G.money<s.cost?'disabled':''}>Producir · ${money(s.cost)}</button>`}</div>`).join('')}</div>`}
function concertPage(){let fc=forecast();return title('Concierto','Preparación del show; al celebrarlo se cerrará la semana automáticamente')+(G.showDone?'<div class="notice good">El concierto ya está en cierre automático.</div>':'')+`<div class="grid two"><div class="card"><h3>Producción del show</h3><div class="formRow"><div class="field"><label>Sala</label><select id="venueSel">${VENUES.map((x,i)=>`<option value="${i}" ${i===G.venue?'selected':''} ${G.reputation<x.rep||totalFans()<x.fans?'disabled':''}>${x.name} · ${x.cap} plazas ${G.reputation<x.rep||totalFans()<x.fans?'🔒':''}</option>`).join('')}</select></div><div class="field"><label>Precio de entrada</label><input type="number" id="ticket" min="500" max="12000" step="100" value="${G.ticket}"></div><div class="field"><label>Promoción</label><select id="promoSel">${PROMOS.map((x,i)=>`<option value="${i}" ${i===G.promo?'selected':''}>${x.name} · ${money(x.cost)}</option>`).join('')}</select></div><div class="field"><label>Estrategia</label><select id="strategySel">${STRATEGIES.map((x,i)=>`<option value="${i}" ${i===G.strategy?'selected':''}>${x.name}</option>`).join('')}</select></div></div><h3 class="section">Setlist</h3><div class="formRow">${['Opening','Canción principal','Final'].map((label,pos)=>`<div class="field"><label>${label}</label><select class="setlistSel" data-pos="${pos}">${G.songs.map(i=>`<option value="${i}" ${G.setlist[pos]===i?'selected':''}>${SONGS[i].title}</option>`).join('')}</select></div>`).join('')}</div><h3 class="section">Merchandising en venta</h3>${activeMerchProducts().length?`<div class="merchSoldList">${activeMerchProducts().map(m=>`<div class="rangeBadge"><span>${merchEmoji(m)} <b>${esc(m.name)}</b><br><small>${money(m.price)} · ${esc(m.slogan)}</small></span></div>`).join('')}</div>`:'<div class="notice warn">No tienes productos activos. Ve a Sponsors y merchandising para diseñar locuras vendibles.</div>'}</div><div class="card"><h3>Previsión antes del concierto</h3>${forecastMini(fc)}<div class="notice ${fc.riskLevel==='Alto'?'bad':fc.riskLevel==='Medio'?'warn':'good'}"><b>Diagnóstico:</b> ${esc(fc.diagnosis)}</div><h3>Factores previstos</h3>${fc.factors.map(f=>`<div class="factor ${f.type}">${f.type==='positive'?'+':f.type==='negative'?'-':'•'} ${esc(f.text)}</div>`).join('')}<div class="notice warn"><b>Importante:</b> al pulsar celebrar, verás una página de concierto en directo y después pasará automáticamente a la siguiente semana.</div><button class="btn primary block section" id="playShow" ${G.showDone||G.money<fc.preCost?'disabled':''}>🎤 Celebrar concierto y cerrar semana</button></div></div>${G.lastReport?reportHTML(G.lastReport,false):''}`}
function eventsPage(){let ev=G.currentEvent;return title('Eventos y noticias','Decisiones semanales con consecuencias')+`<div class="grid two"><div class="card"><h3>Evento semanal</h3>${ev&&!ev.done?`<p><b>${esc(ev.title)}</b></p><p class="muted">${esc(ev.desc)}</p><div class="optionGrid">${ev.options.map((o,i)=>{let disabled=!optionAllowed(o);let req=reqText(o);return`<button class="choice eventChoice" data-i="${i}" ${disabled?'disabled':''}><strong>${esc(o.label)}</strong><small>${esc(req||effectSummary(o.effects))}</small></button>`}).join('')}</div>`:`<p class="muted">Evento resuelto. La próxima semana llegará otra situación.</p>`}</div><div class="card"><h3>Noticias</h3><ul class="news">${G.news.slice(0,12).map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div></div>`}
function sponsorsPage(){let upgradeCost=(G.merchLevel+1)*70000;return title('Sponsors y merchandising','Contratos, productos con doble sentido y ventas en conciertos')+`<div class="grid two"><div class="card"><h3>Ofertas disponibles</h3><div class="optionGrid">${G.sponsorOffers.map((s,i)=>`<div class="card"><h3>${esc(s.name)}</h3><p><b>Entrada:</b> ${money(s.cash)} ${s.weekly?`· <b>Semanal:</b> ${money(s.weekly)}`:''}</p><p><b>Condición:</b> ${esc(s.condition)}</p><p class="muted">${esc(s.risk)}</p><button class="btn primary acceptSponsor" data-i="${i}" ${s.accepted?'disabled':''}>Aceptar sponsor</button></div>`).join('')}</div></div><div class="card merchDesigner"><h3>Diseñar merchandising</h3><p class="muted">Los productos activos se venderán durante los conciertos. Cuanto más de shotengai nocturno y más “esto parece normal pero no lo es”, más ingresos… con cierto riesgo de reverencia incómoda.</p><div class="formRow"><div class="field"><label>Producto</label><select id="merchType">${MERCH_TYPES.map(t=>`<option value="${t.id}">${t.emoji} ${t.name}</option>`).join('')}</select></div><div class="field"><label>Precio de venta</label><input id="merchPrice" type="number" min="300" max="12000" step="100" value="1800"></div></div><div class="field section"><label>Nombre con doble sentido</label><input id="merchName" maxlength="48" value="${esc(randomMerchName())}"></div><div class="formRow section"><button class="btn" id="randomMerchName">🎲 Nombre japonés raro</button><button class="btn primary" id="createMerch">Diseñar y fabricar</button></div><p class="miniText">Coste de diseño aproximado: ${money(merchDesignCost())}.</p><h3 class="section">Mejora de stand</h3><p>Nivel actual: <b>${G.merchLevel}</b>. Aumenta ingresos de merch en conciertos.</p><button class="btn" id="upgradeMerch" ${G.money<upgradeCost?'disabled':''}>Mejorar stand · ${money(upgradeCost)}</button></div></div><div class="card section"><h3>Productos en venta</h3>${G.merchProducts.length?`<div class="optionGrid">${G.merchProducts.map(m=>merchProductHTML(m)).join('')}</div>`:'<p class="muted">Todavía no hay productos. Esto es grave: ¿cómo sabrá el público que existe un omamori que intuye tu oshi?</p>'}</div><div class="card section"><h3>Contratos activos</h3>${G.activeSponsors.length?G.activeSponsors.map(s=>`<div class="rangeBadge"><span><b>${esc(s.name)}</b><br><small>${esc(s.condition)}</small></span><span class="pill ${s.done?'green':'pink'}">${s.done?'Revisado':'Activo'}</span></div>`).join(''):'<p class="muted">No hay sponsors activos.</p>'}</div>`}
function fansPage(){let labels={casual:'Fans casuales',loyal:'Fans fieles',online:'Fans de redes',press:'Prensa local',promoters:'Promotores'};let icons={casual:'👋',loyal:'💖',online:'📱',press:'📰',promoters:'🎟️'};let max=Math.max(1,...Object.values(G.fans));return title('Fans','Segmentos de público y cómo crece cada uno')+`<div class="grid two"><div class="card"><h3>Base total</h3><div class="metric pink">${totalFans().toLocaleString('es-ES')}</div><p class="muted">Cada acción atrae públicos distintos. Los fans fieles ayudan a asistencia estable; online mejora viralidad; prensa y promotores abren oportunidades.</p><div class="fansBars">${Object.entries(G.fans).map(([k,v])=>`<div class="fanRow"><span>${icons[k]} ${labels[k]}</span><div class="progress"><i style="width:${v/max*100}%"></i></div><b>${Math.round(v)}</b></div>`).join('')}</div></div><div class="card"><h3>Consejos</h3><ul class="news"><li>Redes sociales: sube fans online y casuales.</li><li>Eventos de firmas: sube fans fieles.</li><li>Buena reputación: atrae prensa y promotores.</li><li>Conciertos de alta valoración convierten casuales en fieles.</li></ul></div></div>`}
function ranking(){return[...G.rivals,{name:G.groupName,fans:totalFans(),reputation:G.reputation,player:true,result:G.lastReport?G.lastReport.rating+'/100':'Sin show',trend:G.lastReport?(G.lastReport.rep>=0?'▲':'▼'):'—',lastAction:'Tu agencia'}].sort((a,b)=>(b.fans+b.reputation*12)-(a.fans+a.reputation*12));}
function rankPos(){return ranking().findIndex(x=>x.player)+1}
function rankingPage(){return title('Ranking indie','Rivales con acciones semanales')+`<div class="card"><div class="tableWrap"><table><thead><tr><th>Pos.</th><th>Grupo</th><th>Fans</th><th>Reputación</th><th>Último resultado</th><th>Acción rival</th><th>Tendencia</th></tr></thead><tbody>${ranking().map((x,i)=>`<tr><td><b>#${i+1}</b></td><td>${esc(x.name)} ${x.player?'<span class="pill pink">TU GRUPO</span>':''}</td><td>${Math.round(x.fans).toLocaleString('es-ES')}</td><td>${Math.round(x.reputation)}</td><td>${esc(x.result)}</td><td>${esc(x.lastAction||'—')}</td><td class="${x.trend==='▲'?'positive':x.trend==='▼'?'negative':''}">${x.trend}</td></tr>`).join('')}</tbody></table></div></div>`}

function merchBreakdown(attendance,rating){let products=activeMerchProducts();if(!products.length)return[];let charisma=avg(G.idols,'charisma'),visual=roleSummary().merch;return products.map(m=>{let t=merchType(m.type);let hype=(t.appeal+(+m.appeal||0)+G.merchLevel*7+G.staff.wardrobe*6+charisma*.12+rating*.1)*(1+visual);let pricePenalty=Math.max(.35,1-((+m.price||1000)-t.basePrice)/9000);let weirdBonus=1+(+m.weirdness||0)*.035;let units=Math.max(0,Math.round(attendance*(hype/210)*pricePenalty*weirdBonus*(.75+Math.random()*.5)));return{name:m.name,emoji:t.emoji,units,revenue:units*(+m.price||t.basePrice)}}).filter(x=>x.units>0)}

function bind(){document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{current=b.dataset.page;render()});let q=s=>document.querySelector(s);document.querySelectorAll('.trainSel').forEach(s=>s.onchange=e=>{G.idols[+e.target.dataset.i].training=e.target.value;saveSlot(activeSlot,true);render()});if(q('#doTraining'))q('#doTraining').onclick=doTraining;document.querySelectorAll('.hire').forEach(b=>b.onclick=()=>hire(+b.dataset.i));document.querySelectorAll('.staffUp').forEach(b=>b.onclick=()=>upgradeStaff(b.dataset.staff));document.querySelectorAll('.buySong').forEach(b=>b.onclick=()=>buySong(+b.dataset.song));document.querySelectorAll('.setlistSel').forEach(s=>s.onchange=e=>{G.setlist[+e.target.dataset.pos]=+e.target.value;saveSlot(activeSlot,true);render()});[['#venueSel','venue'],['#promoSel','promo'],['#strategySel','strategy']].forEach(([id,k])=>{if(q(id))q(id).onchange=e=>{G[k]=+e.target.value;saveSlot(activeSlot,true);render()}});if(q('#ticket'))q('#ticket').onchange=e=>{G.ticket=clamp(+e.target.value,500,12000);saveSlot(activeSlot,true);render()};if(q('#playShow'))q('#playShow').onclick=playShow;if(q('#nextWeekTop'))q('#nextWeekTop').onclick=nextWeek;document.querySelectorAll('.eventChoice').forEach(b=>b.onclick=()=>chooseEvent(+b.dataset.i));document.querySelectorAll('.acceptSponsor').forEach(b=>b.onclick=()=>acceptSponsor(+b.dataset.i));if(q('#upgradeMerch'))q('#upgradeMerch').onclick=upgradeMerch;if(q('#randomMerchName'))q('#randomMerchName').onclick=()=>{let n=q('#merchName');if(n)n.value=randomMerchName();};if(q('#createMerch'))q('#createMerch').onclick=createMerchProduct;document.querySelectorAll('.toggleMerch').forEach(b=>b.onclick=()=>{let m=G.merchProducts.find(x=>String(x.id)===String(b.dataset.id));if(m){m.active=!m.active;saveSlot(activeSlot,true);render();}});if(q('#loanLender'))q('#loanLender').onchange=e=>{G.loanDraft.lender=e.target.value;saveSlot(activeSlot,true);render()};if(q('#loanAmount'))q('#loanAmount').onchange=e=>{G.loanDraft.amount=+e.target.value;saveSlot(activeSlot,true);render()};if(q('#loanWeeks'))q('#loanWeeks').onchange=e=>{G.loanDraft.weeks=+e.target.value;saveSlot(activeSlot,true);render()};if(q('#takeLoan'))q('#takeLoan').onclick=takeLoan;document.querySelectorAll('.saveToSlot').forEach(b=>b.onclick=()=>saveSlot(+b.dataset.slot));document.querySelectorAll('.loadSlot').forEach(b=>b.onclick=()=>{let s=loadSlot(+b.dataset.slot);if(s){G=s;activeSlot=+b.dataset.slot;localStorage.setItem('idolManagerPro_activeSlot',activeSlot);normalize();current='dashboard';toast('Slot '+activeSlot+' cargado.');render();}});if(q('#exportSave'))q('#exportSave').onclick=exportSave;if(q('#importSave'))q('#importSave').onclick=()=>document.querySelector('#importFile').click();}
function doTraining(){let cost=0;G.idols.forEach(x=>{let t=TRAINING[x.training],well=G.staff.wellness,dance=G.staff.dance,vocal=G.staff.vocal;let gain=(1+x.potential/100)*(1+rnd(0,12)/10);if(t.stat==='voice')x.voice=clamp(x.voice+gain+vocal*.8,0,99);if(t.stat==='dance')x.dance=clamp(x.dance+gain+dance*.8,0,99);if(t.stat==='charisma')x.charisma=clamp(x.charisma+gain+G.staff.wardrobe*.4,0,99);if(t.stat==='popularity')x.popularity=clamp(x.popularity+gain*.85+G.staff.social*.4,0,99);if(t.stat==='team'){x.morale=clamp(x.morale+5+well);G.cohesion=clamp(G.cohesion+1.4+leaderBonus()*.1);}if(t.stat==='rest'){x.fatigue=clamp(x.fatigue-20-well*3);x.morale=clamp(x.morale+7+well);}else{x.fatigue=clamp(x.fatigue+t.fatigue-well-(x.training==='dance'?dance:0));}cost+=x.training==='personal'?3000:0;});G.money-=cost;G.trainingDone=true;G.news.unshift('El entrenamiento individual está en marcha: sudor, reverencias y una botella Pocari que parece tener arco narrativo.');saveSlot(activeSlot,true);toast('Entrenamiento en marcha. Vuelve al Dashboard para seguir la ruta.');render();}

function hire(i){let x=G.auditions[i];if(!x||G.money<x.cost||G.idols.length>=7)return;G.money-=x.cost;let {cost,...idol}=x;G.idols.push(idol);G.auditions.splice(i,1);G.cohesion=clamp(G.cohesion-4);G.news.unshift(`${x.name} firma un contrato justo con ${G.groupName}.`);saveSlot(activeSlot,true);render();}
function upgradeStaff(k){let lv=G.staff[k],cost=(lv+1)*55000;if(lv>=3||G.money<cost)return;G.money-=cost;G.staff[k]++;G.news.unshift(`${STAFF[k].name} alcanza el nivel ${G.staff[k]}.`);saveSlot(activeSlot,true);render();}

function roleSummary(){let out={rating:0,vocalReduce:0,danceReduce:0,merch:0,viral:0,moraleShield:0,cohesion:0};G.idols.forEach(x=>{if(x.role==='center')out.rating+=2+x.charisma/35;if(x.role==='vocal')out.vocalReduce+=5+x.voice/20;if(x.role==='dancer')out.danceReduce+=5+x.dance/20;if(x.role==='leader')out.cohesion+=2+x.charisma/30;if(x.role==='variety')out.viral+=2+x.charisma/35;if(x.role==='visual')out.merch+=.08+x.charisma/600;if(x.role==='favorite')out.moraleShield+=4+x.popularity/20;});return out;}
function setlistStats(){let list=G.setlist.map(i=>SONGS[i]||SONGS[0]);let keys=['energy','vocal','dance','hook','emotion','viral','quality'];let s={titles:list.map(x=>x.title)};keys.forEach(k=>s[k]=list.reduce((a,x)=>a+x[k],0)/list.length);s.quality+=G.staff.producer*2+G.songBoost;return s;}
function forecast(){let v=VENUES[G.venue],p=PROMOS[G.promo],s=setlistStats(),roles=roleSummary(),ms=merchStats();let mv=avg(G.idols,'voice'),md=avg(G.idols,'dance'),mc=avg(G.idols,'charisma'),mm=avg(G.idols,'morale'),mf=avg(G.idols,'fatigue'),mp=avg(G.idols,'popularity'),fans=G.fans;let diff=Math.max(0,s.vocal-mv-roles.vocalReduce)*.14+Math.max(0,s.dance-md-roles.danceReduce)*.14;let strat=STRATEGIES[G.strategy].id;let stratBonus=strat==='energy'?s.energy*.08:strat==='emotion'?s.emotion*.08:strat==='loyal'?mp*.12:strat==='risky'?8:5;let group=mv*.23+md*.23+mc*.23+G.cohesion*.15+mm*.12-mf*.22;let rating=clamp(group*.72+(s.quality+s.hook+s.viral)/3*.25+stratBonus+roles.rating+G.staff.vocal+G.staff.dance*1.2+G.staff.wardrobe*.7-diff,0,100);let pricePenalty=Math.max(0,(G.ticket-2200)/65);let demand=12+fans.casual*.08+fans.loyal*.22+fans.online*.06+fans.press*2.2+fans.promoters*5+G.reputation*2.1+p.power*(1+G.staff.social*.14)+mp*.7-pricePenalty+(strat==='loyal'?fans.loyal*.08:0)+(strat==='energy'?s.viral*.07:0)+ms.demandBonus;let att=clamp(demand,5,v.cap);let merchPer=160+mp*3+mc*1.5+G.staff.wardrobe*90+G.merchLevel*120+ms.avgPrice*.18+ms.appeal*6;let merch=att*merchPer*(.62+totalFans()/(totalFans()+1000))*(1+roles.merch)*(1+ms.weirdness*.035);let salaries=G.idols.reduce((a,x)=>a+x.salary,0),staffCost=Object.values(G.staff).reduce((a,x)=>a+x,0)*4000,preCost=v.cost+p.cost,costs=preCost+salaries+staffCost;let tickets=att*G.ticket;let profit=tickets+merch-costs;let factors=[];if(mf>70)factors.push({type:'negative',text:'Fatiga alta: aumenta riesgo de incidentes y baja valoración.'});else factors.push({type:'positive',text:'Fatiga controlada para afrontar el show.'});if(mm>70)factors.push({type:'positive',text:'Moral alta: el público percibirá mejor la actuación.'});if(diff>8)factors.push({type:'negative',text:'El setlist exige más voz/baile del nivel actual.'});if(p.power>30)factors.push({type:'positive',text:'La promoción debería elevar asistencia.'});if(G.ticket>3000)factors.push({type:'negative',text:'Precio alto: puede limitar asistencia.'});if(roles.rating>4)factors.push({type:'positive',text:'Los roles del grupo aportan bonus reales al directo.'});if(ms.count)factors.push({type:'positive',text:`${ms.count} producto/s de merchandising estarán a la venta.`});else factors.push({type:'negative',text:'Sin merchandising activo: dinero que se queda en la mesa.'});if(ms.weirdness>6)factors.push({type:'neutral',text:'El merchandising es tan raro que puede volverse meme o espantar a una señora.'});if(G.activeSponsors.length)factors.push({type:'neutral',text:'Los sponsors activos se evaluarán tras el concierto.'});let riskScore=(mf>80?3:mf>65?2:0)+(diff>12?2:diff>7?1:0)+(G.money<costs?2:0)+(STRATEGIES[G.strategy].id==='risky'?2:0)+(G.ticket>3500?1:0)+(ms.weirdness>8?1:0);let riskLevel=riskScore>=4?'Alto':riskScore>=2?'Medio':'Bajo';let issue=mf>70?'Fatiga':diff>8?'Dificultad':G.ticket>3000?'Precio':ms.weirdness>8?'Merch rarísimo':'Ninguno grave';let diagnosis=riskLevel==='Alto'?'Conviene ajustar descanso, setlist, sala o bajar un poco el nivel de chaladura.':riskLevel==='Medio'?'El show es viable, pero hay algún punto a vigilar.':'La preparación parece sólida para esta semana.';return{rating,attendance:att,attMin:Math.max(1,Math.round(att*.82)),attMax:Math.min(v.cap,Math.round(att*1.18)),capacity:v.cap,profitMid:profit,profitMin:profit*0.82-15000,profitMax:profit*1.18+15000,riskLevel,issue,diagnosis,factors,preCost,costs,tickets,merch,salaries,staffCost,venue:v,promo:p,setlist:s,merchStats:ms};}
function playShow(){let fc=forecast(),v=VENUES[G.venue],p=PROMOS[G.promo],s=fc.setlist,roles=roleSummary(),ms=fc.merchStats;if(G.money<fc.preCost)return;let variability=rnd(-7,7);let incident=0,moments=[],factors=[...fc.factors];let high=G.idols.filter(x=>x.fatigue>80);if(high.length&&Math.random()<.25+high.length*.1-G.staff.wellness*.06){incident-=rnd(5,12);moments.push(`${high[0].name} terminó con fatiga alta; se recomienda descanso, té caliente y no mirar al tanuki a los ojos.`);factors.push({type:'negative',text:'Incidente por fatiga durante el show.'});}
if(Math.random()<.12-G.staff.vocal*.02){incident-=4;moments.push('Una inestabilidad vocal obligó a adaptar un verso con un “よろしく” dramáticamente afinado.');}
if(Math.random()<.10-G.staff.dance*.02){incident-=4;moments.push('La coreografía tuvo errores leves y una reverencia que parecía abrir una ruta secreta del JR Pass.');}
if(Math.random()<.13+G.staff.social*.04+s.viral/900+roles.viral/50+ms.weirdness/100){incident+=rnd(4,10);moments.push('Un fragmento del show empezó a circular en redes porque alguien gritó “¡ese omamori sabe demasiado!”.');factors.push({type:'positive',text:'Momento viral generado durante el concierto.'});}
if(ms.weirdness>7&&Math.random()<.18){incident+=rnd(2,6);moments.push('El merchandising raro provoca colas de fans que no saben si comprar o pedir una bendición en el konbini.');factors.push({type:'positive',text:'El merch absurdo generó conversación.'});}
if(v.outdoor&&Math.random()<.12){incident-=12;moments.push('La lluvia redujo parte de la asistencia al evento exterior. El tanuki asesor no selló la aprobación.');}
let rating=Math.round(clamp(fc.rating+variability+incident));let attendance=Math.round(clamp(fc.attendance+rnd(-10,15),5,v.cap));let tickets=attendance*G.ticket;let merchSold=merchBreakdown(attendance,rating);let merch=merchSold.reduce((a,x)=>a+x.revenue,0);let salaries=G.idols.reduce((a,x)=>a+x.salary,0),staffCost=Object.values(G.staff).reduce((a,x)=>a+x,0)*4000,costs=v.cost+p.cost+salaries+staffCost;let sponsorMoney=evaluateSponsors({rating,attendance,capacity:v.cap});let profit=tickets+merch+sponsorMoney-costs;G.money+=profit;let fill=attendance/v.cap;let strat=STRATEGIES[G.strategy].id;let newBase=Math.max(1,Math.round(rating*.22+fill*22+s.viral*.09+G.staff.social*5+Math.max(0,incident)-8));let gain={casual:Math.round(newBase*.45),loyal:Math.round(newBase*.25),online:Math.round(newBase*.2),press:Math.max(0,Math.round((rating-55)/6)),promoters:Math.max(0,Math.round((rating-65)/8))};if(strat==='emotion'||strat==='loyal')gain.loyal+=Math.round(newBase*.25);if(strat==='energy')gain.online+=Math.round(newBase*.25);Object.entries(p.segments).forEach(([k,val])=>gain[k]=(gain[k]||0)+Math.round(val/3));Object.keys(gain).forEach(k=>G.fans[k]=Math.max(0,(G.fans[k]||0)+gain[k]));let rep=Math.round((rating-58)/10+(fill>.8?1:0)+(G.fans.press>20?.5:0));G.reputation=clamp(G.reputation+rep,0,100);let fatigueGain=9+(strat==='energy'?5:strat==='safe'?-2:strat==='risky'?4:2);G.idols.forEach(x=>{x.fatigue=clamp(x.fatigue+fatigueGain*(1.25-x.stamina/200)-G.staff.wellness);let moraleDelta=rating>=70?4:rating<50?-6+roles.moraleShield/3:1;x.morale=clamp(x.morale+moraleDelta);x.popularity=clamp(x.popularity+(sumObj(gain)/G.idols.length)/12,0,99)});G.cohesion=clamp(G.cohesion+(rating>=70?3:rating<50?-4:1)-high.length+roles.cohesion*.3);let star=[...G.idols].sort((a,b)=>(b.charisma+b.popularity)-(a.charisma+a.popularity))[0];moments.unshift(`${star.name} brilló en su rol de ${ROLE_NAMES[star.role]} mientras una luz de neón parecía decir “お疲れ様” con autoridad municipal.`);moments.push(`El setlist (${s.titles.join(' · ')}) recibió una valoración ${rating>=75?'muy positiva':rating>=55?'correcta':'fría'}.`);if(merchSold.length)moments.push(`El producto más vendido fue “${merchSold.sort((a,b)=>b.revenue-a.revenue)[0].name}”, confirmando que el mercado entiende el doble sentido demasiado bien.`);let conclusion=rating>=85?'Noche memorable. La escena empieza a considerar al grupo una referencia y al stand de merch una sucursal emocional del shotengai.':rating>=70?'Buen concierto. El grupo gana fuerza en la escena indie y alguien pide bis al estilo matsuri.':rating>=52?'Actuación correcta, aunque todavía hay margen para crecer y para explicar ciertos omamori.':'Una noche difícil. Conviene recuperar energías, revisar el plan y no aceptar consejos de ramen.';let r={week:G.week,season:G.season,venue:v.name,capacity:v.cap,attendance,rating,tickets,merch,costs,profit,newFans:sumObj(gain),gain,rep,moments,conclusion,factors,sponsorMoney,setlist:s.titles,merchSold};G.lastReport=r;G.lastEconomy={tickets,merch,salaries,staff:staffCost,promo:p.cost,venue:v.cost,events:G.lastEconomy.events||0,sponsors:sponsorMoney,loans:0,profit};G.history.push(r);if(!G.bestShow||rating>G.bestShow.rating)G.bestShow=r;G.showDone=true;G.news=generateNews(r).concat(G.news).slice(0,30);saveSlot(activeSlot,true);showConcertLive(r);}
function evaluateSponsors(ctx){let total=0;G.activeSponsors.forEach(s=>{if(s.done)return;let ok=false;if(s.type==='rating')ok=ctx.rating>=s.target;if(s.type==='morale')ok=avg(G.idols,'morale')>=s.target;if(s.type==='fill')ok=ctx.attendance/ctx.capacity>=s.target;if(s.type==='event')ok=s.eventTag===s.target;if(ok){if(s.reward?.money){total+=s.reward.money;G.news.unshift(`${s.name} cumple objetivos y paga ${money(s.reward.money)}.`)}if(s.reward?.rep)G.reputation=clamp(G.reputation+s.reward.rep);if(s.reward?.fans)Object.entries(s.reward.fans).forEach(([k,v])=>G.fans[k]=(G.fans[k]||0)+v)}else{G.reputation=clamp(G.reputation-2);G.news.unshift(`${s.name} no queda satisfecho con la condición pactada.`)}s.done=true;});return total;}
function generateNews(r){let pool=[];pool.push(r.rating>75?'Una crítica local elogia la evolución del directo y pregunta si el tanuki cobra en senbei.':'La prensa local pide una identidad escénica más definida y menos amuletos con opinión.');pool.push(r.newFans>30?'El club de fans organiza una quedada para debatir si el omamori tiene lore.':'Fans veteranos comparten recomendaciones y una ruta de konbini emocional.');if(G.staff.wardrobe)pool.push('Fans comentan positivamente el vestuario: “parecen empleados del JR del futuro, pero bien”.');if(avg(G.idols,'fatigue')>70)pool.push('El cansancio empieza a notarse; bienestar recomienda dormir y dejar de discutir con la máquina de bebidas.');if(G.staff.social>=2)pool.push('Una entrevista coordinada por redes consigue una gran respuesta y 14 memes con sello hanko.');if(G.reputation>40)pool.push('Una marca local estudia una colaboración: onigiri isotónico edición último tren.');pool.push('Una agencia rival anuncia un single con 9 cambios de tono y un shakuhachi sospechoso.');return pool.sort(()=>Math.random()-.5).slice(0,rnd(2,4));}
function nextWeek(){if(!G.showDone){toast('Primero celebra el concierto semanal.');return;}advanceRivals();let loanResult=processLoanPayments();if(loanResult.notes.length)G.news=loanResult.notes.concat(G.news).slice(0,34);if(G.money<0)G.negativeWeeks++;else G.negativeWeeks=0;if(G.negativeWeeks>=3){G.gameOver=true;showModal('<h2>Bancarrota</h2><p>La agencia ha permanecido tres semanas en números rojos. La prioridad es cumplir contratos, devolver penlights prestados y cerrar responsablemente.</p><button class="btn primary" onclick="newGame()">Nueva partida</button>');return;}if(G.week===12){seasonEnd();return;}G.week++;resetWeek();}

function loanOffer(lenderId,amount,weeks){let lender=LOAN_LENDERS[lenderId]||LOAN_LENDERS.bank;amount=clamp(Math.round(+amount||80000),50000,500000);weeks=LOAN_WEEKS.includes(+weeks)?+weeks:6;let amountRate=amount/1000000*.10;let timeRate=Math.max(0,weeks-4)*.008;let rate=lender.baseRate+amountRate+timeRate;let total=Math.ceil(amount*(1+rate)/1000)*1000;let weekly=Math.ceil(total/weeks/100)*100;return{lender,amount,weeks,rate,total,weekly};}
function activeDebt(){return(G.loans||[]).reduce((a,l)=>a+(l.balance||0),0)}
function loansPage(){normalize();let draft=G.loanDraft||{lender:'bank',amount:80000,weeks:6},o=loanOffer(draft.lender,draft.amount,draft.weeks);return title('Créditos','Dinero rápido, consecuencias lentas y contratos con demasiados sellos')+`<div class="grid two"><div class="card loanCard ${o.lender.className}"><h3>${o.lender.emoji} Pedir crédito</h3><p class="muted">El dinero entra al momento. Las cuotas se cobran automáticamente al cerrar cada semana, justo después del concierto.</p><div class="formRow"><div class="field"><label>Prestamista</label><select id="loanLender">${Object.values(LOAN_LENDERS).map(l=>`<option value="${l.id}" ${draft.lender===l.id?'selected':''}>${l.emoji} ${l.name}</option>`).join('')}</select></div><div class="field"><label>Cantidad</label><select id="loanAmount">${LOAN_AMOUNTS.map(a=>`<option value="${a}" ${+draft.amount===a?'selected':''}>${money(a)}</option>`).join('')}</select></div><div class="field"><label>Plazo</label><select id="loanWeeks">${LOAN_WEEKS.map(w=>`<option value="${w}" ${+draft.weeks===w?'selected':''}>${w} semanas</option>`).join('')}</select></div></div><div class="loanMiniGrid section"><div class="rangeBadge"><span>Interés</span><b>${Math.round(o.rate*1000)/10}%</b></div><div class="rangeBadge"><span>Total a devolver</span><b>${money(o.total)}</b></div><div class="rangeBadge"><span>Cuota semanal</span><b>${money(o.weekly)}</b></div></div><div class="notice warn"><b>Cláusula absurda:</b> ${esc(o.lender.risk)}</div><button class="btn primary" id="takeLoan">Pedir ${money(o.amount)}</button></div><div class="card"><h3>Deuda activa</h3>${activeDebt()?`<div class="metric pink">${money(activeDebt())}</div><p class="muted">${G.loans.length} crédito/s activo/s. Ojo: los intereses no cantan, pero desafinan.</p>`:'<p class="muted">No tienes deuda activa. Tu contable puede mirar un bonsái durante 6 segundos.</p>'}${G.money<forecast().preCost?`<div class="notice bad"><b>Atención:</b> ahora mismo no tienes suficiente tesorería para preparar el concierto (${money(forecast().preCost)}).</div>`:''}</div></div><div class="grid three section">${Object.values(LOAN_LENDERS).map(l=>`<div class="card loanCard ${l.className}"><h3>${l.emoji} ${l.short}</h3><p><b>${esc(l.name)}</b></p><p class="muted">${esc(l.risk)}</p><span class="loanBadge">Base ${Math.round(l.baseRate*100)}% + cantidad + plazo</span></div>`).join('')}</div>${loansListHTML()}`}
function loansListHTML(){if(!G.loans?.length)return'<div class="card section"><h3>Contratos activos</h3><p class="muted">Ninguno. Aprovecha esta paz financiera antes de diseñar otra photocard maldita.</p></div>';return`<div class="card section"><h3>Contratos activos</h3><div class="grid two">${G.loans.map(l=>{let pct=clamp((1-l.balance/l.total)*100);return`<div class="rangeBadge"><span>${l.emoji} <b>${esc(l.name)}</b><br><small>${money(l.balance)} pendientes · ${l.remaining} semana/s · cuota ${money(l.weekly)} · impagos ${l.missed||0}</small><div class="debtBar"><i style="width:${pct}%"></i></div></span><span class="pill ${l.kind==='gokudo'?'red':l.kind==='shotengai'?'yellow':'cyan'}">${esc(l.short)}</span></div>`}).join('')}</div></div>`}
function takeLoan(){let d=G.loanDraft||{lender:'bank',amount:80000,weeks:6},o=loanOffer(d.lender,d.amount,d.weeks);G.money+=o.amount;G.loans.push({id:Date.now()+Math.random(),kind:o.lender.id,emoji:o.lender.emoji,name:o.lender.name,short:o.lender.short,amount:o.amount,total:o.total,balance:o.total,weekly:o.weekly,remaining:o.weeks,rate:o.rate,missed:0});G.news.unshift(`${o.lender.name} concede ${money(o.amount)}. El contrato trae ${rnd(3,9)} sellos y una nota que dice “no preguntar al tanuki”.`);saveSlot(activeSlot,true);toast('Crédito recibido. El dinero entra ahora; la ansiedad, por fascículos.');current='dashboard';render();}
function processLoanPayments(){let notes=[],paid=0,penalty=0;if(!G.loans?.length)return{notes,paid,penalty};G.loans.forEach(l=>{if(l.paidOff)return;let due=Math.min(l.weekly,l.balance);if(G.money>=due){G.money-=due;l.balance-=due;l.remaining=Math.max(0,l.remaining-1);paid+=due;notes.push(`${l.emoji} Cuota pagada a ${l.short}: ${money(due)}. El sello del contrato parece satisfecho.`);if(l.balance<=0||l.remaining<=0){if(l.balance>0&&G.money>=l.balance){G.money-=l.balance;paid+=l.balance;l.balance=0}l.paidOff=l.balance<=0;if(l.paidOff)notes.push(`${l.emoji} Crédito liquidado con ${l.short}. Nadie ha pronunciado la palabra “penlight” durante 4 segundos.`);}}else{let fee=Math.ceil(due*.25/100)*100;G.money-=fee;l.balance+=Math.ceil(due*.18/100)*100;l.remaining++;l.missed=(l.missed||0)+1;penalty+=fee;notes.push(`${l.emoji} Impago con ${l.short}: recargo ${money(fee)} y una mirada administrativa muy larga.`);handleLoanDefault(l,notes);}});G.loans=G.loans.filter(l=>!l.paidOff);if(!G.lastEconomy)G.lastEconomy={};G.lastEconomy.loans=-(paid+penalty);G.lastEconomy.profit=(G.lastEconomy.profit||0)-(paid+penalty);return{notes,paid,penalty};}
function handleLoanDefault(l,notes){if(l.kind==='bank'){G.reputation=clamp(G.reputation-2);if(l.missed>=3){G.fans.promoters=Math.max(0,(G.fans.promoters||0)-6);notes.push('🏦 El banco envía un formulario con 17 apartados sobre “carisma fiscal”. Promotores locales se enfrían.');l.missed=1;}}else if(l.kind==='shotengai'){G.fans.loyal=Math.max(0,(G.fans.loyal||0)-8);G.cohesion=clamp(G.cohesion-2);if(l.missed>=2){let m=starterMerchProduct();m.name='Tenugui de disculpa a la shotengai';m.slogan='Absorbe sudor, deuda y vergüenza comercial';m.price=1500;m.active=true;G.merchProducts.push(m);notes.push('🏮 La shotengai exige vender un tenugui de disculpa. Los fans fieles dudan, pero el algodón es bueno.');l.missed=0;}}else if(l.kind==='gokudo'){G.reputation=clamp(G.reputation-3);if(l.missed>=2){transferIdolToRival(notes);l.missed=0;l.balance+=Math.ceil(l.weekly*.35/100)*100;}}}
function transferIdolToRival(notes){if(G.idols.length>1){let idol=[...G.idols].sort((a,b)=>(b.popularity+b.charisma)-(a.popularity+a.charisma))[0];G.idols=G.idols.filter(x=>x.id!==idol.id);let rival=pick(G.rivals);rival.fans+=120+Math.round(idol.popularity*20);rival.reputation=clamp(rival.reputation+3);rival.lastAction=`ficha a ${idol.name} tras una cláusula de mikan financieros`;G.cohesion=clamp(G.cohesion-10);G.reputation=clamp(G.reputation-5);notes.push(`🐉 Cláusula Gokudō activada: ${idol.name} acepta una oferta de ${rival.name} con una cesta de mikan y demasiadas reverencias. No era secuestro: era peor, era paperwork.`);}else{G.reputation=clamp(G.reputation-8);G.cohesion=clamp(G.cohesion-12);G.fans.loyal=Math.max(0,(G.fans.loyal||0)-25);notes.push('🐉 Gokudō Finance intenta activar la cláusula, pero solo queda una idol. En su lugar exigen un vídeo de disculpa de 11 minutos mirando al tatami.');}}
function resetWeek(){G.trainingDone=false;G.eventDone=false;G.showDone=false;G.concertLive=null;G.currentEvent=generateEvent();G.sponsorOffers=sponsorOffers();G.auditions=[candidate(1),candidate(2),candidate(3)];G.lastEconomy.events=0;G.activeSponsors=G.activeSponsors.filter(s=>!s.done);G.idols.forEach(x=>{x.fatigue=clamp(x.fatigue-3-G.staff.wellness);if(x.role==='leader')G.cohesion=clamp(G.cohesion+1.5);if(x.fatigue>95){x.fatigue=70;x.morale=clamp(x.morale-3);G.news.unshift(`${x.name} recibe descanso obligatorio para proteger su bienestar.`)}});saveSlot(activeSlot,true);current='dashboard';render();}
function advanceRivals(){let actions=['lanza un single sobre perder el último tren','firma colaboración con una tienda de taiyaki filosófico','hace directo especial desde un karaoke de planta B2','recibe cobertura local por culpa de un tanuki con sello','organiza evento de fans con omamori numerados','presenta una coreografía basada en reverencias de 42 grados'];G.rivals.forEach(x=>{let old=x.fans,act=pick(actions),gain=rnd(18,95)+Math.round(x.reputation*.7);if(act.includes('single'))gain+=rnd(20,80);x.fans+=gain;x.reputation=clamp(x.reputation+rnd(-1,3));x.result=`Show ${rnd(51,91)}/100`;x.trend=x.fans>old?'▲':'▼';x.lastAction=act;});G.news.unshift(`${pick(G.rivals).name} ${pick(actions)} y mueve el ranking de forma innecesariamente dramática.`);}
function seasonEnd(){let objs=seasonObjectives(G),completed=objs.filter(o=>o.id==='cash'?o.value:o.value>=o.target);completed.forEach(o=>{if(o.id==='fans')G.money+=80000;if(o.id==='songs')G.reputation=clamp(G.reputation+3);if(o.id==='rating')G.fans.loyal+=50;});showModal(`<h2>Final de la temporada ${G.season}</h2><p>Objetivos completados: <b>${completed.length}/${objs.length}</b></p><div class="grid two">${objs.map(o=>`<div class="card"><h3>${esc(o.name)}</h3><p>${esc(o.desc)}</p><span class="pill ${completed.includes(o)?'green':'red'}">${completed.includes(o)?'Completado':'Pendiente'}</span></div>`).join('')}</div><p class="section">La siguiente temporada mantiene desbloqueos, fans y canciones.</p><button class="btn primary" id="continueSeason">Comenzar temporada ${G.season+1}</button>`);document.querySelector('#continueSeason').onclick=()=>{G.season++;G.week=1;G.bestShow=null;G.seasonStart={fans:totalFans(),money:G.money,songs:G.songs.length};document.querySelector('#modal').classList.remove('show');resetWeek();};}
function reportHTML(r,compact){return`<div class="card report section"><h3>Temporada ${r.season||G.season} · Semana ${r.week} — ${esc(r.venue)}</h3><div class="reportGrid"><div class="reportStat"><small>Asistencia</small><br><b>${r.attendance} / ${r.capacity}</b></div><div class="reportStat"><small>Valoración</small><br><b>${r.rating}/100</b></div><div class="reportStat"><small>Beneficio</small><br><b class="${r.profit>=0?'positive':'negative'}">${money(r.profit)}</b></div><div class="reportStat"><small>Fans nuevos</small><br><b>+${r.newFans}</b></div></div>${r.merchSold?.length?`<h3 class="section">Merch vendido</h3><div class="merchSoldList">${r.merchSold.map(m=>`<div class="rangeBadge"><span>${esc(m.emoji)} <b>${esc(m.name)}</b><br><small>${m.units} uds · ${money(m.revenue)}</small></span></div>`).join('')}</div>`:''}${compact?'<button class="btn section" data-page="concert">Ver informe completo</button>':`<h3 class="section">Por qué salió así</h3>${r.factors.map(f=>`<div class="factor ${f.type}">${f.type==='positive'?'+':f.type==='negative'?'-':'•'} ${esc(f.text)}</div>`).join('')}<h3 class="section">Momentos clave</h3>${r.moments.map(m=>`<div class="factor">• ${esc(m)}</div>`).join('')}<p><b>Conclusión:</b> ${esc(r.conclusion)}</p><div class="notice good">El concierto ya cerró su semana automáticamente.</div>`}</div>`}
function optionAllowed(o){if(!o.requires)return true;if(o.requires.staff&&G.staff[o.requires.staff]<(o.requires.level||1))return false;if(o.requires.rep&&G.reputation<o.requires.rep)return false;return true;}
function reqText(o){if(!o.requires)return'';if(o.requires.staff&&!optionAllowed(o))return`Requiere ${STAFF[o.requires.staff].name} nivel ${o.requires.level||1}`;if(o.requires.rep&&!optionAllowed(o))return`Requiere reputación ${o.requires.rep}`;return'';}
function effectSummary(e={}){let parts=[];if(e.fans)parts.push('Fans: '+Object.entries(e.fans).map(([k,v])=>`${v>0?'+':''}${v} ${k}`).join(', '));if(e.rep)parts.push(`Reputación ${e.rep>0?'+':''}${e.rep}`);if(e.money)parts.push(`${e.money>0?'+':''}${money(e.money)}`);if(e.fatigue)parts.push(`Fatiga ${e.fatigue>0?'+':''}${e.fatigue}`);if(e.morale)parts.push(`Moral ${e.morale>0?'+':''}${e.morale}`);if(e.cohesion)parts.push(`Cohesión ${e.cohesion>0?'+':''}${e.cohesion}`);return parts.join(' · ')||'Sin coste directo';}
function chooseEvent(i){let ev=G.currentEvent,o=ev.options[i];if(!o||!optionAllowed(o))return;applyEffects(o.effects||{});if(o.effects?.tag)G.activeSponsors.forEach(s=>{if(s.type==='event')s.eventTag=o.effects.tag});ev.done=true;G.eventDone=true;G.news.unshift(o.result);saveSlot(activeSlot,true);toast('Evento resuelto.');render();}
function applyEffects(e){if(e.money){G.money+=e.money;G.lastEconomy.events=(G.lastEconomy.events||0)+e.money;}if(e.rep)G.reputation=clamp(G.reputation+e.rep);if(e.cohesion)G.cohesion=clamp(G.cohesion+e.cohesion);if(e.fans)Object.entries(e.fans).forEach(([k,v])=>G.fans[k]=Math.max(0,(G.fans[k]||0)+v));if(e.fatigue)G.idols.forEach(x=>x.fatigue=clamp(x.fatigue+e.fatigue));if(e.morale)G.idols.forEach(x=>x.morale=clamp(x.morale+e.morale));if(e.dance)G.idols.forEach(x=>x.dance=clamp(x.dance+e.dance));if(e.leaderPop){let l=G.idols.find(x=>x.role==='leader')||G.idols[0];l.popularity=clamp(l.popularity+e.leaderPop);}if(e.songQuality)G.songBoost+=e.songQuality;}
function acceptSponsor(i){let s=G.sponsorOffers[i];if(!s||s.accepted)return;s.accepted=true;G.money+=s.cash;G.lastEconomy.sponsors=(G.lastEconomy.sponsors||0)+s.cash;G.activeSponsors.push(s);G.news.unshift(`${s.name} entra como sponsor de ${G.groupName}.`);saveSlot(activeSlot,true);render();}
function upgradeMerch(){let cost=(G.merchLevel+1)*70000;if(G.money<cost)return;G.money-=cost;G.merchLevel++;G.news.unshift(`El merchandising sube a nivel ${G.merchLevel}.`);saveSlot(activeSlot,true);render();}
function exportSave(){let blob=new Blob([JSON.stringify(G,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`idol-manager-pro-${G.groupName.replace(/\W+/g,'-')}-T${G.season}S${G.week}.json`;a.click();URL.revokeObjectURL(a.href);}
document.querySelector('#importFile').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);G=data;normalize();G.setupComplete=true;saveSlot(activeSlot,true);current='dashboard';toast('Partida importada.');render();}catch(err){toast('No se pudo importar el JSON.')}};r.readAsText(f);};
function showModal(html){document.querySelector('#modalBox').classList.remove('wide');document.querySelector('#modalBox').innerHTML=html;document.querySelector('#modal').classList.add('show')}
function newGame(){G=initialState();saveSlot(activeSlot,true);document.querySelector('#modal').classList.remove('show');current='dashboard';render();}
document.querySelector('#saveBtn').onclick=()=>saveSlot(activeSlot);
document.querySelector('#slotBtn').onclick=()=>{current='saves';render();};
document.querySelector('#helpBtn').onclick=()=>showModal('<h2>Cómo se juega</h2><div class="helpGrid"><div class="card"><h3>1. Entrena</h3><p>Asigna planes individuales según rol, fatiga y potencial.</p></div><div class="card"><h3>2. Decide eventos</h3><p>Los eventos semanales cambian fans, moral y reputación.</p></div><div class="card"><h3>3. Prepara concierto</h3><p>Revisa previsión, setlist, sala, precio, promoción y merch. El concierto cierra la semana automáticamente.</p></div><div class="card"><h3>4. Crece</h3><p>Cumple objetivos, acepta sponsors, pide créditos si toca y supera rivales.</p></div></div><button class="btn primary" onclick="document.querySelector(\'#modal\').classList.remove(\'show\')">Entendido</button>');
document.querySelector('#newBtn').onclick=()=>showModal('<h2>¿Nueva partida?</h2><p>Se reemplazará la partida actual del slot activo. La nueva empieza con 20.000 ¥: lo justo para el primer concierto básico.</p><button class="btn danger" onclick="newGame()">Sí, empezar de nuevo</button> <button class="btn" onclick="document.querySelector(\'#modal\').classList.remove(\'show\')">Cancelar</button>');
render();
</script>
</body>
</html>
