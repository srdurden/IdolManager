function eventsPage(){let ev=G.currentEvent;return title('Eventos y noticias','Decisiones semanales con consecuencias')+`<div class="grid two"><div class="card"><h3>Evento semanal</h3>${ev&&!ev.done?`<p><b>${esc(ev.title)}</b></p><p class="muted">${esc(ev.desc)}</p><div class="optionGrid">${ev.options.map((o,i)=>{let disabled=!optionAllowed(o);let req=reqText(o);return`<button class="choice eventChoice" data-i="${i}" ${disabled?'disabled':''}><strong>${esc(o.label)}</strong><small>${esc(req||effectSummary(o.effects))}</small></button>`}).join('')}</div>`:`<p class="muted">Evento resuelto. La próxima semana llegará otra situación.</p>`}</div><div class="card"><h3>Noticias</h3><ul class="news">${G.news.slice(0,12).map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div></div>`}
function sponsorsPage(){let upgradeCost=(G.merchLevel+1)*70000;return title('Sponsors y merchandising','Contratos con condiciones y recompensas')+`<div class="grid two"><div class="card"><h3>Ofertas disponibles</h3><div class="optionGrid">${G.sponsorOffers.map((s,i)=>`<div class="card"><h3>${esc(s.name)}</h3><p><b>Entrada:</b> ${money(s.cash)} ${s.weekly?`· <b>Semanal:</b> ${money(s.weekly)}`:''}</p><p><b>Condición:</b> ${esc(s.condition)}</p><p class="muted">${esc(s.risk)}</p><button class="btn primary acceptSponsor" data-i="${i}" ${s.accepted?'disabled':''}>Aceptar sponsor</button></div>`).join('')}</div></div><div class="card"><h3>Contratos activos</h3>${G.activeSponsors.length?G.activeSponsors.map(s=>`<div class="rangeBadge"><span><b>${esc(s.name)}</b><br><small>${esc(s.condition)}</small></span><span class="pill ${s.done?'green':'pink'}">${s.done?'Revisado':'Activo'}</span></div>`).join(''):'<p class="muted">No hay sponsors activos.</p>'}<h3 class="section">Merchandising</h3><p>Nivel actual: <b>${G.merchLevel}</b>. Aumenta ingresos de merch en conciertos y eventos de fans.</p><button class="btn" id="upgradeMerch" ${G.money<upgradeCost?'disabled':''}>Mejorar merch · ${money(upgradeCost)}</button></div></div>`}
function fansPage(){let labels={casual:'Fans casuales',loyal:'Fans fieles',online:'Fans de redes',press:'Prensa local',promoters:'Promotores'};let icons={casual:'👋',loyal:'💖',online:'📱',press:'📰',promoters:'🎟️'};let max=Math.max(1,...Object.values(G.fans));return title('Fans','Segmentos de público y cómo crece cada uno')+`<div class="grid two"><div class="card"><h3>Base total</h3><div class="metric pink">${totalFans().toLocaleString('es-ES')}</div><p class="muted">Cada acción atrae públicos distintos. Los fans fieles ayudan a asistencia estable; online mejora viralidad; prensa y promotores abren oportunidades.</p><div class="fansBars">${Object.entries(G.fans).map(([k,v])=>`<div class="fanRow"><span>${icons[k]} ${labels[k]}</span><div class="progress"><i style="width:${v/max*100}%"></i></div><b>${Math.round(v)}</b></div>`).join('')}</div></div><div class="card"><h3>Consejos</h3><ul class="news"><li>Redes sociales: sube fans online y casuales.</li><li>Eventos de firmas: sube fans fieles.</li><li>Buena reputación: atrae prensa y promotores.</li><li>Conciertos de alta valoración convierten casuales en fieles.</li></ul></div></div>`}
function ranking(){return[...G.rivals,{name:G.groupName,fans:totalFans(),reputation:G.reputation,player:true,result:G.lastReport?G.lastReport.rating+'/100':'Sin show',trend:G.lastReport?(G.lastReport.rep>=0?'▲':'▼'):'—',lastAction:'Tu agencia'}].sort((a,b)=>(b.fans+b.reputation*12)-(a.fans+a.reputation*12));}
function rankPos(){return ranking().findIndex(x=>x.player)+1}
function rankingPage(){return title('Ranking indie','Rivales con acciones semanales')+`<div class="card"><div class="tableWrap"><table><thead><tr><th>Pos.</th><th>Grupo</th><th>Fans</th><th>Reputación</th><th>Último resultado</th><th>Acción rival</th><th>Tendencia</th></tr></thead><tbody>${ranking().map((x,i)=>`<tr><td><b>#${i+1}</b></td><td>${esc(x.name)} ${x.player?'<span class="pill pink">TU GRUPO</span>':''}</td><td>${Math.round(x.fans).toLocaleString('es-ES')}</td><td>${Math.round(x.reputation)}</td><td>${esc(x.result)}</td><td>${esc(x.lastAction||'—')}</td><td class="${x.trend==='▲'?'positive':x.trend==='▼'?'negative':''}">${x.trend}</td></tr>`).join('')}</tbody></table></div></div>`}

function activeLoans(){return(G.loans||[]).filter(l=>!l.done)}
function debtTotal(){return activeLoans().reduce((a,l)=>a+(+l.remaining||0),0)}
function weeklyDebtPayment(){return activeLoans().reduce((a,l)=>a+Math.min(+l.weekly||0,+l.remaining||0),0)}
function loanOfferList(){return LOAN_LENDERS.flatMap((l,li)=>LOAN_AMOUNTS.map((amount,ai)=>{let weeks=l.weeks+ai*2,rate=l.baseRate+l.amountFactor*(amount/100000),total=Math.round(amount*(1+rate)),weekly=Math.ceil(total/weeks);return{...l,amount,weeks,rate,total,weekly,key:`${l.id}-${amount}`}}));}
function loanStatusHTML(){let loans=activeLoans();if(!loans.length)return'<p class="muted">No tienes créditos activos. Nadie te llama desde un callejón con excesiva educación.</p>';return loans.map(l=>`<div class="card loanCard ${l.style}"><h3>${l.icon} ${esc(l.name)}</h3><p><b>Pendiente:</b> ${money(l.remaining)} · <b>Pago semanal:</b> ${money(Math.min(l.weekly,l.remaining))} · <b>Semanas:</b> ${l.weeksLeft}</p><p class="muted">Impagos: ${l.missed}/${l.maxMiss}. ${esc(l.desc)}</p><div class="progress fatigue"><i style="width:${clamp((l.total-l.remaining)/l.total*100)}%"></i></div></div>`).join('')}
function loanOfferHTML(o){let danger=o.style==='gokudo'?'bad':o.style==='weird'?'warn':'good';return`<div class="card loanOffer ${o.style}"><h3>${o.icon} ${esc(o.name)}</h3><p class="muted">${esc(o.desc)}</p><div class="kpiLine"><div class="rangeBadge"><span>Recibes</span><b>${money(o.amount)}</b></div><div class="rangeBadge"><span>Devuelves</span><b>${money(o.total)}</b></div><div class="rangeBadge"><span>Semanas</span><b>${o.weeks}</b></div><div class="rangeBadge"><span>Interés</span><b>${Math.round(o.rate*1000)/10}%</b></div></div><div class="notice ${danger}"><b>Si fallas:</b> ${o.style==='gokudo'?'cláusula de cesión contractual: una idol puede irse a un grupo rival, muy educadamente y con reverencia.':o.style==='weird'?'recargo, vergüenza pública en la shotengai y posible embargo absurdo de merch.':'recargo pequeño y una carta decepcionada con olor a sakura.'}</div><button class="btn primary takeLoan" data-lender="${o.id}" data-amount="${o.amount}">Pedir ${money(o.amount)} · ${money(o.weekly)}/semana</button></div>`}
function loansPage(){let maxed=activeLoans().length>=3;return title('Créditos','Financiación dudosa, intereses variables y cláusulas con demasiado furigana')+`<div class="grid four"><div class="card"><small class="muted">Deuda viva</small><div class="metric pink">${money(debtTotal())}</div></div><div class="card"><small class="muted">Pago semanal</small><div class="metric yellow">${money(weeklyDebtPayment())}</div></div><div class="card"><small class="muted">Tesorería</small><div class="metric cyan">${money(G.money)}</div></div><div class="card"><small class="muted">Vergüenza crediticia</small><div class="metric ${G.creditShame>2?'pink':'green'}">${G.creditShame}</div></div></div><div class="notice warn"><b>Cómo funciona:</b> al cerrar cada semana se cobra automáticamente una cuota. El interés sube con la cantidad pedida. Si no puedes pagar, hay recargos e impagos. Con prestamistas sospechosos, los grupos rivales pueden activar cláusulas de cesión y llevarse una integrante por contrato.</div><div class="grid two section"><div><h3>Créditos activos</h3>${loanStatusHTML()}</div><div><h3>Ofertas disponibles</h3>${maxed?'<div class="notice bad">Ya tienes 3 créditos activos. Hasta los señores del callejón tienen límites administrativos.</div>':`<div class="optionGrid">${loanOfferList().map(loanOfferHTML).join('')}</div>`}</div></div>`}
function takeLoan(lenderId,amount){let offer=loanOfferList().find(o=>o.id===lenderId&&o.amount===amount);if(!offer||activeLoans().length>=3)return;G.money+=offer.amount;G.loans.push({id:Date.now()+Math.random(),lenderId:offer.id,name:offer.name,icon:offer.icon,style:offer.style,desc:offer.desc,amount:offer.amount,total:offer.total,remaining:offer.total,weekly:offer.weekly,weeks:offer.weeks,weeksLeft:offer.weeks,rate:offer.rate,missed:0,maxMiss:offer.maxMiss,done:false});G.news.unshift(`${offer.name} concede ${money(offer.amount)}. El contrato trae ${offer.style==='gokudo'?'demasiados sellos hanko y una sonrisa peligrosa':'una cantidad normal de letra pequeña'}.`);saveSlot(activeSlot,true);toast('Crédito concedido. La responsabilidad financiera mira desde lejos.');render();}
function processLoans(){let loans=activeLoans(),paid=0;if(!loans.length)return;G.lastEconomy.loans=0;loans.forEach(l=>{if(l.done)return;let due=Math.min(l.weekly,l.remaining);if(G.money>=due){G.money-=due;l.remaining-=due;l.weeksLeft=Math.max(0,l.weeksLeft-1);paid+=due;G.lastEconomy.loans=(G.lastEconomy.loans||0)-due;G.news.unshift(`Cuota pagada a ${l.name}: ${money(due)}. Quedan ${money(Math.max(0,l.remaining))}.`);if(l.remaining<=0){l.done=true;G.news.unshift(`Crédito liquidado con ${l.name}. Nadie aparece detrás de la máquina de bebidas.`)}}else{let available=Math.max(0,G.money);if(available>0){G.money=0;l.remaining-=available;paid+=available;G.lastEconomy.loans=(G.lastEconomy.loans||0)-available;}l.missed++;G.creditShame++;let fee=Math.ceil(l.remaining*(l.style==='gokudo'?.12:l.style==='weird'?.08:.04));l.remaining+=fee;l.weeksLeft++;G.news.unshift(`Impago con ${l.name}: se añade recargo de ${money(fee)} y una reverencia muy tensa.`);if(l.missed>=l.maxMiss)loanDefault(l);}});G.loans=G.loans.filter(l=>!l.done);}
function loanDefault(l){l.done=true;G.reputation=clamp(G.reputation-(l.style==='gokudo'?8:4));if(l.style==='gokudo'&&G.idols.length>1){let idx=G.idols.map((x,i)=>({i,score:x.popularity+x.charisma*.2})).sort((a,b)=>b.score-a.score)[0].i;let idol=G.idols.splice(idx,1)[0];let rival=pick(G.rivals);rival.fans+=250+Math.round(idol.popularity*18);rival.reputation=clamp(rival.reputation+3);G.news.unshift(`Cláusula Gokudō activada: ${idol.name} se marcha a ${rival.name} con una reverencia impecable y un contrato que nadie leyó.`);}else if(l.style==='weird'){let loss=Math.min(80,totalFans());G.fans.casual=Math.max(0,G.fans.casual-loss);G.merchLevel=Math.max(0,G.merchLevel-1);G.news.unshift(`${l.name} embarga parte del merch. Desaparecen cajas de uchiwa y una grapadora con carácter.`);}else{G.news.unshift(`${l.name} cierra el crédito con penalización reputacional. La carta de aviso venía perfumada con decepción.`);}l.remaining=0;}
function debtDashboardHTML(){let debt=debtTotal(),due=weeklyDebtPayment(),fc=forecast();if(!debt&&G.money>=fc.preCost)return'';return`<div class="grid two section"><div class="card loanDash"><h3>🏦 Financiación</h3><p>${debt?`Deuda viva: <b>${money(debt)}</b><br>Próxima cuota semanal: <b>${money(due)}</b>`:`Tesorería justa para el concierto: <b>${money(G.money)}</b> / coste previo ${money(fc.preCost)}.`}</p><button class="btn ${G.money<fc.preCost?'primary':''}" data-page="loans">Ver créditos →</button></div><div class="card"><h3>💸 Inicio difícil</h3><p class="muted">La agencia empieza con lo mínimo para un primer concierto. Crecer implica sponsors, merch, riesgo y quizá un contrato con demasiados sellos.</p></div></div>`}
function economyPage(){let e=G.lastEconomy;return title('Economía','Ingresos, costes y sostenibilidad')+`<div class="grid four"><div class="card"><small class="muted">Dinero actual</small><div class="metric ${G.money<0?'pink':'cyan'}">${money(G.money)}</div></div><div class="card"><small class="muted">Ingresos último show</small><div class="metric green">${money(e.tickets+e.merch)}</div></div><div class="card"><small class="muted">Gastos últimos</small><div class="metric yellow">${money(e.salaries+e.staff+e.promo+e.venue+Math.max(0,-e.events)+Math.max(0,-(e.loans||0)))}</div></div><div class="card"><small class="muted">Balance semanal</small><div class="metric ${e.profit>=0?'green':'pink'}">${money(e.profit)}</div></div></div><div class="card section"><div class="tableWrap"><table><tbody><tr><th>Entradas</th><td class="positive">+${money(e.tickets)}</td></tr><tr><th>Merchandising</th><td class="positive">+${money(e.merch)}</td></tr><tr><th>Sponsors</th><td class="${e.sponsors>=0?'positive':'negative'}">${e.sponsors>=0?'+':''}${money(e.sponsors)}</td></tr><tr><th>Eventos / decisiones</th><td class="${e.events>=0?'positive':'negative'}">${e.events>=0?'+':''}${money(e.events)}</td></tr><tr><th>Créditos</th><td class="${(e.loans||0)>=0?'positive':'negative'}">${(e.loans||0)>=0?'+':''}${money(e.loans||0)}</td></tr><tr><th>Salarios</th><td class="negative">-${money(e.salaries)}</td></tr><tr><th>Staff</th><td class="negative">-${money(e.staff)}</td></tr><tr><th>Promoción</th><td class="negative">-${money(e.promo)}</td></tr><tr><th>Sala</th><td class="negative">-${money(e.venue)}</td></tr><tr><th>Beneficio semanal</th><td><b>${money(e.profit)}</b></td></tr></tbody></table></div></div>`}
function savesPage(){return title('Partidas','Slots, exportación e importación')+savesHTML()}
function savesHTML(){let slots=[1,2,3];return`<div class="slotGrid">${slots.map(slot=>{let s=loadSlot(slot),label=s?`${esc(s.groupName)} · T${s.season} S${s.week}`:'Vacío';return`<div class="card"><h3>Slot ${slot} ${slot===activeSlot?'<span class="pill pink">Activo</span>':''}</h3><p>${label}</p><p class="muted">${s?`${money(s.money)} · ${sumObj(s.fans||{}).toLocaleString('es-ES')} fans`:'Sin partida guardada'}</p><button class="btn primary saveToSlot" data-slot="${slot}">Guardar aquí</button> <button class="btn loadSlot" data-slot="${slot}" ${!s?'disabled':''}>Cargar</button></div>`}).join('')}</div><div class="grid two section"><div class="card"><h3>Exportar</h3><p class="muted">Descarga la partida como JSON para conservarla o moverla a otro navegador.</p><button class="btn" id="exportSave">Exportar JSON</button></div><div class="card"><h3>Importar</h3><p class="muted">Importa un JSON y se cargará como partida actual.</p><button class="btn" id="importSave">Importar JSON</button></div></div>`}
function showCreation(){let modal=document.querySelector('#modal'),box=document.querySelector('#modalBox');box.classList.add('wide');box.innerHTML=`<span class="pill pink">Nueva historia</span><h2>Abre tu primera live house</h2><p class="muted">Crea un grupo y una primera integrante adulta. Empiezas con 20.000 ¥: lo justo para reservar el local de barrio y unos flyers. Después tocará sobrevivir con conciertos, sponsors, merch y créditos dudosos.</p><div class="formRow"><div class="field"><label>Nombre del grupo</label><input id="groupName" maxlength="28" value="Paradise"></div><div class="field"><label>Nombre de la primera idol</label><input id="idolName" maxlength="28" value="Aoi Kitamura"></div></div><div class="formRow section"><div class="field"><label>Rol inicial</label><select id="idolRole">${ROLES.map(r=>`<option value="${r.id}">${r.name} · ${r.effect}</option>`).join('')}</select></div><div class="field"><label>Edad</label><input id="idolAge" type="number" min="20" max="32" value="21"></div></div><h3 class="section">Puntos fuertes</h3><p class="muted">Cada atributo puede estar entre 38 y 58. Debes usar exactamente 144 puntos.</p>${[['voice','Voz'],['dance','Baile'],['charisma','Carisma']].map(([k,n])=>`<div class="rangeBadge"><b>${n}</b><input type="range" id="${k}" min="38" max="58" value="48" style="width:60%"><span id="${k}Val">48</span></div>`).join('')}<div class="notice" id="pointsInfo">Puntos usados: <b>144 / 144</b></div><button class="btn primary" id="startStory">Abrir las puertas</button>`;modal.classList.add('show');let update=()=>{let total=['voice','dance','charisma'].reduce((a,k)=>a+(+document.querySelector('#'+k).value),0);['voice','dance','charisma'].forEach(k=>document.querySelector('#'+k+'Val').textContent=document.querySelector('#'+k).value);document.querySelector('#pointsInfo').innerHTML=`Puntos usados: <b>${total} / 144</b>`;document.querySelector('#startStory').disabled=total!==144};['voice','dance','charisma'].forEach(k=>document.querySelector('#'+k).oninput=update);document.querySelector('#startStory').onclick=startStory;update();}
function startStory(){let group=document.querySelector('#groupName').value.trim(),name=document.querySelector('#idolName').value.trim();if(!group||!name){toast('Pon nombre al grupo y a la primera idol.');return;}G=initialState();G.groupName=group;G.agency=group;let stats=Object.fromEntries(['voice','dance','charisma'].map(k=>[k,+document.querySelector('#'+k).value]));G.idols=[{id:Date.now(),name,age:+document.querySelector('#idolAge').value||21,role:document.querySelector('#idolRole').value,...stats,stamina:52,popularity:5,potential:78,fatigue:6,morale:76,salary:28000,trait:'Una promesa aún por descubrir',training:'team'}];G.setupComplete=true;G.news=[`${name} y tú abrís las puertas de ${group}.`,'Solo hay una canción, 20.000 ¥ y una máquina de bebidas que parece juzgar el plan financiero.'];G.seasonStart={fans:totalFans(G),money:G.money,songs:G.songs.length};document.querySelector('#modal').classList.remove('show');document.querySelector('#modalBox').classList.remove('wide');saveSlot(activeSlot,true);current='dashboard';render();}
function bind(){document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{current=b.dataset.page;render()});let q=s=>document.querySelector(s);document.querySelectorAll('.trainSel').forEach(s=>s.onchange=e=>{G.idols[+e.target.dataset.i].training=e.target.value;saveSlot(activeSlot,true);render()});if(q('#doTraining'))q('#doTraining').onclick=doTraining;document.querySelectorAll('.hire').forEach(b=>b.onclick=()=>hire(+b.dataset.i));document.querySelectorAll('.staffUp').forEach(b=>b.onclick=()=>upgradeStaff(b.dataset.staff));document.querySelectorAll('.buySong').forEach(b=>b.onclick=()=>buySong(+b.dataset.song));document.querySelectorAll('.setlistSel').forEach(s=>s.onchange=e=>{G.setlist[+e.target.dataset.pos]=+e.target.value;saveSlot(activeSlot,true);render()});[['#venueSel','venue'],['#promoSel','promo'],['#strategySel','strategy']].forEach(([id,k])=>{if(q(id))q(id).onchange=e=>{G[k]=+e.target.value;saveSlot(activeSlot,true);render()}});if(q('#ticket'))q('#ticket').onchange=e=>{G.ticket=clamp(+e.target.value,500,12000);saveSlot(activeSlot,true);render()};if(q('#playShow'))q('#playShow').onclick=playShow;if(q('#nextWeekTop'))q('#nextWeekTop').onclick=nextWeek;document.querySelectorAll('.eventChoice').forEach(b=>b.onclick=()=>chooseEvent(+b.dataset.i));document.querySelectorAll('.acceptSponsor').forEach(b=>b.onclick=()=>acceptSponsor(+b.dataset.i));document.querySelectorAll('.takeLoan').forEach(b=>b.onclick=()=>takeLoan(b.dataset.lender,+b.dataset.amount));if(q('#upgradeMerch'))q('#upgradeMerch').onclick=upgradeMerch;document.querySelectorAll('.saveToSlot').forEach(b=>b.onclick=()=>saveSlot(+b.dataset.slot));document.querySelectorAll('.loadSlot').forEach(b=>b.onclick=()=>{let s=loadSlot(+b.dataset.slot);if(s){G=s;activeSlot=+b.dataset.slot;localStorage.setItem('idolManagerPro_activeSlot',activeSlot);normalize();current='dashboard';toast('Slot '+activeSlot+' cargado.');render();}});if(q('#exportSave'))q('#exportSave').onclick=exportSave;if(q('#importSave'))q('#importSave').onclick=()=>document.querySelector('#importFile').click();}
function doTraining(){let cost=0;G.idols.forEach(x=>{let t=TRAINING[x.training],well=G.staff.wellness,dance=G.staff.dance,vocal=G.staff.vocal;let gain=(1+x.potential/100)*(1+rnd(0,12)/10);if(t.stat==='voice')x.voice=clamp(x.voice+gain+vocal*.8,0,99);if(t.stat==='dance')x.dance=clamp(x.dance+gain+dance*.8,0,99);if(t.stat==='charisma')x.charisma=clamp(x.charisma+gain+G.staff.wardrobe*.4,0,99);if(t.stat==='popularity')x.popularity=clamp(x.popularity+gain*.85+G.staff.social*.4,0,99);if(t.stat==='team'){x.morale=clamp(x.morale+5+well);G.cohesion=clamp(G.cohesion+1.4+leaderBonus()*.1);}if(t.stat==='rest'){x.fatigue=clamp(x.fatigue-20-well*3);x.morale=clamp(x.morale+7+well);}else{x.fatigue=clamp(x.fatigue+t.fatigue-well-(x.training==='dance'?dance:0));}cost+=x.training==='personal'?3000:0;});G.money-=cost;G.trainingDone=true;G.news.unshift('El plan de entrenamiento individual se completó.');saveSlot(activeSlot,true);toast('Entrenamientos realizados.');render();}
function leaderBonus(){return G.idols.filter(x=>x.role==='leader').reduce((a,x)=>a+x.charisma/20,0)}
function hire(i){let x=G.auditions[i];if(!x||G.money<x.cost||G.idols.length>=7)return;G.money-=x.cost;let {cost,...idol}=x;G.idols.push(idol);G.auditions.splice(i,1);G.cohesion=clamp(G.cohesion-4);G.news.unshift(`${x.name} firma un contrato justo con ${G.groupName}.`);saveSlot(activeSlot,true);render();}
function upgradeStaff(k){let lv=G.staff[k],cost=(lv+1)*55000;if(lv>=3||G.money<cost)return;G.money-=cost;G.staff[k]++;G.news.unshift(`${STAFF[k].name} alcanza el nivel ${G.staff[k]}.`);saveSlot(activeSlot,true);render();}
function buySong(i){let s=SONGS[i];if(G.songs.includes(i)||G.money<s.cost)return;G.money-=s.cost;G.songs.push(i);G.setlist[1]=i;G.news.unshift(`La agencia produce “${s.title}”.`);saveSlot(activeSlot,true);render();}
function roleSummary(){let out={rating:0,vocalReduce:0,danceReduce:0,merch:0,viral:0,moraleShield:0,cohesion:0};G.idols.forEach(x=>{if(x.role==='center')out.rating+=2+x.charisma/35;if(x.role==='vocal')out.vocalReduce+=5+x.voice/20;if(x.role==='dancer')out.danceReduce+=5+x.dance/20;if(x.role==='leader')out.cohesion+=2+x.charisma/30;if(x.role==='variety')out.viral+=2+x.charisma/35;if(x.role==='visual')out.merch+=.08+x.charisma/600;if(x.role==='favorite')out.moraleShield+=4+x.popularity/20;});return out;}
function setlistStats(){let list=G.setlist.map(i=>SONGS[i]||SONGS[0]);let keys=['energy','vocal','dance','hook','emotion','viral','quality'];let s={titles:list.map(x=>x.title)};keys.forEach(k=>s[k]=list.reduce((a,x)=>a+x[k],0)/list.length);s.quality+=G.staff.producer*2+G.songBoost;return s;}
function forecast(){let v=VENUES[G.venue],p=PROMOS[G.promo],s=setlistStats(),roles=roleSummary();let mv=avg(G.idols,'voice'),md=avg(G.idols,'dance'),mc=avg(G.idols,'charisma'),mm=avg(G.idols,'morale'),mf=avg(G.idols,'fatigue'),mp=avg(G.idols,'popularity'),fans=G.fans;let diff=Math.max(0,s.vocal-mv-roles.vocalReduce)*.14+Math.max(0,s.dance-md-roles.danceReduce)*.14;let strat=STRATEGIES[G.strategy].id;let stratBonus=strat==='energy'?s.energy*.08:strat==='emotion'?s.emotion*.08:strat==='loyal'?mp*.12:strat==='risky'?8:5;let group=mv*.23+md*.23+mc*.23+G.cohesion*.15+mm*.12-mf*.22;let rating=clamp(group*.72+(s.quality+s.hook+s.viral)/3*.25+stratBonus+roles.rating+G.staff.vocal+G.staff.dance*1.2+G.staff.wardrobe*.7-diff,0,100);let pricePenalty=Math.max(0,(G.ticket-2200)/65);let demand=12+fans.casual*.08+fans.loyal*.22+fans.online*.06+fans.press*2.2+fans.promoters*5+G.reputation*2.1+p.power*(1+G.staff.social*.14)+mp*.7-pricePenalty+(strat==='loyal'?fans.loyal*.08:0)+(strat==='energy'?s.viral*.07:0);let att=clamp(demand,5,v.cap);let merchPer=220+mp*4+mc*2+G.staff.wardrobe*90+G.merchLevel*120;let merch=att*merchPer*(.72+totalFans()/(totalFans()+1000))*(1+roles.merch);let salaries=G.idols.reduce((a,x)=>a+x.salary,0),staffCost=Object.values(G.staff).reduce((a,x)=>a+x,0)*4000,preCost=v.cost+p.cost,costs=preCost+salaries+staffCost;let tickets=att*G.ticket;let profit=tickets+merch-costs;let factors=[];if(mf>70)factors.push({type:'negative',text:'Fatiga alta: aumenta riesgo de incidentes y baja valoración.'});else factors.push({type:'positive',text:'Fatiga controlada para afrontar el show.'});if(mm>70)factors.push({type:'positive',text:'Moral alta: el público percibirá mejor la actuación.'});if(diff>8)factors.push({type:'negative',text:'El setlist exige más voz/baile del nivel actual.'});if(p.power>30)factors.push({type:'positive',text:'La promoción debería elevar asistencia.'});if(G.ticket>3000)factors.push({type:'negative',text:'Precio alto: puede limitar asistencia.'});if(roles.rating>4)factors.push({type:'positive',text:'Los roles del grupo aportan bonus reales al directo.'});if(G.activeSponsors.length)factors.push({type:'neutral',text:'Los sponsors activos se evaluarán tras el concierto.'});let riskScore=(mf>80?3:mf>65?2:0)+(diff>12?2:diff>7?1:0)+(G.money<costs?2:0)+(STRATEGIES[G.strategy].id==='risky'?2:0)+(G.ticket>3500?1:0);let riskLevel=riskScore>=4?'Alto':riskScore>=2?'Medio':'Bajo';let issue=mf>70?'Fatiga':diff>8?'Dificultad':G.ticket>3000?'Precio':'Ninguno grave';let diagnosis=riskLevel==='Alto'?'Conviene ajustar descanso, setlist o sala antes de celebrar el concierto.':riskLevel==='Medio'?'El show es viable, pero hay algún punto a vigilar.':'La preparación parece sólida para esta semana.';return{rating,attendance:att,attMin:Math.max(1,Math.round(att*.82)),attMax:Math.min(v.cap,Math.round(att*1.18)),capacity:v.cap,profitMid:profit,profitMin:profit*0.82-15000,profitMax:profit*1.18+15000,riskLevel,issue,diagnosis,factors,preCost,costs,tickets,merch,salaries,staffCost,venue:v,promo:p,setlist:s};}
function playShow(){let fc=forecast(),v=VENUES[G.venue],p=PROMOS[G.promo],s=fc.setlist,roles=roleSummary();if(G.money<fc.preCost)return;let variability=rnd(-7,7);let incident=0,moments=[],factors=[...fc.factors];let high=G.idols.filter(x=>x.fatigue>80);if(high.length&&Math.random()<.25+high.length*.1-G.staff.wellness*.06){incident-=rnd(5,12);moments.push(`${high[0].name} terminó con fatiga alta; se recomienda descanso.`);factors.push({type:'negative',text:'Incidente por fatiga durante el show.'});}
if(Math.random()<.12-G.staff.vocal*.02){incident-=4;moments.push('Una inestabilidad vocal obligó a adaptar un verso.');}
if(Math.random()<.10-G.staff.dance*.02){incident-=4;moments.push('La coreografía tuvo algunos errores leves.');}
if(Math.random()<.13+G.staff.social*.04+s.viral/900+roles.viral/50){incident+=rnd(4,9);moments.push('Un fragmento del show empezó a circular en redes.');factors.push({type:'positive',text:'Momento viral generado durante el concierto.'});}
if(v.outdoor&&Math.random()<.12){incident-=12;moments.push('La lluvia redujo parte de la asistencia al evento exterior.');}
let rating=Math.round(clamp(fc.rating+variability+incident));let attendance=Math.round(clamp(fc.attendance+rnd(-10,15),5,v.cap));let tickets=attendance*G.ticket;let merch=Math.round(attendance*(220+avg(G.idols,'popularity')*4+avg(G.idols,'charisma')*2+G.staff.wardrobe*90+G.merchLevel*120)*(0.72+totalFans()/(totalFans()+1000))*(1+roles.merch));let salaries=G.idols.reduce((a,x)=>a+x.salary,0),staffCost=Object.values(G.staff).reduce((a,x)=>a+x,0)*4000,costs=v.cost+p.cost+salaries+staffCost;let sponsorMoney=evaluateSponsors({rating,attendance,capacity:v.cap});let profit=tickets+merch+sponsorMoney-costs;G.money+=profit;let fill=attendance/v.cap;let strat=STRATEGIES[G.strategy].id;let newBase=Math.max(1,Math.round(rating*.22+fill*22+s.viral*.09+G.staff.social*5+Math.max(0,incident)-8));let gain={casual:Math.round(newBase*.45),loyal:Math.round(newBase*.25),online:Math.round(newBase*.2),press:Math.max(0,Math.round((rating-55)/6)),promoters:Math.max(0,Math.round((rating-65)/8))};if(strat==='emotion'||strat==='loyal')gain.loyal+=Math.round(newBase*.25);if(strat==='energy')gain.online+=Math.round(newBase*.25);Object.entries(p.segments).forEach(([k,val])=>gain[k]=(gain[k]||0)+Math.round(val/3));Object.keys(gain).forEach(k=>G.fans[k]=Math.max(0,(G.fans[k]||0)+gain[k]));let rep=Math.round((rating-58)/10+(fill>.8?1:0)+(G.fans.press>20?.5:0));G.reputation=clamp(G.reputation+rep,0,100);let fatigueGain=9+(strat==='energy'?5:strat==='safe'?-2:strat==='risky'?4:2);G.idols.forEach(x=>{x.fatigue=clamp(x.fatigue+fatigueGain*(1.25-x.stamina/200)-G.staff.wellness);let moraleDelta=rating>=70?4:rating<50?-6+roles.moraleShield/3:1;x.morale=clamp(x.morale+moraleDelta);x.popularity=clamp(x.popularity+(sumObj(gain)/G.idols.length)/12,0,99)});G.cohesion=clamp(G.cohesion+(rating>=70?3:rating<50?-4:1)-high.length+roles.cohesion*.3);let star=[...G.idols].sort((a,b)=>(b.charisma+b.popularity)-(a.charisma+a.popularity))[0];moments.unshift(`${star.name} brilló en su rol de ${ROLE_NAMES[star.role]}.`);moments.push(`El setlist (${s.titles.join(' · ')}) recibió una valoración ${rating>=75?'muy positiva':rating>=55?'correcta':'fría'}.`);let conclusion=rating>=85?'Noche memorable. La escena empieza a considerar al grupo una referencia.':rating>=70?'Buen concierto. El grupo gana fuerza en la escena indie.':rating>=52?'Actuación correcta, aunque todavía hay margen para crecer.':'Una noche difícil. Conviene recuperar energías y revisar el plan.';let r={week:G.week,season:G.season,venue:v.name,capacity:v.cap,attendance,rating,tickets,merch,costs,profit,newFans:sumObj(gain),gain,rep,moments,conclusion,factors,sponsorMoney,setlist:s.titles};G.lastReport=r;G.lastEconomy={tickets,merch,salaries,staff:staffCost,promo:p.cost,venue:v.cost,events:G.lastEconomy.events||0,sponsors:sponsorMoney,profit};G.history.push(r);if(!G.bestShow||rating>G.bestShow.rating)G.bestShow=r;G.showDone=true;G.news=generateNews(r).concat(G.news).slice(0,30);saveSlot(activeSlot,true);render();}
function evaluateSponsors(ctx){let total=0;G.activeSponsors.forEach(s=>{if(s.done)return;let ok=false;if(s.type==='rating')ok=ctx.rating>=s.target;if(s.type==='morale')ok=avg(G.idols,'morale')>=s.target;if(s.type==='fill')ok=ctx.attendance/ctx.capacity>=s.target;if(s.type==='event')ok=s.eventTag===s.target;if(ok){if(s.reward?.money){total+=s.reward.money;G.news.unshift(`${s.name} cumple objetivos y paga ${money(s.reward.money)}.`)}if(s.reward?.rep)G.reputation=clamp(G.reputation+s.reward.rep);if(s.reward?.fans)Object.entries(s.reward.fans).forEach(([k,v])=>G.fans[k]=(G.fans[k]||0)+v)}else{G.reputation=clamp(G.reputation-2);G.news.unshift(`${s.name} no queda satisfecho con la condición pactada.`)}s.done=true;});return total;}
function generateNews(r){let pool=[];pool.push(r.rating>75?'Una crítica local elogia la evolución del directo.':'La prensa local pide una identidad escénica más definida.');pool.push(r.newFans>30?'El club de fans organiza una quedada tras el concierto.':'Fans veteranos comparten recomendaciones para el próximo show.');if(G.staff.wardrobe)pool.push('Fans comentan positivamente el nuevo vestuario.');if(avg(G.idols,'fatigue')>70)pool.push('El cansancio empieza a notarse en los ensayos; bienestar recomienda prudencia.');if(G.staff.social>=2)pool.push('Una entrevista coordinada por redes consigue una gran respuesta.');if(G.reputation>40)pool.push('Una marca local estudia una colaboración con el grupo.');pool.push('Una agencia rival anuncia un single para esta misma semana.');return pool.sort(()=>Math.random()-.5).slice(0,rnd(2,4));}
function nextWeek(){if(!G.showDone){toast('Primero celebra el concierto semanal.');return;}processLoans();advanceRivals();if(G.money<0)G.negativeWeeks++;else G.negativeWeeks=0;if(G.negativeWeeks>=3){G.gameOver=true;showModal('<h2>Bancarrota</h2><p>La agencia ha permanecido tres semanas en números rojos. La prioridad es cumplir contratos y cerrar responsablemente.</p><button class="btn primary" onclick="newGame()">Nueva partida</button>');return;}if(G.week===12){seasonEnd();return;}G.week++;resetWeek();}
function resetWeek(){G.trainingDone=false;G.eventDone=false;G.showDone=false;G.currentEvent=generateEvent();G.sponsorOffers=sponsorOffers();G.auditions=[candidate(1),candidate(2),candidate(3)];G.lastEconomy.events=0;G.activeSponsors=G.activeSponsors.filter(s=>!s.done);G.idols.forEach(x=>{x.fatigue=clamp(x.fatigue-3-G.staff.wellness);if(x.role==='leader')G.cohesion=clamp(G.cohesion+1.5);if(x.fatigue>95){x.fatigue=70;x.morale=clamp(x.morale-3);G.news.unshift(`${x.name} recibe descanso obligatorio para proteger su bienestar.`)}});Object.values(G.staff).forEach(()=>{});saveSlot(activeSlot,true);current='dashboard';render();}
function advanceRivals(){let actions=['lanza un single','firma una colaboración','hace directo especial','recibe cobertura local','organiza evento de fans'];G.rivals.forEach(x=>{let old=x.fans,act=pick(actions),gain=rnd(18,95)+Math.round(x.reputation*.7);if(act.includes('single'))gain+=rnd(20,80);x.fans+=gain;x.reputation=clamp(x.reputation+rnd(-1,3));x.result=`Show ${rnd(51,91)}/100`;x.trend=x.fans>old?'▲':'▼';x.lastAction=act;});G.news.unshift(`${pick(G.rivals).name} ${pick(actions)} y mueve el ranking.`);}
function seasonEnd(){let objs=seasonObjectives(G),completed=objs.filter(o=>o.id==='cash'?o.value:o.value>=o.target);completed.forEach(o=>{if(o.id==='fans')G.money+=80000;if(o.id==='songs')G.reputation=clamp(G.reputation+3);if(o.id==='rating')G.fans.loyal+=50;});showModal(`<h2>Final de la temporada ${G.season}</h2><p>Objetivos completados: <b>${completed.length}/${objs.length}</b></p><div class="grid two">${objs.map(o=>`<div class="card"><h3>${esc(o.name)}</h3><p>${esc(o.desc)}</p><span class="pill ${completed.includes(o)?'green':'red'}">${completed.includes(o)?'Completado':'Pendiente'}</span></div>`).join('')}</div><p class="section">La siguiente temporada mantiene desbloqueos, fans y canciones.</p><button class="btn primary" id="continueSeason">Comenzar temporada ${G.season+1}</button>`);document.querySelector('#continueSeason').onclick=()=>{G.season++;G.week=1;G.bestShow=null;G.seasonStart={fans:totalFans(),money:G.money,songs:G.songs.length};document.querySelector('#modal').classList.remove('show');resetWeek();};}
function reportHTML(r,compact){return`<div class="card report section"><h3>Temporada ${r.season||G.season} · Semana ${r.week} — ${esc(r.venue)}</h3><div class="reportGrid"><div class="reportStat"><small>Asistencia</small><br><b>${r.attendance} / ${r.capacity}</b></div><div class="reportStat"><small>Valoración</small><br><b>${r.rating}/100</b></div><div class="reportStat"><small>Beneficio</small><br><b class="${r.profit>=0?'positive':'negative'}">${money(r.profit)}</b></div><div class="reportStat"><small>Fans nuevos</small><br><b>+${r.newFans}</b></div></div>${compact?'<button class="btn section" data-page="concert">Ver informe completo</button>':`<h3 class="section">Por qué salió así</h3>${r.factors.map(f=>`<div class="factor ${f.type}">${f.type==='positive'?'+':f.type==='negative'?'-':'•'} ${esc(f.text)}</div>`).join('')}<h3 class="section">Momentos clave</h3>${r.moments.map(m=>`<div class="factor">• ${esc(m)}</div>`).join('')}<p><b>Conclusión:</b> ${esc(r.conclusion)}</p>${G.showDone?'<button class="btn good" id="nextWeekTop">Avanzar semana →</button>':''}`}</div>`}
function optionAllowed(o){if(!o.requires)return true;if(o.requires.staff&&G.staff[o.requires.staff]<(o.requires.level||1))return false;if(o.requires.rep&&G.reputation<o.requires.rep)return false;return true;}
function reqText(o){if(!o.requires)return'';if(o.requires.staff&&!optionAllowed(o))return`Requiere ${STAFF[o.requires.staff].name} nivel ${o.requires.level||1}`;if(o.requires.rep&&!optionAllowed(o))return`Requiere reputación ${o.requires.rep}`;return'';}
function effectSummary(e={}){let parts=[];if(e.fans)parts.push('Fans: '+Object.entries(e.fans).map(([k,v])=>`${v>0?'+':''}${v} ${k}`).join(', '));if(e.rep)parts.push(`Reputación ${e.rep>0?'+':''}${e.rep}`);if(e.money)parts.push(`${e.money>0?'+':''}${money(e.money)}`);if(e.fatigue)parts.push(`Fatiga ${e.fatigue>0?'+':''}${e.fatigue}`);if(e.morale)parts.push(`Moral ${e.morale>0?'+':''}${e.morale}`);if(e.cohesion)parts.push(`Cohesión ${e.cohesion>0?'+':''}${e.cohesion}`);return parts.join(' · ')||'Sin coste directo';}
function chooseEvent(i){let ev=G.currentEvent,o=ev.options[i];if(!o||!optionAllowed(o))return;applyEffects(o.effects||{});if(o.effects?.tag)G.activeSponsors.forEach(s=>{if(s.type==='event')s.eventTag=o.effects.tag});ev.done=true;G.eventDone=true;G.news.unshift(o.result);saveSlot(activeSlot,true);toast('Evento resuelto.');render();}
function applyEffects(e){if(e.money){G.money+=e.money;G.lastEconomy.events=(G.lastEconomy.events||0)+e.money;}if(e.rep)G.reputation=clamp(G.reputation+e.rep);if(e.cohesion)G.cohesion=clamp(G.cohesion+e.cohesion);if(e.fans)Object.entries(e.fans).forEach(([k,v])=>G.fans[k]=Math.max(0,(G.fans[k]||0)+v));if(e.fatigue)G.idols.forEach(x=>x.fatigue=clamp(x.fatigue+e.fatigue));if(e.morale)G.idols.forEach(x=>x.morale=clamp(x.morale+e.morale));if(e.dance)G.idols.forEach(x=>x.dance=clamp(x.dance+e.dance));if(e.leaderPop){let l=G.idols.find(x=>x.role==='leader')||G.idols[0];l.popularity=clamp(l.popularity+e.leaderPop);}if(e.songQuality)G.songBoost+=e.songQuality;}
function acceptSponsor(i){let s=G.sponsorOffers[i];if(!s||s.accepted)return;s.accepted=true;G.money+=s.cash;G.lastEconomy.sponsors=(G.lastEconomy.sponsors||0)+s.cash;G.activeSponsors.push(s);G.news.unshift(`${s.name} entra como sponsor de ${G.groupName}.`);saveSlot(activeSlot,true);render();}
function upgradeMerch(){let cost=(G.merchLevel+1)*70000;if(G.money<cost)return;G.money-=cost;G.merchLevel++;G.news.unshift(`El merchandising sube a nivel ${G.merchLevel}.`);saveSlot(activeSlot,true);render();}
function exportSave(){let blob=new Blob([JSON.stringify(G,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`idol-manager-pro-${G.groupName.replace(/\W+/g,'-')}-T${G.season}S${G.week}.json`;a.click();URL.revokeObjectURL(a.href);}
document.querySelector('#importFile').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);G=data;normalize();G.setupComplete=true;saveSlot(activeSlot,true);current='dashboard';toast('Partida importada.');render();}catch(err){toast('No se pudo importar el JSON.')}};r.readAsText(f);};
function showModal(html){document.querySelector('#modalBox').classList.remove('wide');document.querySelector('#modalBox').innerHTML=html;document.querySelector('#modal').classList.add('show')}
