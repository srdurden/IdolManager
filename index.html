<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live House Legend</title>
<style>
:root{--bg:#101324;--panel:#1a1f35;--panel2:#222942;--line:#343d5c;--text:#eef0ff;--muted:#aeb6d2;--pink:#ff6fb5;--cyan:#59e1e8;--yellow:#ffd166;--green:#62df9b;--red:#ff6b78;--shadow:0 10px 28px #07091680}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% -10%,#3b2152 0,transparent 30%),var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif}button,select,input{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.42}.top{position:sticky;top:0;z-index:10;background:#111629ed;border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}header{height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}.brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--pink),#9b72ff 55%,var(--cyan));display:grid;place-items:center;font-size:22px;box-shadow:0 0 24px #ff6fb555}.brand h1{font-size:20px;margin:0;letter-spacing:.5px}.brand small{color:var(--muted)}.headBtns{display:flex;gap:8px}.btn{border:1px solid var(--line);color:var(--text);background:var(--panel2);padding:9px 13px;border-radius:8px;font-weight:700}.btn:hover:not(:disabled){border-color:var(--cyan);transform:translateY(-1px)}.btn.primary{background:linear-gradient(135deg,#d64d98,#805be4);border:0}.btn.good{background:#1f7051;border-color:#3ca97d}.btn.danger{background:#793240;border-color:#b4495d}.statusbar{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid #252c46}.status{padding:8px 18px;border-right:1px solid #252c46}.status b{display:block;color:var(--cyan);font-size:16px}.status span{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}.layout{display:grid;grid-template-columns:215px 1fr;min-height:calc(100vh - 118px)}nav{padding:18px 12px;border-right:1px solid var(--line);background:#12172a}.navbtn{display:flex;width:100%;align-items:center;gap:10px;padding:11px 13px;margin-bottom:5px;border:0;border-radius:8px;background:transparent;color:var(--muted);text-align:left}.navbtn:hover,.navbtn.active{color:#fff;background:linear-gradient(90deg,#ff6fb526,transparent);box-shadow:inset 3px 0 var(--pink)}main{padding:22px;max-width:1500px;width:100%;overflow:hidden}.page{display:none}.page.active{display:block}.pageTitle{display:flex;align-items:end;justify-content:space-between;margin-bottom:16px}.pageTitle h2{margin:0;font-size:24px}.pageTitle p{margin:3px 0 0;color:var(--muted)}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(150px,1fr))}.two{grid-template-columns:1.2fr .8fr}.three{grid-template-columns:repeat(3,1fr)}.card{background:linear-gradient(145deg,var(--panel),#171c31);border:1px solid var(--line);border-radius:12px;padding:17px;box-shadow:var(--shadow)}.card h3{margin:0 0 12px;font-size:15px}.metric{font-size:27px;font-weight:800}.metric.pink{color:var(--pink)}.metric.cyan{color:var(--cyan)}.metric.yellow{color:var(--yellow)}.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}.subtle{color:var(--muted)}.section{margin-top:16px}.progress{height:8px;background:#0d1020;border-radius:8px;overflow:hidden;margin-top:5px}.progress i{height:100%;display:block;background:linear-gradient(90deg,var(--cyan),#7c78ff)}.progress.fatigue i{background:linear-gradient(90deg,var(--yellow),var(--red))}.progress.moral i{background:linear-gradient(90deg,#5ed59b,var(--cyan))}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:10px}table{border-collapse:collapse;width:100%;min-width:720px;background:#171c30}th{background:#252c47;text-align:left;color:#cdd3ec;font-size:11px;text-transform:uppercase;letter-spacing:.5px}th,td{padding:10px 11px;border-bottom:1px solid #2b324d}tr:hover td{background:#20263e}.tag{display:inline-block;padding:3px 7px;border-radius:20px;background:#43325d;color:#f5c7ff;font-size:11px}.tag.green{background:#1e513e;color:#9df0c9}.tag.red{background:#5e2c37;color:#ffc0c8}.news{list-style:none;padding:0;margin:0}.news li{padding:10px 0;border-bottom:1px solid var(--line);display:flex;gap:10px}.news li:before{content:'◆';color:var(--pink);font-size:9px;margin-top:4px}.optionGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.choice{position:relative;border:1px solid var(--line);border-radius:10px;padding:15px;background:#1b2037;color:var(--text);text-align:left;min-height:110px}.choice:hover:not(:disabled){border-color:var(--pink)}.choice.selected{border-color:var(--pink);box-shadow:0 0 0 2px #ff6fb52e;background:#2a203d}.choice strong{display:block;margin-bottom:5px}.choice small{color:var(--muted)}.choice .cost{display:block;color:var(--yellow);margin-top:8px}.formRow{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.field select,.field input{width:100%;padding:10px;border:1px solid var(--line);border-radius:7px;background:#101427;color:#fff}.notice{padding:12px 14px;border-left:3px solid var(--cyan);background:#172b3b;border-radius:5px;margin:12px 0}.notice.warn{border-color:var(--yellow);background:#3a3020}.notice.bad{border-color:var(--red);background:#3c2028}.report{border:1px solid #7763d4;background:linear-gradient(145deg,#272148,#171b31);padding:22px;border-radius:12px;box-shadow:0 0 40px #795cff26}.report h3{color:var(--cyan);text-transform:uppercase}.reportStats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:16px 0}.reportStat{background:#12162a;padding:11px;border-radius:7px}.reportStat b{display:block;font-size:18px}.moment{padding:7px 0;border-bottom:1px solid #3a3656}.calendar{display:grid;grid-template-columns:repeat(12,1fr);gap:5px}.week{height:42px;display:grid;place-items:center;border-radius:6px;background:#252b44;color:var(--muted);font-weight:700}.week.done{background:#214535;color:#81eab4}.week.now{background:linear-gradient(135deg,var(--pink),#815ee1);color:#fff}.candidate h3{font-size:18px;margin-bottom:2px}.statsMini{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:10px 0}.statsMini span{background:#11162a;padding:5px;border-radius:5px;font-size:11px}.staffRow{display:flex;justify-content:space-between;align-items:center;gap:12px}.staffLevel{color:var(--cyan);font-weight:bold}.song.owned{border-color:#3f9d7a}.song.locked{opacity:.82}.trendUp{color:var(--green)}.trendDown{color:var(--red)}.footer{text-align:center;color:#737d9f;font-size:11px;padding:20px}.toast{position:fixed;right:20px;bottom:20px;background:#26304b;border:1px solid var(--cyan);padding:12px 18px;border-radius:8px;box-shadow:var(--shadow);z-index:20;transform:translateY(80px);opacity:0;transition:.25s}.toast.show{transform:none;opacity:1}.modal{position:fixed;inset:0;background:#050711cc;display:none;place-items:center;z-index:30;padding:20px}.modal.show{display:grid}.modalBox{max-width:680px;width:100%;background:#1a1f35;border:1px solid #6d62bb;border-radius:14px;padding:25px;box-shadow:0 20px 80px #000}.modalBox h2{color:var(--pink)}@media(max-width:900px){.layout{grid-template-columns:1fr}nav{display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--line);padding:8px}.navbtn{white-space:nowrap;margin:0;width:auto}.cards,.two,.three{grid-template-columns:1fr 1fr}.statusbar{grid-template-columns:repeat(5,160px);overflow:auto}main{padding:14px}}@media(max-width:600px){header{padding:0 12px}.brand small{display:none}.cards,.two,.three,.reportStats,.formRow{grid-template-columns:1fr}.headBtns .btn{padding:8px;font-size:11px}.calendar{grid-template-columns:repeat(6,1fr)}}
</style>
</head>
<body>
<div class="top"><header><div class="brand"><div class="logo">★</div><div><h1>LIVE HOUSE LEGEND</h1><small>Starlight Room · Manager Edition</small></div></div><div class="headBtns"><button class="btn" id="saveBtn">Guardar partida</button><button class="btn danger" id="newBtn">Nueva partida</button></div></header><div class="statusbar" id="statusbar"></div></div>
<div class="layout"><nav id="nav"></nav><main id="main"></main></div><div class="toast" id="toast"></div><div class="modal" id="modal"><div class="modalBox" id="modalBox"></div></div>
<script>
'use strict';
/* LIVE HOUSE LEGEND — motor de juego autocontenido. Los catálogos se mantienen separados del estado para facilitar ampliaciones. */
const SAVE_KEY='liveHouseLegend_v1';
const ROLES=['Center','Main Vocal','Main Dancer','Leader','Variety','Visual','Fan Favorite'];
const NAMES=['Hana Sato','Yui Takeda','Emi Nakamura','Sora Fujimoto','Rin Abe','Kaori Ito','Nana Shimizu','Mai Okada','Aya Matsui','Noa Kimura','Riko Endo','Miku Inoue'];
const TRAITS=['Brilla en salas pequeñas','Gran potencial oculto','Muy disciplinada','Conecta con fans','Voz inestable','Se agota rápido','Buena en entrevistas','Baila mejor bajo presión','Ex-solista','Promesa local'];
const TRAINING={voice:{name:'Canto',desc:'Mejora la voz. El coach potencia los resultados.',fatigue:7},dance:{name:'Baile',desc:'Mejora el baile. La coreógrafa reduce el desgaste.',fatigue:9},charisma:{name:'Carisma',desc:'Ensayo escénico y entrevistas.',fatigue:6},rest:{name:'Descanso',desc:'Recupera fatiga y moral. El bienestar ayuda.',fatigue:-18},team:{name:'Trabajo en equipo',desc:'Mejora moral y cohesión del grupo.',fatigue:3},personal:{name:'Promoción personal',desc:'Aumenta popularidad y presencia pública.',fatigue:6}};
const STAFF={vocal:{name:'Coach vocal',effect:'Mejora canto y reduce afonías'},dance:{name:'Coreógrafa',effect:'Mejora baile y reduce errores'},social:{name:'Community manager',effect:'Más alcance y fans nuevos'},producer:{name:'Productora musical',effect:'Aumenta calidad de producción'},press:{name:'Responsable de prensa',effect:'Mitiga noticias negativas'},wellness:{name:'Psicóloga de bienestar',effect:'Reduce fatiga y conflictos'},wardrobe:{name:'Diseñadora de vestuario',effect:'Carisma y merchandising'}};
const VENUES=[{name:'Local de barrio',cap:50,cost:12000,rep:0,fans:0,outdoor:false},{name:'Live House pequeño',cap:120,cost:30000,rep:14,fans:120,outdoor:false},{name:'Sala indie',cap:300,cost:70000,rep:25,fans:350,outdoor:false},{name:'Teatro mediano',cap:800,cost:160000,rep:40,fans:900,outdoor:false},{name:'Festival local',cap:1500,cost:250000,rep:55,fans:1800,outdoor:true},{name:'Gran recinto',cap:5000,cost:720000,rep:75,fans:6000,outdoor:false}];
const PROMOS=[{name:'Ninguna',cost:0,power:0},{name:'Flyers',cost:8000,power:8},{name:'Redes sociales',cost:18000,power:16},{name:'Evento de firmas',cost:35000,power:25},{name:'Colaboración local',cost:65000,power:38},{name:'Campaña fuerte',cost:120000,power:58}];
const STRATEGIES=[{name:'Show seguro',stat:'safe'},{name:'Show energético',stat:'energy'},{name:'Show emocional',stat:'emotion'},{name:'Estreno arriesgado',stat:'risky'},{name:'Evento para fans fieles',stat:'loyal'}];
const SONGS=[{title:'Neon Promise',energy:70,vocal:45,dance:50,hook:75,emotion:55,viral:65,quality:65,cost:0},{title:'Rainy Platform',energy:42,vocal:67,dance:28,hook:62,emotion:88,viral:48,quality:72,cost:110000},{title:'Hyper Candy Panic',energy:94,vocal:58,dance:85,hook:82,emotion:40,viral:88,quality:68,cost:155000},{title:'Starlight Weekend',energy:76,vocal:62,dance:65,hook:87,emotion:70,viral:73,quality:78,cost:210000},{title:'Midnight Ribbon',energy:58,vocal:82,dance:57,hook:72,emotion:92,viral:66,quality:86,cost:280000}];
const RIVAL_NAMES=['Cherry Voltage','Midnight Parade','Sugar Signal','Tokyo Velvet','Prism Unit','Electric Sakura','Velvet Comet','Blue Horoscope'];
const clamp=(n,a=0,b=100)=>Math.max(a,Math.min(b,n)); const avg=(arr,k)=>arr.reduce((s,x)=>s+x[k],0)/arr.length; const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a; const money=n=>Math.round(n).toLocaleString('es-ES')+' ¥';
function candidate(i=0){let base=rnd(42,72);return{id:Date.now()+i+Math.random(),name:NAMES.splice?NAMES[rnd(0,NAMES.length-1)]:NAMES[0],age:rnd(20,32),role:ROLES[rnd(0,ROLES.length-1)],voice:clamp(base+rnd(-14,14)),dance:clamp(base+rnd(-14,14)),charisma:clamp(base+rnd(-12,16)),stamina:rnd(45,82),popularity:rnd(4,24),potential:rnd(62,95),fatigue:rnd(3,12),morale:rnd(60,82),salary:rnd(24,46)*1000,trait:TRAITS[rnd(0,TRAITS.length-1)],cost:rnd(65,175)*1000};}
function initialState(){return{agency:'Starlight Room',week:1,season:1,money:500000,fans:80,reputation:10,cohesion:55,negativeWeeks:0,gameOver:false,training:'team',trained:false,showDone:false,venue:0,promo:1,strategy:0,song:0,ticket:1500,idols:[{name:'Aiko Mori',age:23,role:'Center',voice:62,dance:68,charisma:78,stamina:58,popularity:25,potential:84,fatigue:10,morale:72,salary:35000,trait:'Conecta con fans'},{name:'Reina Kuroda',age:25,role:'Main Vocal',voice:82,dance:49,charisma:61,stamina:55,popularity:18,potential:76,fatigue:8,morale:68,salary:38000,trait:'Muy disciplinada'},{name:'Mina Hayashi',age:22,role:'Main Dancer',voice:51,dance:84,charisma:66,stamina:70,popularity:16,potential:81,fatigue:12,morale:70,salary:32000,trait:'Baila mejor bajo presión'}],staff:{vocal:0,dance:0,social:0,producer:0,press:0,wellness:0,wardrobe:0},songs:[0],auditions:[candidate(1),candidate(2),candidate(3)],news:['La agencia Starlight Room abre sus puertas.','Tres artistas adultas empiezan a preparar su primer concierto.','Neon Promise despierta curiosidad entre los primeros fans.'],rivals:RIVAL_NAMES.map((name,i)=>({name,fans:180+rnd(0,1100)+i*170,reputation:15+rnd(0,35)+i*2,result:'Preparando temporada',trend:'—'})),lastEconomy:{tickets:0,merch:0,salaries:0,staff:0,promo:0,venue:0,profit:0},lastReport:null,history:[],seasonStart:{fans:80,money:500000},bestShow:null};}
let G; try{G=JSON.parse(localStorage.getItem(SAVE_KEY))||initialState()}catch(e){G=initialState()}
const pages=[['dashboard','▦','Dashboard'],['group','♟','Grupo'],['training','◆','Entrenamiento'],['auditions','☆','Audiciones'],['staff','⚙','Staff'],['songs','♫','Canciones'],['concert','▶','Concierto'],['news','▤','Noticias'],['ranking','↗','Ranking'],['economy','¥','Economía']]; let current='dashboard';
function save(auto=false){localStorage.setItem(SAVE_KEY,JSON.stringify(G));if(!auto)toast('Partida guardada en este navegador.');}
function toast(t){let e=document.querySelector('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}
function ranking(){return[...G.rivals,{name:G.agency,fans:G.fans,reputation:G.reputation,player:true,result:G.lastReport?G.lastReport.rating+'/100':'Sin debut',trend:G.lastReport?(G.lastReport.rep>=0?'▲':'▼'):'—'}].sort((a,b)=>(b.fans+b.reputation*12)-(a.fans+a.reputation*12));}
function rankPos(){return ranking().findIndex(x=>x.player)+1}
function render(){document.querySelector('#statusbar').innerHTML=`<div class="status"><span>Temporada / Semana</span><b>${G.season} / ${G.week}</b></div><div class="status"><span>Tesorería</span><b>${money(G.money)}</b></div><div class="status"><span>Fans</span><b>${G.fans.toLocaleString('es-ES')}</b></div><div class="status"><span>Reputación</span><b>${G.reputation}/100</b></div><div class="status"><span>Ranking</span><b>#${rankPos()}</b></div>`;document.querySelector('#nav').innerHTML=pages.map(p=>`<button class="navbtn ${current===p[0]?'active':''}" data-page="${p[0]}"><span>${p[1]}</span>${p[2]}</button>`).join('');document.querySelector('#main').innerHTML=`<section class="page active">${pageContent(current)}</section><div class="footer">LIVE HOUSE LEGEND · Todas las integrantes son adultas · Gestión responsable y contratos justos</div>`;bind();}
function pageContent(p){return({dashboard:dashboardPage,group:groupPage,training:trainingPage,auditions:auditionsPage,staff:staffPage,songs:songsPage,concert:concertPage,news:newsPage,ranking:rankingPage,economy:economyPage}[p])()}
const title=(a,b)=>`<div class="pageTitle"><div><h2>${a}</h2><p>${b}</p></div><span class="tag">Temporada ${G.season} · Semana ${G.week}</span></div>`;
function dashboardPage(){let f=Math.round(avg(G.idols,'fatigue')),m=Math.round(avg(G.idols,'morale')),v=VENUES[G.venue];return title('Dashboard','Centro de operaciones de Starlight Room')+`<div class="calendar">${Array.from({length:12},(_,i)=>`<div class="week ${i+1<G.week?'done':i+1===G.week?'now':''}">S${i+1}</div>`).join('')}</div>${G.money<0?'<div class="notice bad">⚠ Tesorería negativa. Tres semanas consecutivas supondrán la bancarrota.</div>':''}<div class="grid cards section"><div class="card"><span class="label">Próximo concierto</span><div class="metric pink">${v.name}</div><small class="subtle">${v.cap} plazas · ${money(G.ticket)} entrada</small></div><div class="card"><span class="label">Cohesión</span><div class="metric cyan">${Math.round(G.cohesion)}%</div><div class="progress"><i style="width:${G.cohesion}%"></i></div></div><div class="card"><span class="label">Fatiga media</span><div class="metric ${f>75?'pink':'yellow'}">${f}%</div><div class="progress fatigue"><i style="width:${f}%"></i></div></div><div class="card"><span class="label">Moral media</span><div class="metric cyan">${m}%</div><div class="progress moral"><i style="width:${m}%"></i></div></div></div><div class="grid two section"><div class="card"><h3>Plan semanal</h3><p><b>Entrenamiento:</b> ${TRAINING[G.training].name} ${G.trained?'<span class="tag green">Realizado</span>':'<span class="tag">Pendiente</span>'}</p><p><b>Concierto:</b> ${G.showDone?'<span class="tag green">Celebrado</span>':'Pendiente de preparación'}</p><p><b>Repertorio:</b> ${G.songs.length} canción/es · <b>Plantilla:</b> ${G.idols.length}/7</p><button class="btn primary" data-page="concert" ${G.showDone?'disabled':''}>Preparar concierto</button></div><div class="card"><h3>Últimas noticias</h3><ul class="news">${G.news.slice(0,4).map(n=>`<li>${n}</li>`).join('')}</ul></div></div>${G.lastReport?reportHTML(G.lastReport):''}`}
function groupPage(){return title('Grupo','Plantilla, capacidades y bienestar')+`<div class="card"><div class="tableWrap"><table><thead><tr><th>Nombre</th><th>Edad</th><th>Rol</th><th>Voz</th><th>Baile</th><th>Carisma</th><th>Res.</th><th>Popularidad</th><th>Potencial</th><th>Fatiga</th><th>Moral</th><th>Salario</th></tr></thead><tbody>${G.idols.map(x=>`<tr><td><b>${x.name}</b><br><small class="subtle">${x.trait||'Sin rasgo'}</small></td><td>${x.age}</td><td><span class="tag">${x.role}</span></td><td>${Math.round(x.voice)}</td><td>${Math.round(x.dance)}</td><td>${Math.round(x.charisma)}</td><td>${x.stamina}</td><td>${Math.round(x.popularity)}</td><td>${x.potential}</td><td><span class="${x.fatigue>80?'trendDown':''}">${Math.round(x.fatigue)}</span><div class="progress fatigue"><i style="width:${x.fatigue}%"></i></div></td><td>${Math.round(x.morale)}<div class="progress moral"><i style="width:${x.morale}%"></i></div></td><td>${money(x.salary)}</td></tr>`).join('')}</tbody></table></div></div>`}
function trainingPage(){return title('Entrenamiento','Un plan común por semana')+(G.trained?'<div class="notice">El entrenamiento de esta semana ya se ha realizado.</div>':'')+`<div class="optionGrid">${Object.entries(TRAINING).map(([k,x])=>`<button class="choice ${G.training===k?'selected':''}" data-training="${k}" ${G.trained?'disabled':''}><strong>${x.name}</strong><small>${x.desc}</small><span class="cost">Fatiga: ${x.fatigue>0?'+':''}${x.fatigue}</span></button>`).join('')}</div><div class="card section"><h3>Previsión</h3><p>${TRAINING[G.training].desc}</p><p class="subtle">Las mejoras dependen del potencial individual. Los atributos nunca superan 99.</p><button class="btn primary" id="doTraining" ${G.trained?'disabled':''}>Realizar ${TRAINING[G.training].name}</button></div>`}
function auditionsPage(){return title('Audiciones','Tres candidatas adultas disponibles esta semana')+(G.idols.length>=7?'<div class="notice warn">La plantilla está completa (7/7).</div>':'')+`<div class="grid three">${G.auditions.map((x,i)=>`<div class="card candidate"><h3>${x.name}</h3><span class="tag">${x.role} · ${x.age} años</span><div class="statsMini"><span>VOZ <b>${x.voice}</b></span><span>BAILE <b>${x.dance}</b></span><span>CARISMA <b>${x.charisma}</b></span><span>RESIST. <b>${x.stamina}</b></span><span>POTENCIAL <b>${x.potential}</b></span><span>POPULAR. <b>${x.popularity}</b></span></div><p>Rasgo: <b>${x.trait}</b></p><p class="subtle">Salario semanal: ${money(x.salary)}</p><button class="btn primary hire" data-i="${i}" ${G.money<x.cost||G.idols.length>=7?'disabled':''}>Fichar · ${money(x.cost)}</button></div>`).join('')}</div>`}
function staffPage(){return title('Staff','Especialistas con niveles del 0 al 3')+`<div class="optionGrid">${Object.entries(STAFF).map(([k,x])=>{let lv=G.staff[k],cost=(lv+1)*55000;return`<div class="card"><div class="staffRow"><div><h3>${x.name}</h3><div class="staffLevel">Nivel ${lv} / 3</div></div><span class="tag">${lv?'En plantilla':'Vacante'}</span></div><p class="subtle">${x.effect}</p><button class="btn staffUp" data-staff="${k}" ${lv>=3||G.money<cost?'disabled':''}>${lv?'Mejorar':'Contratar'} · ${money(cost)}</button></div>`}).join('')}</div><div class="notice">El staff cobra 4.000 ¥ por nivel y semana. Las mejoras son permanentes.</div>`}
function songsPage(){return title('Canciones','Produce repertorio y adapta el setlist')+`<div class="optionGrid">${SONGS.map((s,i)=>`<div class="card song ${G.songs.includes(i)?'owned':'locked'}"><h3>${s.title}</h3><div class="statsMini"><span>ENERGÍA <b>${s.energy}</b></span><span>VOZ DIF. <b>${s.vocal}</b></span><span>BAILE DIF. <b>${s.dance}</b></span><span>GANCHO <b>${s.hook}</b></span><span>EMOCIÓN <b>${s.emotion}</b></span><span>VIRALIDAD <b>${s.viral}</b></span></div><p>Calidad: <b>${s.quality + G.staff.producer*2}</b></p>${G.songs.includes(i)?'<span class="tag green">En repertorio</span>':`<button class="btn buySong" data-song="${i}" ${G.money<s.cost?'disabled':''}>Producir · ${money(s.cost)}</button>`}</div>`).join('')}</div>`}
function concertPage(){let v=VENUES[G.venue],p=PROMOS[G.promo],total=v.cost+p.cost;return title('Concierto semanal','Configura el show; el resultado se simula automáticamente')+(G.showDone?'<div class="notice">El concierto de esta semana ya se ha celebrado. Revisa el informe y avanza.</div>':'')+`<div class="grid two"><div class="card"><h3>Producción</h3><div class="formRow"><div class="field"><label>Sala</label><select id="venueSel">${VENUES.map((x,i)=>`<option value="${i}" ${i===G.venue?'selected':''} ${G.reputation<x.rep||G.fans<x.fans?'disabled':''}>${x.name} · ${x.cap} plazas ${G.reputation<x.rep||G.fans<x.fans?'🔒':''}</option>`).join('')}</select></div><div class="field"><label>Precio de entrada</label><input type="number" id="ticket" min="500" max="12000" step="100" value="${G.ticket}"></div><div class="field"><label>Promoción</label><select id="promoSel">${PROMOS.map((x,i)=>`<option value="${i}" ${i===G.promo?'selected':''}>${x.name} · ${money(x.cost)}</option>`).join('')}</select></div><div class="field"><label>Canción principal</label><select id="songSel">${G.songs.map(i=>`<option value="${i}" ${i===G.song?'selected':''}>${SONGS[i].title}</option>`).join('')}</select></div><div class="field"><label>Estrategia</label><select id="strategySel">${STRATEGIES.map((x,i)=>`<option value="${i}" ${i===G.strategy?'selected':''}>${x.name}</option>`).join('')}</select></div></div></div><div class="card"><h3>Resumen del evento</h3><p><b>${v.name}</b> · ${v.cap} plazas</p><p>Coste sala: <b>${money(v.cost)}</b><br>Promoción: <b>${money(p.cost)}</b><br>Coste previo: <b>${money(total)}</b></p><p>Entrada completa potencial: <b>${money(v.cap*G.ticket)}</b></p>${G.money<total?'<div class="notice bad">No hay fondos para sala y promoción.</div>':''}${avg(G.idols,'fatigue')>80?'<div class="notice warn">La fatiga alta aumenta mucho el riesgo de incidentes.</div>':''}<button class="btn primary" id="playShow" ${G.showDone||G.money<total||G.gameOver?'disabled':''}>▶ Celebrar concierto</button></div></div>${G.lastReport?reportHTML(G.lastReport):''}`}
function reportHTML(r){return`<div class="report section"><h3>Semana ${r.week} — Concierto en ${r.venue}</h3><div class="reportStats"><div class="reportStat"><span class="label">Asistencia</span><b>${r.attendance} / ${r.capacity}</b></div><div class="reportStat"><span class="label">Valoración</span><b>${r.rating}/100</b></div><div class="reportStat"><span class="label">Beneficio</span><b class="${r.profit>=0?'trendUp':'trendDown'}">${money(r.profit)}</b></div><div class="reportStat"><span class="label">Fans nuevos</span><b>+${r.newFans}</b></div></div><p>Entradas: <b>${money(r.tickets)}</b> · Merchandising: <b>${money(r.merch)}</b> · Costes: <b>${money(r.costs)}</b> · Reputación: <b>${r.rep>=0?'+':''}${r.rep}</b></p><h3>Momentos clave</h3>${r.moments.map(x=>`<div class="moment">• ${x}</div>`).join('')}<p><b>Conclusión:</b> ${r.conclusion}</p>${G.showDone?'<button class="btn good" id="nextWeek">Avanzar a la siguiente semana →</button>':''}</div>`}
function newsPage(){return title('Noticias','Prensa, comunidad y señales del mercado')+`<div class="card"><ul class="news">${G.news.map((n,i)=>`<li><div><span class="tag">S${Math.max(1,G.week-Math.floor(i/3))}</span> ${n}</div></li>`).join('')}</ul></div>`}
function rankingPage(){return title('Ranking indie','Clasificación dinámica por fans y reputación')+`<div class="card"><div class="tableWrap"><table><thead><tr><th>Pos.</th><th>Grupo</th><th>Fans</th><th>Reputación</th><th>Último resultado</th><th>Tendencia</th></tr></thead><tbody>${ranking().map((x,i)=>`<tr style="${x.player?'background:#392c55':''}"><td><b>#${i+1}</b></td><td>${x.name}${x.player?' <span class="tag">TU GRUPO</span>':''}</td><td>${Math.round(x.fans).toLocaleString('es-ES')}</td><td>${Math.round(x.reputation)}</td><td>${x.result}</td><td class="${x.trend==='▲'?'trendUp':x.trend==='▼'?'trendDown':''}">${x.trend}</td></tr>`).join('')}</tbody></table></div></div>`}
function economyPage(){let e=G.lastEconomy;return title('Economía','Ingresos, costes y sostenibilidad de la agencia')+`<div class="grid cards"><div class="card"><span class="label">Dinero actual</span><div class="metric ${G.money<0?'pink':'cyan'}">${money(G.money)}</div></div><div class="card"><span class="label">Ingresos último show</span><div class="metric">${money(e.tickets+e.merch)}</div></div><div class="card"><span class="label">Gastos semanales</span><div class="metric yellow">${money(e.salaries+e.staff+e.promo+e.venue)}</div></div><div class="card"><span class="label">Balance semanal</span><div class="metric ${e.profit>=0?'cyan':'pink'}">${money(e.profit)}</div></div></div><div class="card section"><div class="tableWrap"><table><tbody><tr><th>Entradas</th><td class="trendUp">+${money(e.tickets)}</td></tr><tr><th>Merchandising</th><td class="trendUp">+${money(e.merch)}</td></tr><tr><th>Salarios justos</th><td>-${money(e.salaries)}</td></tr><tr><th>Staff</th><td>-${money(e.staff)}</td></tr><tr><th>Promoción</th><td>-${money(e.promo)}</td></tr><tr><th>Sala</th><td>-${money(e.venue)}</td></tr><tr><th>Beneficio semanal</th><td><b>${money(e.profit)}</b></td></tr></tbody></table></div></div>`}
function bind(){document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{current=b.dataset.page;render()});document.querySelectorAll('[data-training]').forEach(b=>b.onclick=()=>{G.training=b.dataset.training;render()});let q=s=>document.querySelector(s);if(q('#doTraining'))q('#doTraining').onclick=doTraining;document.querySelectorAll('.hire').forEach(b=>b.onclick=()=>hire(+b.dataset.i));document.querySelectorAll('.staffUp').forEach(b=>b.onclick=()=>upgradeStaff(b.dataset.staff));document.querySelectorAll('.buySong').forEach(b=>b.onclick=()=>buySong(+b.dataset.song));[['#venueSel','venue'],['#promoSel','promo'],['#songSel','song'],['#strategySel','strategy']].forEach(([id,k])=>{if(q(id))q(id).onchange=e=>{G[k]=+e.target.value;render()}});if(q('#ticket'))q('#ticket').onchange=e=>{G.ticket=clamp(+e.target.value,500,12000);render()};if(q('#playShow'))q('#playShow').onclick=playShow;if(q('#nextWeek'))q('#nextWeek').onclick=nextWeek;}
function doTraining(){let t=G.training,well=G.staff.wellness,dance=G.staff.dance,vocal=G.staff.vocal;G.idols.forEach(x=>{let gain=(1+x.potential/100)*(1+rnd(0,12)/10);if(t==='voice')x.voice=clamp(x.voice+gain+vocal*.7,0,99);if(t==='dance')x.dance=clamp(x.dance+gain+dance*.7,0,99);if(t==='charisma')x.charisma=clamp(x.charisma+gain,0,99);if(t==='personal')x.popularity=clamp(x.popularity+gain*.75,0,99);if(t==='rest'){x.fatigue=clamp(x.fatigue-18-well*3);x.morale=clamp(x.morale+7+well)}else{x.fatigue=clamp(x.fatigue+TRAINING[t].fatigue-well-(t==='dance'?dance:0));}if(t==='team')x.morale=clamp(x.morale+5+well);});if(t==='team')G.cohesion=clamp(G.cohesion+7+well);G.trained=true;G.news.unshift(`${TRAINING[t].name}: el plan semanal se completó con profesionalidad.`);save(true);toast('Entrenamiento completado.');render();}
function hire(i){let x=G.auditions[i];if(!x||G.money<x.cost||G.idols.length>=7)return;G.money-=x.cost;let {cost,id,...idol}=x;G.idols.push(idol);G.auditions.splice(i,1);G.cohesion=clamp(G.cohesion-4);G.news.unshift(`${x.name} firma un contrato justo con Starlight Room.`);save(true);render();}
function upgradeStaff(k){let lv=G.staff[k],cost=(lv+1)*55000;if(lv>=3||G.money<cost)return;G.money-=cost;G.staff[k]++;G.news.unshift(`${STAFF[k].name} alcanza el nivel ${G.staff[k]}.`);save(true);render();}
function buySong(i){let s=SONGS[i];if(G.songs.includes(i)||G.money<s.cost)return;G.money-=s.cost;G.songs.push(i);G.song=i;G.news.unshift(`La agencia estrena la producción de “${s.title}”.`);save(true);render();}
function playShow(){let v=VENUES[G.venue],p=PROMOS[G.promo],s=SONGS[G.song],st=STRATEGIES[G.strategy],mv=avg(G.idols,'voice'),md=avg(G.idols,'dance'),mc=avg(G.idols,'charisma'),mm=avg(G.idols,'morale'),mf=avg(G.idols,'fatigue'),mp=avg(G.idols,'popularity');let group=mv*.25+md*.25+mc*.25+G.cohesion*.15+mm*.10-mf*.20;let affinity=st.stat==='energy'?s.energy*.08:st.stat==='emotion'?s.emotion*.08:st.stat==='loyal'?mp*.1:st.stat==='risky'?7:5;let difficulty=Math.max(0,s.vocal-mv)*.12+Math.max(0,s.dance-md)*.12;let staffBonus=G.staff.vocal+G.staff.dance*1.5+G.staff.producer*1.8+G.staff.wardrobe;let incident=0,moments=[];let highFatigue=G.idols.filter(x=>x.fatigue>80);if(highFatigue.length&&Math.random()<.25+highFatigue.length*.1-G.staff.wellness*.06){incident-=rnd(5,12);moments.push(`${highFatigue[0].name} terminó con fatiga alta y el equipo priorizará su descanso.`);}if(Math.random()<.12-G.staff.vocal*.02){incident-=4;moments.push('Una leve inestabilidad vocal obligó a adaptar un verso.');}if(Math.random()<.1-G.staff.dance*.02){incident-=4;moments.push('La coreografía tuvo algunos errores leves.');}if(Math.random()<.13+G.staff.social*.04+s.viral/900){incident+=rnd(4,9);moments.push('Un fragmento del show empezó a circular rápidamente en redes.');}if(v.outdoor&&Math.random()<.12){incident-=12;moments.push('La lluvia redujo parte de la asistencia al evento exterior.');}let rating=Math.round(clamp(group*.72+(s.quality+s.hook+s.viral)/3*.22+affinity+staffBonus+rnd(-7,7)-difficulty+incident));let pricePenalty=Math.max(0,(G.ticket-2200)/65);let demand=18+G.fans*.13+G.reputation*2.1+p.power*(1+G.staff.social*.14)+mp*.7+rnd(-12,15)-pricePenalty;let attendance=Math.round(clamp(demand,5,v.cap));if(v.outdoor&&moments.some(x=>x.includes('lluvia')))attendance=Math.round(attendance*.72);let tickets=attendance*G.ticket;let merch=Math.round(attendance*(220+mp*4+mc*2+G.staff.wardrobe*90)*(0.72+G.fans/(G.fans+1000)));let salaries=G.idols.reduce((a,x)=>a+x.salary,0),staffCost=Object.values(G.staff).reduce((a,x)=>a+x,0)*4000,costs=v.cost+p.cost+salaries+staffCost,profit=tickets+merch-costs;let fill=attendance/v.cap;let newFans=Math.max(1,Math.round(rating*.22+fill*22+s.viral*.09+G.staff.social*5+Math.max(0,incident)-8));let rep=Math.round((rating-58)/10+(fill>.8?1:0));G.money+=profit;G.fans+=newFans;G.reputation=clamp(G.reputation+rep,0,100);let fatigueGain=9+(st.stat==='energy'?5:st.stat==='safe'?-2:2);G.idols.forEach(x=>{x.fatigue=clamp(x.fatigue+fatigueGain*(1.25-x.stamina/200)-G.staff.wellness);x.morale=clamp(x.morale+(rating>=70?4:rating<50?-6:1));x.popularity=clamp(x.popularity+newFans/G.idols.length/12,0,99)});G.cohesion=clamp(G.cohesion+(rating>=70?3:rating<50?-4:1)-highFatigue.length);let star=[...G.idols].sort((a,b)=>(b.charisma+b.popularity)-(a.charisma+a.popularity))[0];moments.unshift(`${star.name} brilló en su rol de ${star.role}.`);moments.push(`El público reaccionó ${rating>72?'con entusiasmo':rating>55?'bien':'con reservas'} a “${s.title}”.`);let conclusion=rating>=85?'Noche memorable. La escena empieza a considerar al grupo una referencia.':rating>=70?'Buen concierto. El grupo gana fuerza en la escena indie.':rating>=52?'Actuación correcta, aunque todavía hay margen para crecer.':'Una noche difícil. Conviene recuperar energías y revisar el plan.';let r={week:G.week,venue:v.name,capacity:v.cap,attendance,rating,tickets,merch,costs,profit,newFans,rep,moments,conclusion};G.lastReport=r;G.lastEconomy={tickets,merch,salaries,staff:staffCost,promo:p.cost,venue:v.cost,profit};G.history.push(r);if(!G.bestShow||rating>G.bestShow.rating)G.bestShow=r;G.showDone=true;G.news=generateNews(r).concat(G.news).slice(0,24);save(true);render();}
function generateNews(r){let pool=[];pool.push(r.rating>75?'Una crítica local elogia la evolución del directo.':'La prensa local pide una identidad escénica más definida.');pool.push(r.newFans>30?'El club de fans organiza una quedada tras el concierto.':'Fans veteranos comparten recomendaciones para el próximo show.');if(G.staff.wardrobe)pool.push('Fans comentan positivamente el nuevo vestuario.');if(avg(G.idols,'fatigue')>70)pool.push('El cansancio empieza a notarse en los ensayos; bienestar recomienda prudencia.');if(G.staff.social>=2)pool.push('Una entrevista coordinada por redes consigue una gran respuesta.');if(G.reputation>40)pool.push('Una marca local estudia una colaboración con el grupo.');pool.push('Una agencia rival anuncia un single para esta misma semana.');return pool.sort(()=>Math.random()-.5).slice(0,rnd(2,4));}
function nextWeek(){if(!G.showDone)return;G.rivals.forEach(x=>{let old=x.fans,gain=rnd(12,85)+Math.round(x.reputation*.6);x.fans+=gain;x.reputation=clamp(x.reputation+rnd(-1,2));x.result=`Show ${rnd(51,91)}/100`;x.trend=x.fans>old?'▲':'▼'});if(G.money<0)G.negativeWeeks++;else G.negativeWeeks=0;if(G.negativeWeeks>=3){G.gameOver=true;showModal('<h2>Bancarrota</h2><p>La agencia ha permanecido tres semanas en números rojos. La prioridad es cumplir todos los contratos y cerrar responsablemente.</p><button class="btn primary" onclick="newGame()">Nueva partida</button>');return;}if(G.week===12){seasonEnd();return;}G.week++;resetWeek();}
function resetWeek(){G.trained=false;G.showDone=false;G.auditions=[candidate(1),candidate(2),candidate(3)];G.idols.forEach(x=>{x.fatigue=clamp(x.fatigue-3-G.staff.wellness);if(x.fatigue>95){x.fatigue=70;x.morale=clamp(x.morale-3);G.news.unshift(`${x.name} recibe descanso obligatorio para proteger su bienestar.`)}});save(true);current='dashboard';render();}
function seasonEnd(){let best=G.bestShow||G.lastReport,pop=[...G.idols].sort((a,b)=>b.popularity-a.popularity)[0],award=G.reputation>=70?'Premio: Revelación de la escena':G.reputation>=45?'Reconocimiento: Circuito indie destacado':'Reconocimiento: Comunidad en crecimiento';showModal(`<h2>Final de la temporada ${G.season}</h2><div class="grid two"><p>Fans ganados: <b>+${G.fans-G.seasonStart.fans}</b><br>Dinero final: <b>${money(G.money)}</b><br>Ranking final: <b>#${rankPos()}</b></p><p>Mejor concierto: <b>${best?best.rating+'/100 en '+best.venue:'—'}</b><br>Idol más popular: <b>${pop.name}</b><br>${award}</p></div><p>La siguiente temporada trae nuevos objetivos y mantiene todos tus desbloqueos.</p><button class="btn primary" id="continueSeason">Comenzar temporada ${G.season+1}</button>`);document.querySelector('#continueSeason').onclick=()=>{G.season++;G.week=1;G.seasonStart={fans:G.fans,money:G.money};G.bestShow=null;document.querySelector('#modal').classList.remove('show');resetWeek()};}
function showModal(html){document.querySelector('#modalBox').innerHTML=html;document.querySelector('#modal').classList.add('show')}
function newGame(){G=initialState();save(true);document.querySelector('#modal').classList.remove('show');current='dashboard';render();toast('Nueva partida iniciada.');}
document.querySelector('#saveBtn').onclick=()=>save();document.querySelector('#newBtn').onclick=()=>showModal('<h2>¿Nueva partida?</h2><p>Se reemplazará la partida guardada actual.</p><button class="btn danger" onclick="newGame()">Sí, empezar de nuevo</button> <button class="btn" onclick="document.querySelector(\'#modal\').classList.remove(\'show\')">Cancelar</button>');render();
</script>
</body></html>
